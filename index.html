function buildTxTable(txs,filter,showFees=false){
  const visible=showFees?txs:txs.filter(t=>t.category!=="fee");
  const filtered=filter==="all"?visible:visible.filter(t=>t.category===filter);
  if(filtered.length===0)return`<div class="empty">No ${filter} transactions.</div>`;
  const sorted=[...filtered].sort((a,b)=>b.txDate.localeCompare(a.txDate));
  return`<table class="tx-table">
    <thead><tr>
      <th>Date</th><th>Fund</th><th>Type</th><th>Details</th>
      <th style="text-align:right;">Units</th>
      <th style="text-align:right;">Amount</th>
      <th style="text-align:right;">Price/Unit</th>
      <th>Category</th>
    </tr></thead>
    <tbody>${sorted.map(tx=>`<tr>
      <td style="white-space:nowrap;">${fmtDate(tx.txDate)}</td>
      <td style="max-width:160px;font-size:11px;">${esc(tx.fundName)}</td>
      <td style="font-size:11px;">${esc(tx.txType)}</td>
      <td style="font-size:11px;">${esc(tx.txDetails)}</td>
      <td style="text-align:right;font-family:monospace;color:${tx.units<0?"var(--red)":"var(--text)"};">${tx.units.toFixed(4)}</td>
      <td style="text-align:right;font-family:monospace;color:${tx.amount<0?"var(--red)":"var(--text)"};">${$f(tx.amount)}</td>
      <td style="text-align:right;font-family:monospace;">$${tx.price.toFixed(6)}</td>
      <td><span class="tx-cat tx-${tx.category}">${tx.category}</span></td>
    </tr>`).join("")}</tbody>
  </table>`;
}
// ── Fund card drag-and-drop ordering ──
function getFundOrder(clientId,names){
  try{
    const saved=JSON.parse(localStorage.getItem(`fo_${clientId}`)||"[]");
    if(!saved.length)return names;
    const ordered=saved.filter(n=>names.includes(n));
    names.filter(n=>!saved.includes(n)).forEach(n=>ordered.push(n));
    return ordered;
  }catch{return names;}
}
function saveFundOrder(clientId,names){
  localStorage.setItem(`fo_${clientId}`,JSON.stringify(names));
}
let _dragFund=null;
window.fundDragStart=(e,clientId,fname)=>{
  _dragFund={clientId,fname};
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed="move";
};
window.fundDragOver=(e)=>{
  e.preventDefault();
  e.currentTarget.classList.add("drag-over");
  e.dataTransfer.dropEffect="move";
};
window.fundDragLeave=(e)=>{e.currentTarget.classList.remove("drag-over");};
window.fundDrop=(e,clientId)=>{
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if(!_dragFund||_dragFund.clientId!==clientId)return;
  const target=e.currentTarget.dataset.fund;
  if(!target||target===_dragFund.fname){_dragFund=null;return;}
  const txs=clientTxs[clientId]||[];
  const names=getFundOrder(clientId,Object.keys(calcPortfolio(txs)));
  const fi=names.indexOf(_dragFund.fname),ti=names.indexOf(target);
  if(fi!==-1&&ti!==-1){names.splice(fi,1);names.splice(ti,0,_dragFund.fname);}
  saveFundOrder(clientId,names);
  _dragFund=null;
  renderAll();
};

window.saveReinvest=async(clientId,fundName)=>{
  const date=document.getElementById("rDate")?.value;
  const units=parseFloat(document.getElementById("rUnits")?.value);
  const amount=parseFloat(document.getElementById("rAmount")?.value);
  if(!date||isNaN(units)||units<=0||isNaN(amount)||amount<=0){showToast("❌ Please fill in all fields.");return;}
  const tx={
    id:uid(),fundName,
    txType:"Distribution Reinvestment",
    txDetails:"Distribution Reinvestment",
    txDate:date,units,amount,
    price:amount/units,freeLabel:"",
    category:"reinvestment",clientId,uid:OWNER

// Fetch latest price of an underlying sub-fund via the server-side /api/underlying-price endpoint
async function fetchUnderlyingPrice(ftSymbol){
  try{
    const enc=encodeURIComponent(ftSymbol);
    const resp=await fetch(`/api/underlying-price?symbol=${enc}`,{signal:AbortSignal.timeout(15000)});
    if(!resp.ok)return null;
    const data=await resp.json();
    return(data.price&&data.price>0)?data.price:null;
  }catch(e){return null;}
}

// ── Price fetch engine (Vercel serverless) ──
// Calls /api/fund-prices which runs server-side — no CORS proxies needed.
window.doFetchPrices=async()=>{
  const btn=document.getElementById("fetchBtn");
  const statusEl=document.getElementById("fetchStatus");
  if(btn){btn.disabled=true;btn.textContent="⏳ Fetching...";}
  function setStatus(msg,color="var(--gold)",bg="rgba(245,158,11,0.1)",border="var(--gold-border)"){
    if(!statusEl)return;
    statusEl.style.display="block";statusEl.style.background=bg;statusEl.style.border=`1px solid ${border}`;statusEl.style.color=color;statusEl.innerHTML=msg;
  }
  function reset(){if(btn){btn.disabled=false;btn.textContent="⟳ Fetch Latest Prices";}}

  setStatus("⏳ Fetching latest prices from Income's website...");
  try{
    const resp=await fetch('/api/fund-prices',{signal:AbortSignal.timeout(35000)});
    if(!resp.ok)throw new Error(`Server error ${resp.status}`);
    const data=await resp.json();
    if(!data.prices||Object.keys(data.prices).length===0)throw new Error(data.error||'No prices returned');

    let found=0;
    for(const[name,price]of Object.entries(data.prices)){
      await saveFundPriceDB(name,price,data.change1D?.[name]??null,data.change7D?.[name]??null,data.sourceDetail?.[name]??null);
      found++;
    }

    // Save each price to history so long-term performance can be calculated over time
    const today=new Date().toISOString().split("T")[0];
    const hb=writeBatch(db);
    for(const[name,price]of Object.entries(data.prices)){
      const did=name.replace(/[^a-zA-Z0-9]/g,"_")+"_"+today;
      hb.set(doc(db,"fundPriceHistory",did),{fundName:name,price:parseFloat(price),date:today,fetchedAt:new Date().toISOString()});
    }
    await hb.commit().catch(e=>console.warn("History save error:",e));

    // Also fetch underlying sub-fund prices from FT.com (server-side, no CORS issues)
    const underlyingEntries=Object.entries(FUND_UNDERLYING);
    let underlyingFound=0;
    if(underlyingEntries.length>0){
      setStatus(`✅ Income: ${found} prices · fetching ${underlyingEntries.length} underlying fund price${underlyingEntries.length>1?"s":""}...`);
      const uResults=await Promise.all(underlyingEntries.map(([,ftSym])=>
        fetchUnderlyingPrice(ftSym).then(p=>({ftSym,p}))
      ));
      for(const{ftSym,p}of uResults){
        if(p){await saveUnderlyingPriceDB(ftSym,p);underlyingFound++;}
      }
    }

    reset();
    const missing=data.missing||[];
    const srcLabel=data.source==='monthly'?' (end-of-month prices)':'';
    const uNote=underlyingEntries.length>0?` · ${underlyingFound}/${underlyingEntries.length} underlying`:"";
    if(missing.length===0){
      setStatus(`✅ All ${found} fund prices updated${srcLabel}${uNote}!`,"var(--green)","rgba(34,197,94,0.1)","rgba(34,197,94,0.3)");
      showToast(`✅ All ${found} fund prices updated!`);
    }else{
      setStatus(`✅ ${found} prices updated${srcLabel}${uNote}. Missing: ${missing.map(n=>n.replace('Income ','').replace(' Fund','')).join(', ')} — use ✏️ to enter manually.`,"var(--gold-l)","rgba(245,158,11,0.08)","var(--gold-border)");
      showToast(`✅ ${found} fund prices updated!`);
    }
    renderPage();
  }catch(e){
    reset();
    setStatus(
      `❌ Could not fetch prices. Use ✏️ to enter manually from <a href="https://www.income.com.sg/funds/historical-prices" target="_blank" style="color:var(--gold);">Income's website</a>. (${e.message})`,
      "#fca5a5","rgba(239,68,68,0.1)","rgba(239,68,68,0.3)"
    );
  }
};

// Auto-fetch prices once per day on page load (tracks date in localStorage per device)
async function autoFetchPricesOnStartup(){
  // Wait for Firestore listeners to hydrate fund prices first
  await new Promise(r=>setTimeout(r,3000));
  const today=new Date().toISOString().split("T")[0];
  const lastFetch=localStorage.getItem("lastAutoFetch");
  if(lastFetch===today)return; // Already fetched today on this device
  // Mark as fetched before starting (prevents double-fetch if user reloads mid-fetch)
  localStorage.setItem("lastAutoFetch",today);
  window.doFetchPrices().catch(()=>{});
}

          <span style="text-align:right;color:var(--dim);">—</span>
          <span style="text-align:right;color:var(--dim);">—</span>
        </div>`;
        const c1=r.pct>=0?"var(--green)":"var(--red)";
        const c2=r.annPct>=0?"var(--green)":"var(--red)";
        return`<div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;padding:10px 18px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04);">
          <span style="font-weight:600;">${p}</span>
          <span style="text-align:right;font-weight:800;color:${c1};">${$pct(r.pct)}</span>
          <span style="text-align:right;font-weight:800;color:${c2};">${$pct(r.annPct)}/yr</span>
        </div>`;
      }).join("")}
      <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;padding:10px 18px;font-size:14px;">
        <span style="font-weight:600;">Since Start <span style="font-size:10px;color:var(--dim);">(${_pMonths}mo)</span></span>
        <span style="text-align:right;font-weight:800;color:${pAdjGain>=0?"var(--green)":"var(--red)"};">${$pct(pAdjPct)}</span>
        <span style="text-align:right;font-weight:800;color:${pSinceInceptAnn!=null&&pSinceInceptAnn>=0?"var(--green)":"var(--red)"};">${pSinceInceptAnn!=null?$pct(pSinceInceptAnn)+"/yr":"—"}</span>
      </div>
    </div>`;

    html+=`<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;">Fund Breakdown</div>`;
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;">`;
    for(const[fname,fd]of Object.entries(fundData)){
      html+=`<div style="background:var(--bg2);border-radius:14px;padding:18px;border:1px solid var(--gold-border);">
        <div style="font-size:14px;font-weight:700;color:var(--gold-l);margin-bottom:12px;">${esc(fname)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">
          <div><div style="font-size:10px;color:var(--dim);">Current Value</div><div style="font-size:14px;font-weight:800;">${$f(fd.netPremiumValue)}</div></div>
          <div><div style="font-size:10px;color:var(--dim);">Gain / Loss</div><div style="font-size:14px;font-weight:800;color:${fd.displayGain>=0?"var(--green)":"var(--red)"};">${$f(fd.displayGain)} <span style="font-size:11px;">(${$pct(fd.displayGainPct)})</span></div></div>
          <div><div style="font-size:10px;color:var(--dim);">Bonus Value</div><div style="font-size:14px;font-weight:800;color:var(--gold);">${$f(fd.bonusValue)}</div></div>
        </div>
        <div style="margin-top:10px;">
          <div class="prog-wrap"><div class="prog-bar ${fd.displayGain>=0?"green":"red"}" style="width:${Math.min(100,Math.max(0,Math.abs(fd.displayGainPct)))}%"></div></div>
        </div>
      </div>`;
    }
    html+=`</div>`;

    // Fund Entry Price Summary (Present mode — clean client-facing view)
    const epPresent=calcEntryPrices(txs);
    // Include funds with premiums OR switch_ins
    const epPresentFunds=Object.keys(epPresent).filter(n=>{const f=epPresent[n];return f.avgCost>0||f.switchIns.length>0;});
    if(epPresentFunds.length>0){
      // Build entry price table rows using string concat (no nested template literals)
      let epRows="";
      epPresentFunds.forEach((fname,i)=>{
        const f=epPresent[fname];
        const hasPrem=f.avgCost>0;
        // For switch-in-only funds compute avg switch price
        const siU=f.switchIns.reduce((s,x)=>s+x.units,0);
        const siA=f.switchIns.reduce((s,x)=>s+x.amount,0);
        const avgSI=siU>0?siA/siU:0;
        const dispCost=hasPrem?f.avgCost:avgSI;
        const dispLabelShort=hasPrem?"Entry":"Switch";
        const dispChg=dispCost>0&&f.currentPrice>0?((f.currentPrice-dispCost)/dispCost*100):null;
        const col=dispChg===null?"var(--dim)":dispChg>=0?"var(--green)":"var(--red)";
        const arrow=dispChg===null?"—":dispChg>=0?"▲":"▼";
        const chg=dispChg===null?"N/A":arrow+" "+Math.abs(dispChg).toFixed(2)+"%";
        const border=i<epPresentFunds.length-1?" border-bottom:1px solid rgba(255,255,255,0.04);":"";
        const nowPrice=f.currentPrice>0?"$"+f.currentPrice.toFixed(4):"—";
        epRows+='<div style="display:grid;grid-template-columns:2fr 50px 90px 90px 90px;padding:12px 18px;font-size:13px;align-items:center;'+border+'">'
          +'<span style="font-weight:600;color:var(--text);">'+esc(fname.replace("Income ",""))+'</span>'
          +'<span style="font-size:10px;color:var(--dim);padding:2px 6px;background:rgba(255,255,255,0.06);border-radius:4px;margin-right:4px;">'+dispLabelShort+'</span>'
          +'<span style="text-align:right;color:var(--muted);">$'+dispCost.toFixed(4)+'</span>'
          +'<span style="text-align:right;">'+nowPrice+'</span>'
          +'<span style="text-align:right;font-weight:800;color:'+col+';">'+chg+'</span>'
          +'</div>';
      });
      html+='<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;">Your Fund Entry Prices</div>'
        +'<div style="overflow-x:auto;margin-bottom:24px;-webkit-overflow-scrolling:touch;">'
        +'<div style="background:var(--bg2);border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);min-width:360px;">'
        +'<div style="display:grid;grid-template-columns:2fr 50px 90px 90px 90px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,0.07);">'
        +'<span>Fund</span><span></span><span style="text-align:right;">Avg Price</span><span style="text-align:right;">Now</span><span style="text-align:right;">Change</span></div>'
        +epRows+'</div></div>';

      // Build switch history section
      // Collect all switches: for each switch_out from fund A, find the matching switch_in on same date
      const allSwitchOuts=[];
      epPresentFunds.forEach(fname=>{
        const f=epPresent[fname];
        f.switchOuts.forEach(so=>{allSwitchOuts.push({fromFund:fname,so,avgEntry:f.avgCost});});
      });
      allSwitchOuts.sort((a,b)=>a.so.date.localeCompare(b.so.date));

      if(allSwitchOuts.length>0){
        html+='<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px;">🔀 Fund Switch History</div>';
        html+='<div style="font-size:12px;color:var(--dim);margin-bottom:12px;">Switches made to lock in gains and redeploy into growth opportunities.</div>';
        html+='<div style="overflow-x:auto;margin-bottom:24px;-webkit-overflow-scrolling:touch;">';
        html+='<div style="background:var(--bg2);border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);min-width:400px;">';
        html+='<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:grid;grid-template-columns:90px 1fr 100px 120px;">';
        html+='<span>Date</span><span>Switched Out</span><span style="text-align:right;">Exit $</span><span style="text-align:right;">Vs Avg Entry</span></div>';
        allSwitchOuts.forEach((item,i)=>{
          const so=item.so;
          const vc=item.avgEntry>0?((so.price-item.avgEntry)/item.avgEntry*100):null;
          const vcol=vc===null?"var(--dim)":vc>=0?"var(--green)":"var(--red)";
          const vcTxt=vc===null?"—":(vc>=0?"▲ +":"▼ ")+Math.abs(vc).toFixed(2)+"% "+(vc>=0?"✅ locked":"loss");
          const border=i<allSwitchOuts.length-1?" border-bottom:1px solid rgba(255,255,255,0.04);":"";
          const sameDate=epPresentFunds.flatMap(fn=>epPresent[fn].switchIns.filter(si=>si.date===so.date).map(si=>({toFund:fn,si})));
          html+='<div style="padding:10px 16px;'+border+'">';
          html+='<div style="display:grid;grid-template-columns:90px 1fr 100px 120px;align-items:center;">';
          html+='<span style="font-size:11px;color:var(--dim);">'+fmtDate(so.date)+'</span>';
          html+='<span style="font-size:12px;font-weight:600;">'+esc(item.fromFund.replace("Income ",""))+'</span>';
          html+='<span style="font-size:11px;color:var(--muted);text-align:right;">$'+so.price.toFixed(4)+'</span>';
          html+='<span style="font-size:12px;font-weight:700;color:'+vcol+';text-align:right;">'+vcTxt+'</span>';
          html+='</div>';
          if(sameDate.length>0){
            html+='<div style="margin-top:6px;padding-left:16px;border-left:2px solid rgba(6,182,212,0.3);">';
            sameDate.forEach(({toFund,si})=>{
              const sc=si.chgPct,scol=sc===null?"var(--dim)":sc>=0?"var(--green)":"var(--red)";
              const scTxt=sc===null?"—":(sc>=0?"▲ +":"▼ ")+Math.abs(sc).toFixed(2)+"% now";
              html+='<div style="display:grid;grid-template-columns:90px 1fr 100px 120px;font-size:11px;margin-top:3px;">';
              html+='<span style="color:#67e8f9;">↳ Into</span>';
              html+='<span style="color:var(--text);font-weight:600;">'+esc(toFund.replace("Income ",""))+'</span>';
              html+='<span style="color:var(--muted);text-align:right;">$'+si.price.toFixed(4)+'</span>';
              html+='<span style="font-weight:700;color:'+scol+';text-align:right;">'+scTxt+'</span>';
              html+='</div>';
            });
            html+='</div>';
          }
          html+='</div>';
        });
        html+='</div></div>';
      }
    }

    html+=`<div style="text-align:center;padding:24px 0 8px;font-size:12px;color:var(--dim);font-style:italic;line-height:1.8;">
      "True Gain" reflects only your actual investment performance — startup bonus units are tracked separately.<br>
      <span style="color:var(--gold-d);">All values based on latest available fund prices.</span>
    </div>`;
  }

  html+="</div>";
  document.getElementById("presentContent").innerHTML=html;
  document.getElementById("presentOverlay").classList.add("show");
  document.body.style.overflow="hidden";
};
window.closePresent=()=>{
  document.getElementById("presentOverlay").classList.remove("show");
  document.body.style.overflow="";
};

// ── S&P 500 overlay ──
let _sp500AllPrices=null;   // single global cache — all 6 years, fetched once
let _sp500Fetching=null;    // in-flight promise so concurrent callers share one request

async function _loadSp500Chart(clientId){
  const sp5Wrap=document.getElementById(`gwrap-sp500-${clientId}`);
  const loadingEl=document.getElementById(`sp500-loading-${clientId}`);

  const showErr=(msg)=>{
    if(loadingEl){
      loadingEl.innerHTML=`<div style="text-align:center;">
        <div style="color:var(--muted);font-size:13px;margin-bottom:10px;">${msg}</div>
        <button onclick="_loadSp500Chart('${clientId}')" style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:var(--gold);border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;">🔄 Retry</button>
      </div>`;
      loadingEl.style.display="flex";
    }
  };

  const txs=clientTxs[clientId]||[];
  const pts=calcTimeSeries(txs);
  if(pts.length<2){showErr("Not enough transaction data to compare.");return;}

  const baseDate=pts[0].date;

  // Destroy stale chart if retrying
  destroyChart(`sp500-${clientId}`);
  const existingBadge=document.getElementById(`sp500-badge-${clientId}`);
  if(existingBadge)existingBadge.remove();

  if(loadingEl){loadingEl.innerHTML="Loading S&P 500 data…";loadingEl.style.display="flex";}

  // Fetch the full 6-year dataset once; all clients share the same cache
  if(!_sp500AllPrices){
    if(!_sp500Fetching){
      _sp500Fetching=(async()=>{
        const ctrl=new AbortController();
        const timer=setTimeout(()=>ctrl.abort(),25000);
        try{
          const r=await fetch("/api/sp500",{signal:ctrl.signal});
          clearTimeout(timer);
          if(!r.ok)throw new Error(`Server error (HTTP ${r.status})`);
          const d=await r.json();
          if(d.error)throw new Error(d.error);
          _sp500AllPrices=d.prices||[];
        }finally{
          _sp500Fetching=null;
        }
      })();
    }
    try{await _sp500Fetching;}
    catch(e){
      const msg=e.name==="AbortError"?"Request timed out. Yahoo Finance may be temporarily unavailable.":"Could not load S&P 500 data: "+e.message;
      showErr(msg);return;
    }
  }
  if(!_sp500AllPrices||!_sp500AllPrices.length){showErr("No S&P 500 data available.");return;}

  // Filter to dates on or after this client's start date
  const sp5Prices=_sp500AllPrices.filter(p=>p.date>=baseDate);
  if(!sp5Prices.length){showErr("No S&P 500 data available for this client's start date.");return;}

  if(loadingEl)loadingEl.style.display="none";

  const sp5Map={};
  for(const p of sp5Prices)sp5Map[p.date]=p.price;

  const baseSp5Price=sp5Prices[0]?.price||1;

  // Build Time-Weighted Return (TWR) factors for the portfolio.
  // Between each pair of transaction dates, the sub-period return is computed
  // AFTER stripping out premium cash inflows so advance premiums don't distort
  // the chart as fake gains.
  const _premCash={};
  for(const tx of txs){
    if(tx.category==="premium")
      _premCash[tx.txDate]=(_premCash[tx.txDate]||0)+Math.abs(tx.amount);
  }
  let _twrFactor=1.0;
  const twrByDate={};
  twrByDate[pts[0].date]=1.0;
  for(let i=1;i<pts.length;i++){
    const prevVal=pts[i-1].value;
    const cashIn=_premCash[pts[i].date]||0;
    const organic=pts[i].value-cashIn;
    if(prevVal>0)_twrFactor*=(organic/prevVal);
    twrByDate[pts[i].date]=_twrFactor;
  }

  const allDates=[...new Set([...pts.map(p=>p.date),...sp5Prices.map(p=>p.date)])].sort();
  const portRange={min:pts[0].date,max:pts[pts.length-1].date};
  const filteredDates=allDates.filter(d=>d>=portRange.min&&d<=portRange.max);

  const chartLabels=[],portIdx=[],sp5Idx=[];
  let lastTWR=null,lastSp5Price=null;
  for(const d of filteredDates){
    if(twrByDate[d]!==undefined)lastTWR=twrByDate[d];
    if(sp5Map[d]!==undefined)lastSp5Price=sp5Map[d];
    if(lastTWR===null||lastSp5Price===null)continue;
    if(chartLabels.length>0&&twrByDate[d]===undefined&&sp5Map[d]===undefined)continue;
    if(chartLabels.length>0){
      const prev=chartLabels[chartLabels.length-1];
      const daysDiff=(new Date(d)-new Date(prev))/(1000*86400);
      if(daysDiff<5&&twrByDate[d]===undefined)continue;
    }
    chartLabels.push(d);
    portIdx.push(+(lastTWR*100).toFixed(2));
    sp5Idx.push(+((lastSp5Price/baseSp5Price)*100).toFixed(2));
  }

  if(!chartLabels.length){showErr("No overlapping dates between portfolio and S&P 500.");return;}

  const lEl=document.getElementById(`sp500-${clientId}`);
  if(!lEl)return;

  charts[`sp500-${clientId}`]=new Chart(lEl.getContext("2d"),{
    type:"line",
    data:{
      labels:chartLabels.map(d=>{const[y,m,dd]=d.split("-");return`${dd}/${m}/${y.slice(2)}`;}),
      datasets:[
        {
          label:"My Portfolio",
          data:portIdx,
          borderColor:"#f59e0b",
          backgroundColor:"rgba(245,158,11,0.07)",
          borderWidth:2.5,fill:true,tension:0.35,
          pointBackgroundColor:"#f59e0b",pointRadius:2,pointHoverRadius:6,
          pointBorderColor:"#07101e",pointBorderWidth:1
        },
        {
          label:"S&P 500",
          data:sp5Idx,
          borderColor:"#60a5fa",
          backgroundColor:"rgba(96,165,250,0.03)",
          borderWidth:2,fill:false,tension:0.35,
          pointBackgroundColor:"#60a5fa",pointRadius:0,pointHoverRadius:5,
          borderDash:[5,3]
        }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:"nearest",axis:"x",intersect:false},
      scales:{
        x:{ticks:{color:"#64748b",font:{size:9},maxTicksLimit:9},grid:{color:"rgba(30,41,59,0.3)"}},
        y:{
          ticks:{color:"#64748b",font:{size:10},callback:v=>`${(v-100).toFixed(0)}%`},
          grid:{color:"rgba(30,41,59,0.35)"},
          title:{display:true,text:"Return since policy start",color:"#64748b",font:{size:10}}
        }
      },
      plugins:{
        legend:{labels:{color:"#94a3b8",font:{size:11},boxWidth:12,usePointStyle:true}},
        tooltip:{
          callbacks:{
            title:items=>`📅 ${items[0].label}`,
            label:ctx=>{
              const ret=(ctx.parsed.y-100).toFixed(1);
              const portRet=(portIdx[ctx.dataIndex]-100).toFixed(1);
              const sp5Ret=(sp5Idx[ctx.dataIndex]-100).toFixed(1);
              const diff=(portIdx[ctx.dataIndex]-sp5Idx[ctx.dataIndex]).toFixed(1);
              if(ctx.datasetIndex===0)return[` Portfolio: ${ret>=0?"+":""}${ret}%`,` vs S&P 500: ${diff>=0?"+":" "}${diff}%`];
              return` S&P 500: ${sp5Ret>=0?"+":""}${sp5Ret}%`;
            }
          }
        }
      },
      animation:{duration:1000,easing:"easeInOutQuart"}
    },
    plugins:[xhairPlugin]
  });

  // Outperformance badge — shown as %
  const lastPort=portIdx[portIdx.length-1];
  const lastSp5=sp5Idx[sp5Idx.length-1];
  const portReturn=(lastPort-100).toFixed(1);
  const sp5Return=(lastSp5-100).toFixed(1);
  const diffPct=(lastPort-lastSp5).toFixed(1);
  const outperforms=lastPort>=lastSp5;
  sp5Wrap.insertAdjacentHTML("beforeend",
    `<div id="sp500-badge-${clientId}" style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 16px;text-align:center;">
        <div style="font-size:10px;color:var(--dim);margin-bottom:3px;">MY PORTFOLIO</div>

window.switchGrowthTab=async(clientId,view)=>{
  const tabsEl=document.getElementById(`gtabs-${clientId}`);
  if(tabsEl){
    tabsEl.querySelectorAll(".growth-tab").forEach(b=>{
      b.classList.toggle("active",b.textContent.trim().includes(view==="portfolio"?"Portfolio":"S&P"));
    });
  }
  const portWrap=document.getElementById(`gwrap-portfolio-${clientId}`);
  const sp5Wrap=document.getElementById(`gwrap-sp500-${clientId}`);
  if(view==="portfolio"){
    if(portWrap)portWrap.style.display="";
    if(sp5Wrap)sp5Wrap.style.display="none";
    return;
  }
  if(portWrap)portWrap.style.display="none";
  if(sp5Wrap)sp5Wrap.style.display="";
  if(charts[`sp500-${clientId}`])return;  // already drawn on this page load
  await _loadSp500Chart(clientId);
};

window.setTab=t=>{
  tab=t;currentClientId=null;
  document.getElementById("app").innerHTML="";
  renderAll();window.scrollTo(0,0);
};
window.viewClient=async(id)=>{
  currentClientId=id;tab="client";currentClientTab="overview";
  if(!clientTxs[id])await loadClientTxs(id);
  if(!clientDivHistory[id])await loadDivHistory(id);
  renderAll();window.scrollTo(0,0);
};
window.goBack=()=>{tab="dashboard";currentClientId=null;renderAll();window.scrollTo(0,0);};
window.openWhatsApp=(clientId)=>{
  const c=clients.find(x=>x.fid===clientId);if(!c||!c.contactNo)return;
  const digits=c.contactNo.replace(/\D/g,"");
  const num=digits.startsWith("65")?digits:"65"+digits;
  const msg=encodeURIComponent("Hi "+c.name+",");
  window.open("https://wa.me/"+num+"?text="+msg,"_blank");
};
window.openEditClientInfo=(clientId)=>{
  const c=clients.find(x=>x.fid===clientId);if(!c)return;
  const mo=document.getElementById("editClientModal");
  mo.dataset.clientId=clientId;
  document.getElementById("ecNRIC").value=c.nric||"";
  document.getElementById("ecDOB").value=c.dob?fmtDate(c.dob):"";
  document.getElementById("ecContact").value=c.contactNo||"";
  document.getElementById("ecErr").style.display="none";
  mo.style.display="flex";
  setTimeout(()=>document.getElementById("ecNRIC").focus(),50);
};
window.closeEditClientInfo=()=>{document.getElementById("editClientModal").style.display="none";};
window.saveEditClientInfo=async()=>{
  const clientId=document.getElementById("editClientModal").dataset.clientId;
  if(!clientId)return;
  const nric=document.getElementById("ecNRIC").value.trim();
  const rawDob=document.getElementById("ecDOB").value.trim();
  const dob=rawDob?parseDate(rawDob):"";
  const contactNo=document.getElementById("ecContact").value.trim();
  const errEl=document.getElementById("ecErr");
  if(rawDob&&!dob.match(/^\d{4}-\d{2}-\d{2}$/)){errEl.textContent="DOB format: DD/MM/YYYY";errEl.style.display="block";return;}
  errEl.style.display="none";
  try{
    await updateClientFields(clientId,{nric:nric||"",dob:dob||"",contactNo:contactNo||""});
    showToast("✅ Client info updated.");
    closeEditClientInfo();
  }catch(e){errEl.textContent="Error: "+e.message;errEl.style.display="block";}
};
window.doDelClient=async(id)=>{
  if(!confirm("Delete this client and ALL their transactions? This cannot be undone."))return;
  await removeClient(id);
  delete clientTxs[id];
  showToast("🗑 Client deleted.");
  tab="dashboard";currentClientId=null;renderAll();
};

async function loadFdmHistory(name){

// Return a YYYY-MM-DD string shifted by calendar months/years (avoids landing on volatile exact-day offsets)
function _shiftDate(dateStr,months,years){
  const d=new Date(dateStr);
  if(months)d.setMonth(d.getMonth()-months);
  if(years) d.setFullYear(d.getFullYear()-years);
  return d.toISOString().split("T")[0];
}
function _annualize(cumPct,years){
  if(cumPct===null)return null;
  return+((Math.pow(1+cumPct/100,1/years)-1)*100).toFixed(2);
}

function calcPerfFromStored(history){
  if(!history||history.length<2)return null;
  const latest=history[0];
  const latestPrice=latest.price;
  const ref=latest.date;
  const findPrice=(dateStr)=>{
    for(const e of history){if(e.date<=dateStr)return e.price;}
    return null;
  };
  const pct=(dateStr)=>{
    const old=findPrice(dateStr);
    if(old===null||old<=0)return null;
    return+((latestPrice-old)/old*100).toFixed(2);
  };
  // SI — since earliest stored price
  const oldest=history[history.length-1];
  const siYears=(new Date(ref)-new Date(oldest.date))/(365.25*86400000);
  const siCum=+(( latestPrice-oldest.price)/oldest.price*100).toFixed(2);
  return{
    "1M":pct(_shiftDate(ref,1)),
    "3M":pct(_shiftDate(ref,3)),
    "6M":pct(_shiftDate(ref,6)),
    "1Y":pct(_shiftDate(ref,0,1)),
    "3Y":_annualize(pct(_shiftDate(ref,0,3)),3),
    "5Y":_annualize(pct(_shiftDate(ref,0,5)),5),
    "SI":siYears>=1?_annualize(siCum,siYears):siCum,
    _siFrom:oldest.date,
    _siAnnualized:siYears>=1,
  };
}

// Calculate performance from Morningstar timeseries prices (oldest-first [{date,price}])
function calcPerfFromTimeseries(tsData){
  const prices=tsData?.prices;
  if(!prices||prices.length<2)return null;
  const latest=prices[prices.length-1];
  const latestPrice=latest.price;
  const ref=latest.date;
  // Scan backwards for price on or before a target date
  const findPrice=(dateStr)=>{
    for(let i=prices.length-2;i>=0;i--){if(prices[i].date<=dateStr)return prices[i].price;}
    return null;
  };
  const pct=(dateStr)=>{
    const old=findPrice(dateStr);
    if(old===null||old<=0)return null;
    return+((latestPrice-old)/old*100).toFixed(2);
  };
  // SI — since earliest price in timeseries
  const first=prices[0];
  const siYears=(new Date(ref)-new Date(first.date))/(365.25*86400000);
  const siCum=+(( latestPrice-first.price)/first.price*100).toFixed(2);
  const result={
    "1M":pct(_shiftDate(ref,1)),
    "3M":pct(_shiftDate(ref,3)),
    "6M":pct(_shiftDate(ref,6)),
    "1Y":pct(_shiftDate(ref,0,1)),
    "3Y":_annualize(pct(_shiftDate(ref,0,3)),3),
    "5Y":_annualize(pct(_shiftDate(ref,0,5)),5),
    "SI":siYears>=1?_annualize(siCum,siYears):siCum,
    _siFrom:first.date,
    _siAnnualized:siYears>=1,
  };
  return(result["1M"]!==null||result["3M"]!==null||result["6M"]!==null||result["1Y"]!==null||result["SI"]!==null)?result:null;
}

// ── Investment scenario calculator ──
window._fdmCurrentPerf=null;
window.updateScenario=function(){
  const inp=document.getElementById("scenarioAmt");
  const rowsEl=document.getElementById("scenarioRows");
  if(!inp||!rowsEl||!window._fdmCurrentPerf)return;
  const amount=Math.max(parseFloat(inp.value)||10000,0);
  const perf=window._fdmCurrentPerf;

  // 1Y = total 1-year return; 3Y and 5Y = annualized (from Morningstar ReturnM36/M60)
  const periods=[
    {lbl:"1 Year Ago",key:"1Y",years:1,annualized:false},
    {lbl:"3 Years Ago",key:"3Y",years:3,annualized:true},
    {lbl:"5 Years Ago",key:"5Y",years:5,annualized:true},
  ];

  const fmt=n=>"$"+Math.round(n).toLocaleString("en-SG");
  const fmtPct=n=>(n>=0?"+":"")+n.toFixed(2)+"%";

  let html="";
  for(const{lbl,key,years,annualized}of periods){
    const v=perf[key];
    if(v==null)continue;
    const fundVal=annualized?amount*Math.pow(1+v/100,years):amount*(1+v/100);
    const fundGain=fundVal-amount;
    const fundPct=annualized?(Math.pow(1+v/100,years)-1)*100:v;
    const bankVal=amount*Math.pow(1.0005,years);
    const bankGain=bankVal-amount;
    const bankPct=(Math.pow(1.0005,years)-1)*100;
    const inflVal=amount*Math.pow(1.03,years);
    const inflNeed=inflVal-amount;
    const inflPct=(Math.pow(1.03,years)-1)*100;
    const beatInfl=fundGain>=inflNeed;
    const fcol=beatInfl?"var(--green)":"#f97316";

    html+=`<div style="margin-bottom:8px;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;">
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:0.5px;">${lbl}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
        <div>
          <div style="font-size:9px;color:var(--green);font-weight:700;margin-bottom:3px;letter-spacing:0.5px;">THIS FUND</div>
          <div style="font-size:15px;font-weight:700;color:#f1f5f9;">${fmt(fundVal)}</div>
          <div style="font-size:11px;color:${fcol};">${fundGain>=0?"+":""}${fmt(Math.abs(fundGain))}</div>
          <div style="font-size:11px;color:${fcol};font-weight:600;">${fmtPct(fundPct)}</div>
        </div>
        <div>
          <div style="font-size:9px;color:#475569;font-weight:700;margin-bottom:3px;letter-spacing:0.5px;">BANK 0.05%</div>
          <div style="font-size:15px;font-weight:700;color:#475569;">${fmt(bankVal)}</div>
          <div style="font-size:11px;color:#475569;">+${fmt(bankGain)}</div>
          <div style="font-size:11px;color:#475569;">${fmtPct(bankPct)}</div>
        </div>
        <div>
          <div style="font-size:9px;color:#f97316;font-weight:700;margin-bottom:3px;letter-spacing:0.5px;">INFLATION 3%</div>
          <div style="font-size:15px;font-weight:700;color:#f97316;">${fmt(inflVal)}</div>
          <div style="font-size:11px;color:#6b7280;">need +${fmt(inflNeed)}</div>
          <div style="font-size:11px;color:#f97316;">${fmtPct(inflPct)}</div>
        </div>
      </div>
      <div style="margin-top:7px;font-size:11px;color:${beatInfl?"var(--green)":"#f97316"};">
        ${beatInfl?`✅ Beat inflation by ${fmt(fundGain-inflNeed)} (${fmtPct(fundPct-inflPct)})`:`⚠️ Below inflation — real loss of ${fmt(inflNeed-fundGain)}`}
      </div>
    </div>`;
  }
  rowsEl.innerHTML=html||`<div style="color:#64748b;font-size:12px;padding:8px 0;">No data available for scenario calculation.</div>`;
};

function renderFdmPerformance(){
  const PERIODS=["1M","3M","6M","1Y","3Y","5Y","SI"];
  const info=FUND_DB[_fdmFund]||{};

  // Performance source priority:
  // 1. Morningstar screener (only if correct SecId matched — wrong-fund guard in API)
  // 2. Morningstar timeseries prices (fund-specific, calculated here from daily NAV history)
  // 3. Firestore stored Income bid prices
  // 4. Static factsheet annualised returns
  // 5. Income website live scrape (~30 days only)
  const storedPerf=calcPerfFromStored(_fdmHistory);
  const tsPerf=calcPerfFromTimeseries(_fdmTimeseries);
  const staticAR=info.annualizedReturns;
  const livePerf=_fdmData&&!_fdmData.error?_fdmData.performance:null;
  // msPerf kept as last resort — Morningstar screener SecId filter is unreliable and can return wrong fund data
  const msPerf=_fdmMStar&&!_fdmMStar.noMapping&&_fdmMStar.performance?_fdmMStar.performance:null;

  let perf=null,perfSource="";
  // Priority 1: Timeseries (most reliable — fetched directly by SecId, not via broken screener filter)
  if(tsPerf){
    perf=tsPerf;
    const tsFrom=_fdmTimeseries?.from||"";
    const tsTo=_fdmTimeseries?.to||"";
    const subFundName=_fdmMStar?.morningstarName||info.subFund||"";
    perfSource=`📈 Based on <strong>underlying sub-fund</strong> daily prices${subFundName?` · ${esc(subFundName)}`:""} (${tsFrom} → ${tsTo})`;
  // Priority 2: Morningstar screener (fallback — only used if timeseries unavailable)
  }else if(msPerf&&Object.values(msPerf).some(v=>v!==null)){
    perf=msPerf;
    const stars=_fdmMStar.starRating?`${"★".repeat(_fdmMStar.starRating)}${"☆".repeat(5-_fdmMStar.starRating)}`:"";
    const aum=_fdmMStar.totalAssets?` · AUM SGD ${Number(_fdmMStar.totalAssets).toLocaleString()}M`:"";
    perfSource=`⭐ Morningstar · <strong>underlying sub-fund</strong> · ${esc(_fdmMStar.morningstarName||"")}${aum}${stars?" · "+stars:""}`;
  // Priority 3: Stored Income bid prices
  }else if(storedPerf&&_fdmHistory&&_fdmHistory.length>=2){
    perf=storedPerf;
    // Fill any null periods with the API's live scrape data (it covers ~30 days of history)
    if(livePerf){

    perf=livePerf;
    perfSource=`📡 From Income's website (~30 days of embedded price data)`;
  }

  // Latest price info
  const latest=_fdmData&&!_fdmData.error?_fdmData.latest:null;

  // Performance grid
  if(!perf&&_fdmHistory===null&&!_fdmData&&!_fdmMStar&&_fdmTimeseries===null){
    h+=`<div class="fdm-loading">⏳ Loading performance data...</div>`;

  // Morningstar badge if data arrived
  if(_fdmMStar&&_fdmMStar.starRating){
    const stars="★".repeat(_fdmMStar.starRating)+"☆".repeat(5-_fdmMStar.starRating);
    const aum=_fdmMStar.totalAssets?`<span style="color:#94a3b8;font-size:11px;margin-left:10px;">AUM: SGD ${Number(_fdmMStar.totalAssets).toLocaleString()}M</span>`:"";

      ${aum}
      ${_fdmMStar.categoryName?`<span style="color:#94a3b8;font-size:11px;margin-left:auto;">${esc(_fdmMStar.categoryName)}</span>`:""}
    </div>`;
  }

  if(perf){
    h+=`<div class="fdm-sec-hd">📊 Performance by Period</div>`;
    h+=`<div class="fdm-perf-row">`;
    PERIODS.forEach(p=>{
      const v=perf[p];
      const col=v===null||v===undefined?"#6b7280":v>=0?"var(--green)":"var(--red)";

      h+=`<div class="fdm-perf-cell${_fdmPeriod===p?" active":""}" onclick="selectFdmPeriod('${p}')">
        <div class="fdm-perf-period">${p==="SI"?siLabel:p}</div>
        <div class="fdm-perf-pct" style="color:${col};">${txt}</div>
      </div>`;
    });
    h+=`</div>`;
    if(perf._siFrom){
      const siNote=perf._siAnnualized?"annualized CAGR":"cumulative";
      h+=`<div style="font-size:10px;color:#6b7280;margin-top:-6px;margin-bottom:6px;">†SI = Since ${perf._siFrom} (${siNote} — earliest data available)</div>`;
    }
    if(perfSource)h+=`<div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">${perfSource}</div>`;
  }

  // Price chart — priority: Income bid prices first, Morningstar sub-fund as fallback
  const hasTS=_fdmTimeseries&&_fdmTimeseries.prices&&_fdmTimeseries.prices.length>=2;
  const hasStored=_fdmHistory&&_fdmHistory.length>=2;
  const hasLive=_fdmData&&!_fdmData.error&&_fdmData.chartData;
  if(!hasStored&&!hasLive&&_fdmTimeseries===null&&_fdmHistory===null&&!_fdmData){
    h+=`<div class="fdm-loading" style="padding:20px;">⏳ Loading price chart...</div>`;
  }else if(hasStored||hasLive||hasTS){
    if(latest)h+=`<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">Latest Income Bid: <strong style="color:#f1f5f9;">$${latest.price.toFixed(6)}</strong> as of ${latest.date}</div>`;
    // Mirror drawFdmChart priority: biggest Income dataset wins; Morningstar sub-fund as last resort
    const storedCount2=_fdmHistory?_fdmHistory.length:0;
    const liveCount2=hasLive?_fdmData.chartData.length:0;
    const DAYS={"1M":30,"3M":91,"6M":182,"1Y":365,"3Y":1095,"5Y":1825,"SI":36500};
    const cutoffMs=Date.now()-(DAYS[_fdmPeriod]||365)*864e5;
    let chartSrc=null,chartFmt="iso",chartLabel="Income Bid";
    if(storedCount2>=2&&storedCount2>=liveCount2){chartSrc=_fdmHistory.slice().reverse();chartFmt="iso";}
    else if(liveCount2>=2){chartSrc=_fdmData.chartData;chartFmt="dmy";}
    else if(storedCount2>=2){chartSrc=_fdmHistory.slice().reverse();chartFmt="iso";}
    else if(hasTS){chartSrc=_fdmTimeseries.prices;chartFmt="iso";chartLabel="Underlying Sub-Fund";}
    const toMs=d=>chartFmt==="iso"?new Date(d.date).getTime():new Date(d.date.split("/").reverse().join("-")).getTime();
    const inPeriod=chartSrc?chartSrc.filter(e=>toMs(e)>=cutoffMs):[];
    const shown=inPeriod.length>=2?inPeriod:(chartSrc||[]);
    const oldest=shown[0]?.date||"",newest=shown[shown.length-1]?.date||"";
    if(hasTS){
      h+=`<div style="display:flex;gap:5px;margin-bottom:8px;">
        <button id="fdmTabBtnIncome" onclick="selectFdmChartTab('income')"
          style="padding:5px 13px;border-radius:6px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;background:${_fdmChartTab==='income'?'rgba(16,185,129,0.2)':'rgba(255,255,255,0.04)'};border-color:${_fdmChartTab==='income'?'rgba(16,185,129,0.5)':'rgba(255,255,255,0.12)'};color:${_fdmChartTab==='income'?'#10b981':'#94a3b8'};">
          Income Bid</button>
        <button id="fdmTabBtnUnd" onclick="selectFdmChartTab('underlying')"
          style="padding:5px 13px;border-radius:6px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;background:${_fdmChartTab==='underlying'?'rgba(167,139,250,0.2)':'rgba(255,255,255,0.04)'};border-color:${_fdmChartTab==='underlying'?'rgba(167,139,250,0.5)':'rgba(255,255,255,0.12)'};color:${_fdmChartTab==='underlying'?'#a78bfa':'#94a3b8'};">
          Underlying Sub-Fund</button>
      </div>`;
    }
    h+=`<div class="fdm-chart-wrap" id="fdmChartWrapIncome" style="display:${_fdmChartTab==='underlying'?'none':'block'};"><canvas id="fdmChartCanvas"></canvas></div>`;
    if(hasTS){
      h+=`<div class="fdm-chart-wrap" id="fdmChartWrapUnd" style="display:${_fdmChartTab==='underlying'?'block':'none'};"><canvas id="fdmChartCanvasUnd"></canvas></div>`;
    }
    h+=`<div style="font-size:11px;color:#6b7280;margin-top:4px;margin-bottom:12px;">`;
    if(_fdmChartTab==='underlying'&&hasTS){
      h+=`📈 Underlying Sub-Fund · ${_fdmTimeseries.count} daily prices · ${_fdmTimeseries.from} – ${_fdmTimeseries.to}`;
    }else if(storedCount2>=2&&storedCount2>=liveCount2){
      h+=`📈 Income Bid · ${storedCount2} stored prices · ${oldest} – ${newest}`;
    }else if(liveCount2>=2){
      h+=`📈 Income Bid · Last ~${liveCount2} days from Income's website`;
    }else if(hasTS){
      h+=`📈 Income Bid · switch to "Underlying Sub-Fund" tab for historical sub-fund prices`;
    }
    h+=`</div>`;
  }else if(_fdmData&&_fdmData.error){
    h+=`<div class="fdm-err">⚠️ Chart unavailable: ${esc(_fdmData.error)}</div>`;
  }

  if(!perf&&!_fdmData){
    h+=`<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px;">No performance data yet. Press <strong style="color:var(--gold);">⟳ Fetch Latest Prices</strong> from the Fund Prices tab to start building history.</div>`;
  }

  return h;
}

        <div style="color:#f1f5f9;font-size:14px;font-weight:700;margin-bottom:8px;">Holdings Not Available via Data Feed</div>

          ${ftHoldUrl

                 style="color:var(--gold);text-decoration:underline;text-underline-offset:3px;font-size:12px;word-break:break-all;">${ftHoldUrl}</a>`

function drawFdmChart(period){
  // === Income Bid chart ===
  const canvas=document.getElementById("fdmChartCanvas");
  if(canvas){
    if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
    const storedCount=_fdmHistory?_fdmHistory.length:0;
    const liveData=_fdmData&&!_fdmData.error&&_fdmData.chartData?_fdmData.chartData:null;
    const liveCount=liveData?liveData.length:0;
    const hist=storedCount>=2?_fdmHistory.slice().reverse().map(e=>({date:e.date,price:e.price})):null;
    let inData=null,inFmt="iso";
    if(storedCount>=2&&storedCount>=liveCount){inData=hist;inFmt="iso";}
    else if(liveCount>=2){inData=liveData;inFmt="dmy";}
    else if(storedCount>=2){inData=hist;inFmt="iso";}

  }
  // === Underlying Sub-Fund chart (Morningstar timeseries) ===

    if(_fdmTimeseries&&_fdmTimeseries.prices&&_fdmTimeseries.prices.length>=2){
      _fdmChartUnd=_buildChart(canvas2,_fdmTimeseries.prices,period,"iso","Underlying Sub-Fund","#a78bfa","rgba(167,139,250,0.1)");
    }

}
function _buildChart(canvas,chartData,period,fmt,label,forceCol,forceColBg){
  if(!chartData||!chartData.length)return null;
  const days={"1M":30,"3M":91,"6M":182,"1Y":365,"3Y":1095,"5Y":1825,"SI":36500}[period]||365;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
  const toDate=d=>fmt==="iso"?new Date(d):new Date(d.split("/").reverse().join("-"));
  const filtered=chartData.filter(e=>toDate(e.date)>=cutoff);
  const data=filtered.length>=2?filtered:chartData;
  const prices=data.map(e=>e.price);
  const labels=data.map(e=>toDate(e.date).toLocaleDateString("en-SG",{day:"numeric",month:"short",year:data.length>180?"2-digit":"numeric"}));
  const first=prices[0],last=prices[prices.length-1];
  const isUp=last>=first;
  const col=forceCol||(isUp?"#10b981":"#ef4444");
  const colBg=forceColBg||(isUp?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)");
  return new Chart(canvas,{
    type:"line",
    data:{labels,datasets:[{data:prices,borderColor:col,backgroundColor:colBg,borderWidth:2,fill:true,
      pointRadius:data.length>120?0:3,pointHoverRadius:7,tension:0.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',axis:'x',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:items=>items[0]?.label||"",
          label:c=>`${label||"Bid"}: $${c.raw.toFixed(6)}`
        }}
      },
      scales:{
        x:{ticks:{maxTicksLimit:7,color:"#6b7280",maxRotation:0},grid:{color:"rgba(255,255,255,0.04)"}},
        y:{ticks:{color:"#6b7280",callback:v=>"$"+v.toFixed(4)},grid:{color:"rgba(255,255,255,0.04)"}}
      }
    },
    plugins:[xhairPlugin]
  });
}

// 🧮 SCENARIO CALCULATOR
// ══════════════════════════════════════════════════════════════════════════════
let _calcSubTab="planner",_calcChart2=null;
let _calcS=[
  {name:"Bank / Savings Account",startAge:30,endAge:65,mode:"monthly",amount:0,lump:0,rate:0.05},
  {name:"Investments",           startAge:30,endAge:65,mode:"monthly",amount:0,lump:0,rate:8.0}

function calcFV(s,yrsOverride){
  const yrs=yrsOverride!==undefined?yrsOverride:Math.max(0,(+s.endAge||65)-(+s.startAge||30));
  const mthly=s.mode==="monthly"?+s.amount:(+s.amount/12);
  const r=+s.rate/100,rm=r/12,mo=yrs*12,L=+(s.lump)||0;
  if(mo<=0)return{fv:L,totalDep:L,growth:0,pctGained:0,rule72:null,passiveMo:L*0.04/12,yrs,mthly,annual:mthly*12};
  const fv=rm<1e-9?L+mthly*mo:(()=>{const gf=Math.pow(1+rm,mo);return L*gf+mthly*(gf-1)/rm;})();
  const totalDep=L+mthly*mo;
  const growth=Math.max(0,fv-totalDep);
  return{fv,totalDep,growth,pctGained:totalDep>0?growth/totalDep*100:0,rule72:r>0?72/+s.rate:null,passiveMo:fv*0.04/12,yrs,mthly,annual:mthly*12};
}

function $fc(v){return"$"+Math.round(Math.max(0,v)).toLocaleString("en-SG");}
// Show enough decimal places so tiny % values like 0.05% don't show as 0%
function fmtPct(v){if(v===0)return"0%";if(Math.abs(v)<0.1)return v.toFixed(2)+"%";if(Math.abs(v)<1)return v.toFixed(1)+"%";return Math.round(v)+"%";}

function renderCalculator(){
  const [s1,s2]=_calcS,r1=calcFV(s1),r2=calcFV(s2);
  let h=`<div class="calc-page">
    <div class="calc-header">
      <div class="calc-title">🧮 Scenario Calculator</div>
      <div class="calc-subtitle">Enter the numbers to show your prospect the compounding difference between a bank account and an investment fund.</div>
    </div>
    <div class="calc-sub-tabs">
      <button class="calc-sub-tab${_calcSubTab==="planner"?" active":""}" onclick="switchCalcTab('planner')">📊 Scenario Planner</button>
      <button class="calc-sub-tab${_calcSubTab==="projection"?" active":""}" onclick="switchCalcTab('projection')">📅 Year-by-Year Table</button>
    </div>`;
  if(_calcSubTab==="planner"){
    h+=buildCalcPlanner(s1,s2,r1,r2);
  } else {
    h+=buildCalcProjection(s1,s2);
  }
  h+=`</div>`;
  return h;
}

function buildCalcPlanner(s1,s2,r1,r2){
  const diff=r2.fv-r1.fv,diffPct=r1.fv>0?diff/r1.fv*100:0;
  const winCol=diff>=0?"var(--gold)":"#06b6d4";
  const winName=diff>=0?esc(s2.name):esc(s1.name);
  const mult=r1.fv>0?(r2.fv/r1.fv).toFixed(1):"—";
  let h=``;

  // ── TOP: Input panels ──
  h+=`<div class="calc-inputs-row">
    ${buildCalcInput(0,s1,"#06b6d4")}
    ${buildCalcInput(1,s2,"var(--gold)")}
  </div>`;

  // ── MIDDLE: Glowing difference banner ──
  h+=`<div class="calc-diff-banner" id="calc-diff">
    <div class="calc-diff-ico">${diff>=0?"🏆":"📊"}</div>
    <div>
      <div class="calc-diff-main">${winName} creates <span style="color:${winCol};">${$fc(Math.abs(diff))} more wealth</span> over ${Math.max(r1.yrs,r2.yrs)} years</div>
      <div class="calc-diff-sub">
        That's <strong style="color:${winCol};">${Math.abs(diffPct).toFixed(1)}% more total value</strong>
        ${diff>=0&&+mult>0?` — Scenario 2 ends up <strong style="color:var(--gold);">${mult}× larger</strong>`:""}
        &nbsp;·&nbsp; Same deposits, dramatically different outcomes — the power of compounding.
      </div>
    </div>
  </div>`;

  // ── BOTTOM: Full-width chart ──
  h+=`<div class="calc-chart-panel">
    <div class="calc-chart-title">Total Value Comparison — Deposits vs Growth</div>
    <canvas id="calcChartCanvas" style="position:absolute;inset:44px 18px 18px;width:calc(100% - 36px)!important;height:calc(100% - 62px)!important;"></canvas>
  </div>`;

  // ── BOTTOM: Result cards side by side (S1 left, S2 right) ──
  h+=`<div class="calc-bottom-cards">
    <div class="calc-rc" id="calc-rc-0" style="border-left:3px solid #06b6d4;">
      ${buildCalcCard(s1,r1,"#06b6d4",1)}
    </div>
    <div class="calc-rc" id="calc-rc-1" style="border-left:3px solid var(--gold);">
      ${buildCalcCard(s2,r2,"var(--gold)",2)}
    </div>
  </div>`;

  h+=`<div class="calc-disclaimer">* Est. Monthly Passive Income uses the 4% annual withdrawal rule (FV × 4% ÷ 12). Illustrations are hypothetical and do not guarantee future returns. Compound interest formula assumes end-of-period contributions. Does not account for fees, taxes, inflation, or policy charges. Not financial advice — for illustration purposes only.</div>`;
  return h;
}

function buildCalcCard(s,r,col,num){
  const depPct=r.fv>0?(r.totalDep/r.fv*100):100;
  const growPct=100-depPct;
  return`<div class="calc-rc-name" style="color:${col};">Scenario ${num} · ${esc(s.name)}</div>
    <div class="calc-rc-fv">${$fc(r.fv)}</div>
    <div class="calc-rc-sub">Total value after ${r.yrs} year${r.yrs!==1?"s":""} at ${s.rate}% p.a.</div>
    <div style="height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06);margin-bottom:10px;display:flex;">
      <div style="width:${depPct.toFixed(1)}%;background:#3b82f6;"></div>
      <div style="width:${growPct.toFixed(1)}%;background:${col};"></div>
    </div>
    <div class="calc-rc-grid">
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Total Deposits</div>
        <div class="calc-rc-stat-val" style="color:#60a5fa;">${$fc(r.totalDep)}</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Growth Earned</div>
        <div class="calc-rc-stat-val" style="color:var(--green);">+${$fc(r.growth)}</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">% Gained on Deposits</div>
        <div class="calc-rc-stat-val" style="color:${r.pctGained>=0?"var(--green)":"var(--red)"};">${r.pctGained>=0?"+":""}${r.pctGained.toFixed(1)}%</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Est. Monthly Income*</div>
        <div class="calc-rc-stat-val" style="color:${col};">${$fc(r.passiveMo)}/mo</div>
      </div>
      ${r.rule72?`<div class="calc-rc-stat" style="grid-column:span 2;">
        <div class="calc-rc-stat-lbl"><span class="rule72-link" onclick="showRule72Popup(${+s.rate})">Rule of 72</span> — Money Doubles Every</div>
        <div class="calc-rc-stat-val">${r.rule72.toFixed(1)} yrs at ${s.rate}% p.a.</div>
      </div>`:""}
    </div>`;
}

function buildCalcInput(idx,s,col){
  const altAmt=s.mode==="monthly"?s.amount*12:s.amount/12;
  const altLabel=s.mode==="monthly"?"annual":"monthly";
  return`<div class="calc-input-panel">
    <div class="calc-ip-hd" style="color:${col};">⚙ Scenario ${idx+1} — Inputs</div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Scenario Name</label>
      <input class="calc-ip-name" value="${esc(s.name)}" placeholder="e.g. Bank Savings" oninput="calcSet(${idx},'name',this.value)" style="border-color:${col}30;"/>
    </div>
    <div class="calc-ip-2col">
      <div class="calc-ip-field" style="margin-bottom:0;">
        <label class="calc-ip-label">Start Age</label>
        <input class="calc-ip-input" type="number" min="0" max="99" value="${s.startAge}" oninput="calcSet(${idx},'startAge',+this.value)"/>
      </div>
      <div class="calc-ip-field" style="margin-bottom:0;">
        <label class="calc-ip-label">End Age</label>
        <input class="calc-ip-input" type="number" min="1" max="100" value="${s.endAge}" oninput="calcSet(${idx},'endAge',+this.value)"/>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Lump Sum / Initial Amount (optional)</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym left">$</span>
        <input class="calc-ip-input pl" type="number" min="0" value="${s.lump||0}" oninput="calcSet(${idx},'lump',+this.value)"/>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Deposit Frequency</label>
      <div class="calc-mode-row">
        <button class="calc-mode-btn${s.mode==="monthly"?" active":""}" onclick="calcSet(${idx},'mode','monthly')">Monthly</button>
        <button class="calc-mode-btn${s.mode==="annual"?" active":""}" onclick="calcSet(${idx},'mode','annual')">Annual</button>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label" id="calc-dep-lbl-${idx}">${s.mode==="monthly"?"Monthly":"Annual"} Deposit Amount</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym left">$</span>
        <input class="calc-ip-input pl" type="number" min="0" value="${s.amount}" oninput="calcSet(${idx},'amount',+this.value)"/>
      </div>
      <div class="calc-ip-hint" id="calc-hint-${idx}">≈ ${$fc(altAmt)} ${altLabel}</div>
    </div>
    <div class="calc-ip-field" style="margin-bottom:0;">
      <label class="calc-ip-label">Annual Rate of Return</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym right">%</span>
        <input class="calc-ip-input pr" type="number" min="0" max="50" step="0.1" value="${s.rate}" oninput="calcSet(${idx},'rate',+this.value)"/>
      </div>
    </div>
  </div>`;
}

function buildCalcProjection(s1,s2){
  const yrs1=Math.max(0,(+s1.endAge||65)-(+s1.startAge||30));
  const yrs2=Math.max(0,(+s2.endAge||65)-(+s2.startAge||30));
  const maxYrs=Math.max(yrs1,yrs2,1);
  const milestones=new Set([1,5,10,15,20,25,30,35,40,maxYrs]);
  let rows="";
  for(let y=1;y<=maxYrs;y++){
    const v1=y<=yrs1?calcFV(s1,y):null;
    const v2=y<=yrs2?calcFV(s2,y):null;
    const diff=v1&&v2?v2.fv-v1.fv:null;
    const isMile=milestones.has(y);
    rows+=`<tr class="${isMile?"proj-milestone":""}">
      <td>${y}${isMile?` <span style="color:var(--gold);font-size:10px;">●</span>`:""}</td>
      <td>${v1?$fc(v1.totalDep):"—"}</td>
      <td style="color:#60a5fa;">${v1?$fc(v1.fv):"—"}</td>
      <td style="color:var(--green);">${v1&&v1.pctGained>0?"+"+fmtPct(v1.pctGained):"—"}</td>
      <td>${v2?$fc(v2.totalDep):"—"}</td>
      <td style="color:var(--gold);">${v2?$fc(v2.fv):"—"}</td>
      <td style="color:var(--green);">${v2&&v2.pctGained>0?"+"+fmtPct(v2.pctGained):"—"}</td>
      <td style="color:${diff===null?"var(--dim)":diff>=0?"var(--gold)":"var(--red)"};font-weight:800;">${diff===null?"—":diff>=0?"+"+$fc(diff):"-"+$fc(Math.abs(diff))}</td>
    </tr>`;
  }
  return`<div class="calc-proj-wrap">
    <table class="calc-proj-table">
      <colgroup>
        <col class="col-yr"/>
        <col class="col-dep"/><col class="col-val"/><col class="col-pct"/>
        <col class="col-dep"/><col class="col-val"/><col class="col-pct"/>
        <col class="col-diff"/>
      </colgroup>
      <thead>
        <tr class="proj-group">
          <th></th>
          <th colspan="3" class="group-hd" style="color:#60a5fa;border-right:1px solid rgba(255,255,255,0.08);">S1 · ${esc(s1.name)}</th>
          <th colspan="3" class="group-hd" style="color:var(--gold);border-right:1px solid rgba(255,255,255,0.08);">S2 · ${esc(s2.name)}</th>
          <th></th>
        </tr>
        <tr>
          <th>Year</th>
          <th>Deposits</th>
          <th style="color:#60a5fa;">Value</th>
          <th style="color:var(--green);">% Gain</th>
          <th>Deposits</th>
          <th style="color:var(--gold);">Value</th>
          <th style="color:var(--green);">% Gain</th>
          <th>Diff</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="calc-disclaimer">● = milestone years. Values rounded to nearest dollar. Same assumptions as Scenario Planner. Not financial advice.</div>`;
}

function drawCalcChart(){
  const canvas=document.getElementById("calcChartCanvas");
  if(!canvas)return;
  if(_calcChart2){_calcChart2.destroy();_calcChart2=null;}
  const [s1,s2]=_calcS,r1=calcFV(s1),r2=calcFV(s2);
  _calcChart2=new Chart(canvas,{
    type:"bar",
    data:{
      labels:[esc(s1.name),esc(s2.name)],
      datasets:[
        {label:"Total Deposits",data:[r1.totalDep,r2.totalDep],backgroundColor:["rgba(96,165,250,0.75)","rgba(96,165,250,0.75)"],borderColor:["#60a5fa","#60a5fa"],borderWidth:1,borderRadius:4,borderSkipped:"bottom"},
        {label:"Growth",data:[r1.growth,r2.growth],backgroundColor:["rgba(34,197,94,0.7)","rgba(245,158,11,0.8)"],borderColor:["#22c55e","#f59e0b"],borderWidth:1,borderRadius:4,borderSkipped:"bottom"}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:"#94a3b8",font:{size:11,weight:"bold"},boxWidth:12,padding:16}},
        tooltip:{
          callbacks:{
            label:ctx=>{
              const v=ctx.raw;
              return` ${ctx.dataset.label}: $${Math.round(v).toLocaleString()}`;
            }
          }
        }
      },
      scales:{
        x:{stacked:true,ticks:{color:"#94a3b8",font:{size:12,weight:"bold"}},grid:{color:"rgba(255,255,255,0.04)"}},
        y:{stacked:true,ticks:{color:"#64748b",font:{size:11},callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:"rgba(255,255,255,0.05)"}}
      }
    }
  });
}

function updateCalcUI(){
  const [s1,s2]=_calcS,r1=calcFV(s1),r2=calcFV(s2);
  // Update result cards
  const c0=document.getElementById("calc-rc-0"),c1=document.getElementById("calc-rc-1");
  if(c0)c0.innerHTML=buildCalcCard(s1,r1,"#06b6d4",1);
  if(c1)c1.innerHTML=buildCalcCard(s2,r2,"var(--gold)",2);
  // Update diff banner
  const diff=r2.fv-r1.fv,diffPct=r1.fv>0?diff/r1.fv*100:0;
  const db=document.getElementById("calc-diff");
  if(db){
    const winCol=diff>=0?"var(--gold)":"#06b6d4";
    const winName=diff>=0?esc(s2.name):esc(s1.name);
    const mult=r1.fv>0?(r2.fv/r1.fv).toFixed(1):"—";
    db.innerHTML=`<div class="calc-diff-ico">${diff>=0?"🏆":"📊"}</div>
      <div>
        <div class="calc-diff-main">${winName} creates <span style="color:${winCol};">${$fc(Math.abs(diff))} more wealth</span> over ${Math.max(r1.yrs,r2.yrs)} years</div>
        <div class="calc-diff-sub">
          That's <strong style="color:${winCol};">${Math.abs(diffPct).toFixed(1)}% more total value</strong>
          ${diff>=0&&+mult>0?` — Scenario 2 ends up <strong style="color:var(--gold);">${mult}× larger</strong>`:""}
          &nbsp;·&nbsp; Same deposits, dramatically different outcomes — the power of compounding.
        </div>
      </div>`;
  }
  // Update deposit hints + labels
  [0,1].forEach(i=>{
    const s=_calcS[i];
    const hint=document.getElementById(`calc-hint-${i}`);
    if(hint){const alt=s.mode==="monthly"?s.amount*12:s.amount/12;hint.textContent=`≈ ${$fc(alt)} ${s.mode==="monthly"?"annual":"monthly"}`;}
    const lbl=document.getElementById(`calc-dep-lbl-${i}`);
    if(lbl)lbl.textContent=`${s.mode==="monthly"?"Monthly":"Annual"} Deposit Amount`;
  });
  drawCalcChart();
}

window.switchCalcTab=k=>{
  _calcSubTab=k;
  document.getElementById("app").innerHTML=renderCalculator();
  if(k==="planner")setTimeout(drawCalcChart,60);
};

window.calcSet=(idx,field,val)=>{
  _calcS[idx][field]=val;
  if(field==="mode"){
    document.getElementById("app").innerHTML=renderCalculator();
    setTimeout(drawCalcChart,60);
  } else {
    updateCalcUI();
  }
};

window.showRule72Popup=rate=>{
  const years=rate>0?(72/rate).toFixed(1):"∞";
  const ex=rate>0?Math.round(72/rate):null;
  document.body.insertAdjacentHTML("beforeend",`
    <div class="calc-popup-overlay" id="r72overlay" onclick="if(event.target===this)closeRule72()">
      <div class="calc-popup">
        <button class="calc-popup-close" onclick="closeRule72()">✕</button>
        <div class="calc-popup-title">📐 What is the Rule of 72?</div>
        <div class="calc-popup-body">
          The Rule of 72 is a <strong style="color:var(--text);">simple mental shortcut</strong> to estimate how long it takes your money to double — without a calculator.<br><br>
          Just <strong style="color:var(--gold);">divide 72 by your annual return rate</strong> and you get the approximate number of years it takes to double.
          <div class="calc-popup-example">
            <strong style="color:var(--gold);">Your scenario at ${rate}% p.a.:</strong><br>
            72 ÷ ${rate} = <strong style="color:var(--text);">${years} years</strong> to double your money${ex?`<br><br>
            So if you start with $10,000 today, it becomes roughly <strong style="color:var(--green);">$20,000 in ${years} years</strong> — and <strong style="color:var(--green);">$40,000 in ${ex*2} years</strong> — purely from compound interest.`:""}
          </div>
          <br>
          <span style="font-size:12px;color:var(--dim);">It's an approximation — accurate for rates between 1–15%. The lower the rate, the longer it takes to double. This is why a 0.05% bank account takes <em>over 1,400 years</em> to double.</span>
        </div>
      </div>
    </div>`);
};
window.closeRule72=()=>document.getElementById("r72overlay")?.remove();

// ── ESC key: close topmost layer or navigate back ──
document.addEventListener("keydown",e=>{
  if(e.key!=="Escape")return;
  // 1. Present mode (highest z-index)
  if(document.getElementById("presentOverlay")?.classList.contains("show")){
    closePresent();return;
  }
  // 2. Reinvest modal (dynamically inserted)
  if(document.getElementById("reinvestModal")){
    document.getElementById("reinvestModal").remove();return;
  }
  // 3. Rule of 72 popup
  if(document.getElementById("r72overlay")){
    closeRule72();return;
  }
  // 4. Fund Detail modal
  const fdm=document.getElementById("fdmOverlay");
  if(fdm&&fdm.style.display!=="none"&&fdm.style.display!==""){
    closeFundDetail();return;
  }
  // 5. Client detail page → back to dashboard
  if(tab==="client"){goBack();return;}
  // 6. Add Client form → back to dashboard
  if(tab==="addclient"){tab="dashboard";renderAll();return;}
});

autoFetchPricesOnStartup();
</script>
