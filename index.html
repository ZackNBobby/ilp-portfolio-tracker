<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILP Portfolio Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
button,input,select,textarea{font-family:inherit;}

/* ── Midnight Gold palette ── */
:root{
  --bg:#04080f;--bg2:#07101e;--bg3:#0c1828;--bg4:#111f30;
  --gold:#f59e0b;--gold-l:#fbbf24;--gold-d:#d97706;--gold-dim:#92400e;
  --gold-glow:rgba(245,158,11,0.15);--gold-border:rgba(245,158,11,0.22);
  --text:#f1f5f9;--muted:#d0d8e4;--dim:#b4bcc8;--faint:#1e293b;
  --green:#22c55e;--green-d:#15803d;--red:#ef4444;--blue:#60a5fa;
  --radius:14px;
}

/* ── Animations ── */
@property --ba{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes borderSpin{to{--ba:360deg;}}
@keyframes goldShimmer{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
@keyframes goldSweep{0%,15%{left:-70%;}80%,100%{left:120%;}}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,15px) scale(0.97);}
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(6,182,212,0.6);}50%{opacity:0.85;box-shadow:0 0 0 5px rgba(6,182,212,0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes coinFlip{0%,100%{transform:rotateY(0deg);}50%{transform:rotateY(180deg);}}
@keyframes countUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmerBar{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes glow{0%,100%{box-shadow:0 0 12px var(--gold-glow);}50%{box-shadow:0 0 28px rgba(245,158,11,0.35);}}
@keyframes breathe{0%,100%{filter:brightness(0.7);}50%{filter:brightness(1.3);}}

/* ── Base ── */
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(245,158,11,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 80%,rgba(251,191,36,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(217,119,6,0.03) 0%,transparent 60%);
}

/* ── Floating orbs (background) ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);animation:orbFloat ease-in-out infinite;}
.orb1{width:400px;height:400px;top:-100px;left:-100px;background:rgba(245,158,11,0.05);animation-duration:18s;}
.orb2{width:300px;height:300px;bottom:-80px;right:-80px;background:rgba(251,191,36,0.04);animation-duration:22s;animation-delay:-8s;}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.login-card{
  background:rgba(7,16,30,0.96);backdrop-filter:blur(20px);
  border-radius:24px;padding:48px 32px 40px;
  border:1px solid var(--gold-border);
  max-width:380px;width:100%;text-align:center;
  box-shadow:0 8px 60px rgba(0,0,0,0.8),0 0 40px var(--gold-glow),inset 0 1px 0 rgba(245,158,11,0.08);
  animation:fadeInUp 0.5s ease;
}
.login-icon{font-size:52px;margin-bottom:16px;display:inline-block;animation:coinFlip 4s ease-in-out infinite;}
.login-card h2{
  font-size:24px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 50%,#fde68a 100%);
  background-size:200% 200%;animation:goldShimmer 4s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{font-size:13px;color:var(--dim);margin-bottom:36px;line-height:1.7;}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 20px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);background:#fff;
  color:#3c4043;font-size:15px;font-weight:600;cursor:pointer;
  transition:box-shadow 0.2s,transform 0.2s;
}
.btn-google:hover{box-shadow:0 4px 20px rgba(0,0,0,0.5);transform:translateY(-1px);}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#04080f,#060e1a,#080f1e,#05090e);
  background-size:400% 400%;animation:goldShimmer 12s ease infinite;
  padding:12px 24px 10px;border-bottom:1px solid var(--gold-border);
  position:relative;overflow:hidden;text-align:center;z-index:1;
}
.header::before{
  content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.06),rgba(251,191,36,0.04),transparent);
  animation:goldSweep 8s ease-in-out infinite;
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.6),rgba(251,191,36,0.8),rgba(245,158,11,0.6),transparent);
}
.header h1{
  font-size:18px;font-weight:800;letter-spacing:-0.2px;margin-bottom:0;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 40%,#fde68a 70%,var(--gold-l) 100%);
  background-size:300% 300%;animation:goldShimmer 5s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}
.header-sub{font-size:12px;color:#a16207;font-weight:600;font-style:italic;position:relative;}
.signout{
  position:absolute;top:14px;right:14px;
  background:rgba(30,41,59,0.7);border:1px solid var(--faint);
  border-radius:8px;padding:6px 12px;color:var(--dim);
  font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;z-index:10;
}
.signout:hover{background:rgba(127,29,29,0.5);border-color:rgba(239,68,68,0.3);color:#fca5a5;}

/* ── Tabs ── */
.tabs{
  display:flex;justify-content:center;background:rgba(4,8,15,0.95);
  border-bottom:1px solid rgba(30,41,59,0.5);
  overflow-x:auto;backdrop-filter:blur(8px);position:relative;z-index:1;
}
.tab-btn{
  padding:13px 18px;border:none;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  background:transparent;color:var(--dim);
  border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;
  position:relative;
}
.tab-btn.active{color:#06b6d4;}
.tab-btn.active::before{
  content:'';position:absolute;inset:-1px;padding:1.5px;
  background:conic-gradient(from var(--ba),#f59e0b 0deg,transparent 60deg,transparent 150deg,#06b6d4 180deg,transparent 240deg,transparent 330deg,#f59e0b 360deg);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  border-radius:4px 4px 0 0;animation:borderSpin 2.5s linear infinite;pointer-events:none;
}
.tab-btn:hover:not(.active){color:var(--muted);border-bottom-color:rgba(6,182,212,0.35);}

/* ── Dashboard product filter tabs ── */
.dash-tab-btn{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.18s;position:relative;
  border:1px solid rgba(245,158,11,0.18);
  background:rgba(245,158,11,0.04);
  color:rgba(245,158,11,0.42);
}
.dash-tab-btn.active{
  background:var(--gold-glow);color:var(--gold-l);
  border:1px solid transparent;
}
.dash-tab-btn.active::before{
  content:'';position:absolute;inset:-1px;padding:1.5px;
  background:conic-gradient(from var(--ba),#f59e0b 0deg,transparent 60deg,transparent 150deg,#fde68a 180deg,transparent 240deg,transparent 330deg,#f59e0b 360deg);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  border-radius:20px;animation:borderSpin 2.5s linear infinite;pointer-events:none;
}
.dash-tab-btn:hover:not(.active){
  border-color:rgba(245,158,11,0.35);color:rgba(245,158,11,0.65);
  background:rgba(245,158,11,0.07);
}
.dash-tab-count{
  background:rgba(245,158,11,0.1);padding:1px 7px;
  border-radius:10px;font-size:11px;
}
.dash-tab-btn.active .dash-tab-count{background:rgba(245,158,11,0.2);}

/* ── Name privacy blur ── */
.name-blur{
  filter:blur(7px);user-select:none;
  transition:filter 0.3s ease;display:inline-block;
}
.names-revealed .name-blur{filter:none;user-select:auto;}
.blur-toggle-btn{
  display:flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;
  border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.06);
  color:rgba(245,158,11,0.65);transition:all 0.18s;margin-left:auto;
}
.blur-toggle-btn:hover{background:rgba(245,158,11,0.12);color:var(--gold-l);}

/* ── Period selector ── */
.period-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.period-lbl{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-right:2px;}
.period-btn{
  padding:3px 11px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;
  transition:all 0.15s;
  border:1px solid rgba(245,158,11,0.18);
  background:rgba(245,158,11,0.04);
  color:rgba(245,158,11,0.42);
}
.period-btn.active{
  background:rgba(245,158,11,0.15);color:var(--gold-l);
  border-color:rgba(245,158,11,0.5);
}
.period-btn:hover:not(.active){border-color:rgba(245,158,11,0.35);color:rgba(245,158,11,0.65);}

/* ── Premium due badge ── */
.prem-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.prem-badge.urgent{color:var(--red);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.28);}
.prem-badge.warning{color:#f97316;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.28);}

/* ── Premium paid button ── */
.prem-pay-btn{
  margin-left:5px;padding:1px 6px;border-radius:6px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid currentColor;background:transparent;color:inherit;
  transition:background 0.15s,color 0.15s;
}
.prem-pay-btn:hover{background:rgba(255,255,255,0.15);}

/* ── Premium due banner ── */
.prem-banner{
  display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;
  background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.22);
  font-size:12px;color:#fb923c;margin-bottom:12px;
}

/* ── Client sub-tabs ── */
.client-subtab-bar{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--gold-border);padding-bottom:0;}
.client-subtab{
  padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;
  border:none;background:none;color:var(--dim);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.18s;
}
.client-subtab.active{color:var(--gold-l);border-bottom-color:var(--gold);}
.client-subtab:hover:not(.active){color:var(--muted);}

/* ── Print / PDF Report ── */
.btn-print{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid rgba(96,165,250,0.35);background:rgba(96,165,250,0.08);
  color:#93c5fd;transition:all 0.18s;
}
.btn-print:hover{background:rgba(96,165,250,0.16);border-color:rgba(96,165,250,0.55);}
@media print{
  /* Hide all navigation and interactive elements */
  .orb,#tabBar,.header,.blur-toggle-btn,.btn-back,.btn-del,.btn-present,.btn-print,
  .prem-pay-btn,.dash-tab-btn,.period-bar,.search-wrap,.client-sticky-hdr .btn-back,
  .growth-tabs,.chart-card:has(#gwrap-sp500),.prem-banner{display:none!important;}
  /* Print header injected via JS */
  #printHeader{display:block!important;}
  /* Force white background + dark text */
  *{color:#111!important;background:transparent!important;box-shadow:none!important;
     border-color:#ddd!important;backdrop-filter:none!important;filter:none!important;}
  body{background:#fff!important;padding:0;margin:0;}
  .card{border:1px solid #e2e8f0!important;border-radius:8px!important;margin-bottom:12px!important;}
  /* Unblur all names */
  .name-blur{filter:none!important;user-select:auto!important;}
  /* Keep the client sticky header visible but static */
  .client-sticky-hdr{position:static!important;border-bottom:2px solid #e2e8f0!important;
    padding:12px 0!important;margin-bottom:16px!important;}
  /* Prevent page breaks inside cards */
  .stat-card,.fund-card,.card{break-inside:avoid;}
  /* Hide charts that don't render well in print */
  .charts-row,.chart-card{display:none!important;}
  /* Gold-ify headings */
  .sec-title{color:#b45309!important;border-bottom:1px solid #fcd34d!important;}
  .stat-val.gold{color:#b45309!important;}
}

/* ── Sticky client header ── */
.client-sticky-hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(4,8,15,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(245,158,11,0.12);
  padding:10px 0 12px;margin-bottom:16px;
  margin-left:-24px;margin-right:-24px;
  padding-left:24px;padding-right:24px;
}
@media(max-width:600px){
  .client-sticky-hdr{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px;}
}

/* ── Content ── */
.content{padding:20px 24px;max-width:980px;margin:0 auto;position:relative;z-index:1;}

/* ── Cards ── */
.card{
  background:var(--bg2);backdrop-filter:blur(12px);
  border-radius:var(--radius);padding:20px;
  border:1px solid rgba(30,41,59,0.6);margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(245,158,11,0.03);
  transition:border-color 0.22s,box-shadow 0.22s;
}
.card:hover{border-color:var(--gold-border);box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 20px var(--gold-glow);}
.card-gold{
  background:linear-gradient(135deg,#080e1a,#0a1220,#0d1628);
  border:1px solid var(--gold-border);
  box-shadow:0 0 30px var(--gold-glow),inset 0 1px 0 rgba(245,158,11,0.06);
}
.card-dark{background:var(--bg3);border-radius:var(--radius);padding:16px;border:1px solid rgba(30,41,59,0.4);margin-bottom:12px;}

/* ── Client card ── */
.client-card{
  background:var(--bg2);border-radius:var(--radius);padding:18px;
  border:1px solid rgba(30,41,59,0.5);margin-bottom:12px;
  cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;
  animation:fadeInUp 0.4s ease both;
}
.client-card::before{
  content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.04),transparent);
  transition:left 0.5s ease;
}
.client-card:hover{border-color:var(--gold-border);box-shadow:0 0 24px var(--gold-glow);transform:translateY(-2px);}
.client-card:hover::before{left:120%;}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
@media(max-width:600px){.stat-grid-4{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--bg3);border-radius:12px;padding:14px;
  border:1px solid rgba(30,41,59,0.5);text-align:center;
  transition:border-color 0.2s;
}
.stat-card:hover{border-color:var(--gold-border);}
.stat-lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:900;}
.stat-val.gold{color:var(--gold-l);}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.blue{color:var(--blue);}
.stat-val.muted{color:var(--muted);}

/* ── Fund card ── */
.fund-card{
  background:var(--bg3);border-radius:var(--radius);padding:10px 14px;
  border:1px solid rgba(30,41,59,0.5);margin-bottom:0;
  animation:fadeInUp 0.4s ease both;transition:border-color 0.2s,opacity 0.2s;
}
.fund-card.dragging{opacity:0.35;border-color:var(--gold);}
.fund-card.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,158,11,0.25);}
.fund-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.drag-handle{color:var(--dim);cursor:grab;font-size:16px;line-height:1;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.fund-name{font-size:13px;font-weight:700;color:var(--gold-l);flex:1;margin:0;}
.fund-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(30,41,59,0.4);font-size:11px;}
.fund-row:last-child{border-bottom:none;}
.fund-row .lk{color:var(--dim);}
.fund-row .lv{font-weight:700;}
.btn-reinvest{background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:6px;padding:3px 9px;color:#c4b5fd;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
.btn-reinvest:hover{background:rgba(139,92,246,0.3);}

/* ── Progress bar ── */
.prog-wrap{background:rgba(0,0,0,0.3);border-radius:8px;height:8px;overflow:hidden;margin:4px 0;}
.prog-bar{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-l));
  background-size:200% auto;animation:shimmerBar 2.5s linear infinite;
  transition:width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.prog-bar.green{background:linear-gradient(90deg,var(--green-d),var(--green),#86efac);background-size:200% auto;animation:shimmerBar 2.5s linear infinite;}
.prog-bar.red{background:var(--red);}

/* ── Buttons ── */
.btn-pri{
  padding:12px 20px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  color:#0a0500;font-size:14px;font-weight:800;
  transition:all 0.22s;box-shadow:0 2px 16px rgba(245,158,11,0.3);
}
.btn-pri:hover{background:linear-gradient(135deg,var(--gold),var(--gold-l));box-shadow:0 0 28px rgba(245,158,11,0.5);transform:translateY(-2px);}
.btn-pri:active{transform:translateY(0);}
.btn-pri.full{width:100%;}
.btn-sec{
  padding:10px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  background:transparent;border:1px solid var(--gold-border);color:var(--gold);
  transition:all 0.2s;
}
.btn-sec:hover{background:var(--gold-glow);box-shadow:0 0 12px var(--gold-glow);}
.btn-sm{
  padding:5px 14px;border-radius:7px;border:1px solid var(--gold-border);
  background:rgba(245,158,11,0.08);color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.btn-sm:hover{background:var(--gold-glow);box-shadow:0 0 10px var(--gold-glow);}
.btn-del{
  background:rgba(127,29,29,0.6);border:1px solid rgba(239,68,68,0.2);
  border-radius:7px;padding:5px 12px;color:#fca5a5;font-size:12px;cursor:pointer;transition:all 0.2s;
}
.btn-del:hover{background:rgba(153,27,27,0.9);box-shadow:0 0 10px rgba(239,68,68,0.2);}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
  background:rgba(245,158,11,0.08);border:1px solid var(--gold-border);color:var(--gold);
  transition:all 0.2s;margin-bottom:16px;
}
.btn-back:hover{background:var(--gold-glow);}
.btn-present{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.1));
  border:1px solid var(--gold-border);color:var(--gold-l);transition:all 0.22s;
}
.btn-present:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-1px);}

/* ── Inputs ── */
.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600;}
.inp{
  width:100%;padding:10px 13px;border-radius:10px;
  border:1px solid rgba(30,41,59,0.6);background:rgba(12,24,40,0.9);
  color:var(--text);font-size:14px;transition:all 0.2s;outline:none;
}
.inp:hover{border-color:var(--gold-border);}
.inp:focus{border-color:rgba(245,158,11,0.6);box-shadow:0 0 0 3px rgba(245,158,11,0.08);}
.sel{
  width:100%;padding:10px 13px;border-radius:10px;
  border:1px solid rgba(30,41,59,0.6);background:rgba(12,24,40,0.9);
  color:var(--text);font-size:14px;transition:all 0.2s;outline:none;cursor:pointer;
}
.sel:hover{border-color:var(--gold-border);}
.sel:focus{border-color:rgba(245,158,11,0.6);box-shadow:0 0 0 3px rgba(245,158,11,0.08);}
.sel option{background:#0c1828;}
.inp.err{border-color:var(--red)!important;background:rgba(45,10,10,0.9)!important;}

/* ── Badges ── */
.badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-growth{background:rgba(21,128,61,0.25);color:#86efac;border:1px solid rgba(34,197,94,0.3);}
.badge-dividend{background:rgba(120,53,15,0.35);color:var(--gold-l);border:1px solid var(--gold-border);}
.badge-flex{background:rgba(30,58,138,0.35);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}
.badge-vantage{background:rgba(109,40,217,0.25);color:#d8b4fe;border:1px solid rgba(139,92,246,0.25);}
.badge-trivantage{background:rgba(80,7,36,0.4);color:#fda4af;border:1px solid rgba(244,63,94,0.25);}

/* ── Grid helpers ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}}
/* Fund breakdown: 2-col → 1-col on mobile */
.fund-breakdown-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.fund-breakdown-grid>.fund-card{min-width:0;}
@media(max-width:800px){.fund-breakdown-grid{grid-template-columns:1fr;}}
/* Entry price analysis: 2-col → 1-col on mobile */
.ep-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.ep-grid>*{min-width:0;}
@media(max-width:600px){.ep-grid{grid-template-columns:1fr;}}

/* ── Upload / drag-drop ── */
.drop-zone{
  border:2px dashed var(--gold-border);border-radius:var(--radius);
  padding:32px;text-align:center;cursor:pointer;transition:all 0.22s;
  background:rgba(245,158,11,0.03);position:relative;overflow:hidden;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--gold);background:rgba(245,158,11,0.08);
  box-shadow:0 0 24px var(--gold-glow);
}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:36px;margin-bottom:10px;display:block;}
.drop-text{font-size:14px;color:var(--muted);}
.drop-hint{font-size:11px;color:var(--dim);margin-top:4px;}

/* ── Transaction table ── */
.tx-table{width:100%;border-collapse:collapse;font-size:12px;}
.tx-table th{padding:8px 10px;text-align:left;color:var(--dim);border-bottom:1px solid var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:10px;}
.tx-table td{padding:9px 10px;border-bottom:1px solid rgba(15,25,40,0.8);color:var(--muted);}
.tx-table tr:hover td{background:rgba(245,158,11,0.03);}
.tx-table tr:last-child td{border-bottom:none;}
.tx-cat{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;}
.tx-premium{background:rgba(21,128,61,0.2);color:#86efac;}
.tx-bonus{background:rgba(120,53,15,0.3);color:var(--gold-l);}
.tx-fee{background:rgba(127,29,29,0.3);color:#fca5a5;}
.tx-dividend{background:rgba(109,40,217,0.25);color:#d8b4fe;}
.tx-reinvestment{background:rgba(109,40,217,0.2);color:#c4b5fd;}
.tx-switch_in{background:rgba(14,165,233,0.2);color:#7dd3fc;}
.tx-switch_out{background:rgba(234,88,12,0.2);color:#fdba74;}
.tx-other{background:rgba(30,41,59,0.5);color:var(--muted);}

/* ── Fund price editor ── */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:900px){.price-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.price-grid{grid-template-columns:1fr;}}
.price-card.drag-over{border-color:var(--gold)!important;box-shadow:0 0 0 2px rgba(245,158,11,0.3)!important;}
.price-card{
  background:var(--bg3);border-radius:10px;padding:12px 14px;
  border:1px solid rgba(30,41,59,0.5);
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;transition:border-color 0.18s,background 0.18s;
}
.price-card:hover{border-color:rgba(245,158,11,0.35);background:var(--bg4);}
.price-val{font-size:15px;font-weight:800;color:var(--green);white-space:nowrap;}

/* ── Presentation overlay ── */
.present-overlay{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#020508,#04080f,#060b14);
  overflow-y:auto;overflow-x:hidden;padding:40px 24px;display:none;
}
.present-overlay.show{display:block;}
.present-close{
  position:fixed;top:16px;right:16px;
  background:rgba(245,158,11,0.15);border:1px solid var(--gold-border);
  border-radius:8px;padding:8px 16px;color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;
  z-index:10000;transition:all 0.2s;
}
.present-close:hover{background:var(--gold-glow);}
.present-name{
  font-size:32px;font-weight:900;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,var(--gold-l),var(--gold),#fde68a,var(--gold-l));
  background-size:300% 300%;animation:goldShimmer 4s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.present-date{text-align:center;font-size:13px;color:var(--dim);margin-bottom:32px;}
.present-big{font-size:48px;font-weight:900;color:var(--gold-l);text-align:center;animation:countUp 0.5s ease;}

/* ── Empty state ── */
.empty{text-align:center;padding:40px;color:var(--dim);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:0.5;}

/* ── Section title ── */
.sec-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-glow),transparent);}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:16px;}
.search-inp{
  width:100%;padding:11px 16px 11px 40px;border-radius:12px;
  border:1px solid rgba(30,41,59,0.6);background:var(--bg2);
  color:var(--text);font-size:14px;outline:none;transition:all 0.2s;
}
.search-inp:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(245,158,11,0.06);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#1a1000,#2d1a00);
  border:1px solid var(--gold-border);border-radius:12px;
  padding:12px 24px;font-size:13px;font-weight:600;color:var(--gold-l);
  box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 20px var(--gold-glow);
  z-index:99999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── Upload status ── */
.upload-status{
  border-radius:10px;padding:12px 16px;margin-top:10px;font-size:13px;font-weight:600;display:none;
}
.upload-status.ok{background:rgba(21,128,61,0.2);border:1px solid rgba(34,197,94,0.3);color:#86efac;display:block;}
.upload-status.err{background:rgba(127,29,29,0.3);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;display:block;}

/* ── Fund allocation row ── */
.alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.alloc-row .fund-sel{flex:1;}
.alloc-pct{width:80px;}

/* ── Charts ── */
.chart-card{background:var(--bg2);border-radius:var(--radius);padding:18px;border:1px solid rgba(30,41,59,0.6);margin-bottom:14px;transition:border-color 0.22s;}
.chart-card:hover{border-color:var(--gold-border);}
.chart-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.chart-wrap{position:relative;width:100%;}
.growth-tabs{display:flex;gap:6px;flex-shrink:0;}
.growth-tab{background:rgba(30,41,59,0.6);border:1px solid rgba(71,85,105,0.4);border-radius:6px;color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.growth-tab:hover{border-color:rgba(245,158,11,0.5);color:var(--gold);}
.growth-tab.active{background:rgba(245,158,11,0.12);border-color:rgba(245,158,11,0.5);color:var(--gold);}
.sp500-legend{display:flex;gap:16px;margin-top:10px;font-size:11px;}
.sp500-leg-item{display:flex;align-items:center;gap:5px;color:var(--muted);}
.sp500-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:660px){.charts-row{grid-template-columns:1fr;}}

/* ── Gain pill ── */
.gain-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;}
.gain-pos{background:rgba(21,128,61,0.2);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.gain-neg{background:rgba(127,29,29,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.25);}

/* ── Responsive ── */
@media(max-width:600px){
  .content{padding:14px 12px;}
  .header{padding:10px 14px 8px;}
  .header h1{font-size:16px;}
  .present-big{font-size:32px;}
  .present-name{font-size:24px;}
  .stat-val{font-size:16px;}
  .inp,.sel,.search-inp{font-size:16px!important;}
  .fdm-perf-row{grid-template-columns:repeat(3,1fr);}
}
/* ── Fund Detail Modal ── */
.fdm-overlay{position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.82);display:none;align-items:center;justify-content:center;padding:12px;}
.fdm-box{background:var(--bg2);border-radius:18px;border:1px solid var(--border);width:100%;max-width:700px;height:min(88vh,720px);display:flex;flex-direction:column;box-shadow:0 20px 80px rgba(0,0,0,0.9);position:relative;}
.fdm-hdr{padding:20px 22px 0;border-radius:18px 18px 0 0;flex-shrink:0;}
.fdm-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:8px;padding-right:44px;line-height:1.3;}
.fdm-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.fdm-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.04em;}
.fdm-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.fdm-tab{padding:10px 18px;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all 0.15s;position:relative;}
.fdm-tab.active{color:#a78bfa;border-bottom-color:#a855f7;}
.fdm-tab.active::before{content:'';position:absolute;inset:-1px;padding:1.5px;background:conic-gradient(from var(--ba),#a855f7 0deg,transparent 60deg,transparent 150deg,#f43f5e 180deg,transparent 240deg,transparent 330deg,#a855f7 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;border-radius:4px 4px 0 0;animation:borderSpin 2.5s linear infinite;pointer-events:none;}
.fdm-body{padding:18px 22px 22px;overflow-y:auto;flex:1;}
.fdm-alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.fdm-alloc-label{font-size:12px;color:#cbd5e1;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fdm-alloc-bar-bg{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.fdm-alloc-bar{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.fdm-alloc-pct{font-size:12px;font-weight:700;color:#f1f5f9;width:44px;text-align:right;flex-shrink:0;}
.fdm-hold-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.fdm-hold-rank{font-size:10px;color:var(--dim);width:18px;text-align:center;flex-shrink:0;}
.fdm-hold-name{flex:1;font-size:12px;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fdm-hold-pct{font-size:12px;font-weight:700;color:var(--gold);width:44px;text-align:right;flex-shrink:0;}
.fdm-hold-bar-bg{width:80px;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;flex-shrink:0;}
.fdm-hold-bar{height:100%;border-radius:3px;background:var(--gold);}
.fdm-close{position:absolute;right:16px;top:16px;background:rgba(255,255,255,0.07);border:none;color:var(--dim);font-size:16px;cursor:pointer;border-radius:8px;padding:5px 10px;transition:all 0.15s;z-index:1;}
.fdm-close:hover{background:rgba(255,255,255,0.14);color:#fff;}
.fdm-sec-hd{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin:18px 0 10px;}
.fdm-sec-hd:first-child{margin-top:0;}
.fdm-kv{display:flex;gap:8px;font-size:13px;margin-bottom:7px;align-items:flex-start;}
.fdm-kv .k{color:#94a3b8;min-width:130px;flex-shrink:0;font-size:13px;}
.fdm-kv .v{color:#f1f5f9;font-weight:600;line-height:1.4;font-size:13px;}
.fdm-text{font-size:14px;color:#cbd5e1;line-height:1.7;margin-bottom:10px;}
.fdm-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fdm-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#93c5fd;}
.fdm-perf-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:14px 0;}
.fdm-perf-cell{background:var(--card);border-radius:10px;padding:10px 4px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.fdm-perf-cell:hover,.fdm-perf-cell.active{border-color:var(--gold);background:rgba(245,158,11,0.08);}
.fdm-perf-period{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.fdm-perf-pct{font-size:14px;font-weight:900;}
.fdm-chart-wrap{position:relative;height:220px;margin:14px 0;}
.fdm-scenario{background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:14px 16px;margin-top:16px;}
.fdm-scenario-hd{font-size:11px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.fdm-scenario-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.fdm-scenario-row:last-child{border-bottom:none;}
.fdm-selling{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.fdm-selling-pt{display:flex;gap:10px;font-size:14px;color:#cbd5e1;line-height:1.6;background:rgba(255,255,255,0.04);border-radius:8px;padding:12px 14px;}
.fdm-selling-pt .ico{font-size:15px;flex-shrink:0;margin-top:1px;}
.fdm-timeline{padding-left:24px;position:relative;}
.fdm-timeline::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:var(--border);}
.fdm-tl-item{position:relative;margin-bottom:18px;}
.fdm-tl-dot{position:absolute;left:-20px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--bg2);}
.fdm-tl-year{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:3px;}
.fdm-tl-text{font-size:14px;color:#cbd5e1;line-height:1.55;}
.risk-row{display:flex;align-items:center;gap:5px;}
.risk-pip{width:11px;height:11px;border-radius:50%;background:var(--border);}
.risk-pip.on{background:var(--gold);}
.risk-pip.on.r6{background:#ef4444;}
.risk-pip.on.r7{background:#dc2626;}
.btn-info-fund{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:6px;padding:3px 8px;color:#93c5fd;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.btn-info-fund:hover{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);}
.fdm-loading{text-align:center;padding:48px 20px;color:var(--dim);font-size:13px;}
.fdm-err{color:var(--red);font-size:13px;padding:20px;text-align:center;}
.fdm-note{font-size:11px;color:var(--dim);margin-top:6px;font-style:italic;}

/* ── Scenario Calculator Tab ──────────────────────────────────────────────── */
.calc-page{padding:28px 24px 48px;max-width:1120px;margin:0 auto;}
.calc-header{margin-bottom:22px;}
.calc-title{font-size:23px;font-weight:900;background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 50%,#fde68a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px;}
.calc-subtitle{font-size:13px;color:var(--muted);line-height:1.5;}
.calc-sub-tabs{display:flex;gap:2px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:26px;}
.calc-sub-tab{padding:10px 22px;font-size:12px;font-weight:700;color:var(--dim);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.03em;animation:calcTabPulse 3s ease-in-out infinite;}
.calc-sub-tab.active{color:var(--gold);border-bottom-color:var(--gold);animation:calcTabGlow 2.4s ease-in-out infinite;}
.calc-sub-tab:hover:not(.active){color:var(--muted);}
@keyframes calcTabPulse{0%,100%{text-shadow:none;color:var(--dim);}50%{text-shadow:0 0 10px rgba(6,182,212,0.4);color:#64b5ca;}}
@keyframes calcTabGlow{0%,100%{text-shadow:0 0 6px rgba(245,158,11,0.5);color:var(--gold);}50%{text-shadow:0 0 18px rgba(245,158,11,0.9),0 0 32px rgba(245,158,11,0.4);color:var(--gold-l);}}
/* Chart + cards — full width chart, cards side by side below */
.calc-chart-panel{background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:22px 20px 18px;height:380px;position:relative;margin-bottom:16px;}
.calc-chart-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.calc-bottom-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
.calc-result-cards{display:flex;flex-direction:column;gap:14px;}
/* Individual result card */
.calc-rc{background:linear-gradient(135deg,rgba(255,255,255,0.025),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 18px;transition:border-color 0.2s;}
.calc-rc-name{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.calc-rc-fv{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-0.02em;line-height:1.1;margin-bottom:2px;}
.calc-rc-sub{font-size:11px;color:var(--muted);margin-bottom:10px;}
.calc-rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.calc-rc-stat{background:rgba(255,255,255,0.03);border-radius:8px;padding:7px 10px;}
.calc-rc-stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.calc-rc-stat-val{font-size:13px;font-weight:800;color:var(--text);}
/* Difference banner — glowing */

// Resolve a fund name from a transaction to a stored price, tolerating missing "Income " prefix.
function lookupFundPrice(name){
  if(fundPrices[name]!=null)return fundPrices[name];
  // Try prefixed / unprefixed variants
  const withIncome="Income "+name;
  if(fundPrices[withIncome]!=null)return fundPrices[withIncome];
  const withoutIncome=name.replace(/^Income\s+/i,"");
  if(fundPrices[withoutIncome]!=null)return fundPrices[withoutIncome];
  // Fuzzy: match by short name (strip "Income " prefix and " Fund" suffix)
  const short=n=>n.replace(/^Income\s+/i,"").replace(/\s+Fund$/i,"").toLowerCase();
  const key=short(name);
  for(const [k,v] of Object.entries(fundPrices)){if(short(k)===key&&v!=null)return v;}
  return 0;
}

let priceCardOrder=JSON.parse(localStorage.getItem('priceCardOrder')||'null');
function _shortFund(n){return n.replace(/^Income\s+/i,'').replace(/\s+Fund$/i,'').toLowerCase();}
function getAllFundNames(){
  const s=new Set(DEFAULT_FUNDS);
  const knownShorts=new Set(DEFAULT_FUNDS.map(_shortFund));
  const addIfNew=n=>{if(n&&!s.has(n)&&!knownShorts.has(_shortFund(n)))s.add(n);};
  Object.values(clientTxs).forEach(txs=>txs.forEach(tx=>{if(tx.fundName)addIfNew(tx.fundName);}));
  Object.keys(fundPrices).forEach(n=>addIfNew(n));
  const all=[...s].sort();
  if(!priceCardOrder)return all;
  const idx=new Map(priceCardOrder.map((n,i)=>[n,i]));
  return all.sort((a,b)=>(idx.get(a)??9999)-(idx.get(b)??9999));
}

// Crosshair plugin — draws a vertical dashed line that follows the cursor on line charts
const xhairPlugin={
  id:'xhair',
  afterDraw(chart){
    if(chart._xhX===undefined)return;
    const{ctx,chartArea:{top,bottom}}=chart;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;ctx.setLineDash([4,3]);

  afterEvent(chart,args){

    if(e.type==='mousemove'){chart._xhX=e.x;chart.draw();}

};

const $f=n=>"$"+Number(n||0).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});

function getAge(dob){
  if(!dob)return null;
  const today=new Date(),d=new Date(dob);
  let age=today.getFullYear()-d.getFullYear();
  if(today.getMonth()<d.getMonth()||(today.getMonth()===d.getMonth()&&today.getDate()<d.getDate()))age--;
  return age;
}
function getDaysToBirthday(dob){

// ── Transaction categorisation ──
function categorize(txType,txDetails){
  const t=(txType||"").toLowerCase(),d=(txDetails||"").toLowerCase();
  if(d.includes("investment bonus")||d.includes("bonus unit"))return"bonus";
  if(t.includes("free fund"))return"bonus";
  if(d.includes("distribution reinvestment")||d.includes("reinvestment"))return"reinvestment";
  if(d.includes("fund switch out")||d.includes("switch out"))return"switch_out";
  if(d.includes("fund switch in")||d.includes("switch in"))return"switch_in";
  if(d.includes("regular premium")||d.includes("top-up")||d.includes("top up"))return"premium";
  if(d.includes("policy fee")||d.includes("admin fee")||d.includes("mortality"))return"fee";
  if(t.includes("dividend")||d.includes("dividend"))return"dividend";
  if(t.includes("buy"))return"premium";
  if(t.includes("sell"))return"fee";
  return"other";
}

// ── Portfolio calculation ──
function calcPortfolio(txs){
  const funds={};
  for(const tx of txs){
    const f=tx.fundName;
    if(!funds[f])funds[f]={
      premiumUnits:0,feeUnits:0,bonusUnits:0,
      reinvestUnits:0,switchInUnits:0,switchOutUnits:0,
      totalInvested:0,switchInValue:0,dividendReinvested:0,dividendPaid:0,txCount:0
    };
    const fd=funds[f];fd.txCount++;
    if(tx.category==="premium"){fd.premiumUnits+=tx.units;fd.totalInvested+=Math.abs(tx.amount);}
    else if(tx.category==="bonus"){fd.bonusUnits+=tx.units;}
    else if(tx.category==="fee"){fd.feeUnits+=tx.units;}
    else if(tx.category==="reinvestment"){fd.reinvestUnits+=tx.units;fd.dividendReinvested+=Math.abs(tx.amount);}
    else if(tx.category==="switch_in"){fd.switchInUnits+=tx.units;fd.switchInValue+=Math.abs(tx.amount);}
    else if(tx.category==="switch_out"){fd.switchOutUnits+=tx.units;}
    else if(tx.category==="dividend"){fd.dividendPaid+=Math.abs(tx.amount);}
  }
  for(const[name,fd]of Object.entries(funds)){
    const price=lookupFundPrice(name);
    fd.currentPrice=price;
    fd.netUnits=fd.premiumUnits+fd.feeUnits+fd.reinvestUnits+fd.switchInUnits+fd.switchOutUnits;
    fd.totalUnits=fd.netUnits+fd.bonusUnits;
    fd.netPremiumValue=fd.netUnits*price;
    fd.bonusValue=fd.bonusUnits*price;
    fd.totalValue=fd.totalUnits*price;
    // Portfolio-level gain uses premium cost only (avoids double-counting switches)
    fd.trueGain=fd.currentPrice>0?fd.netPremiumValue-fd.totalInvested:0;
    fd.trueGainPct=fd.totalInvested>0&&fd.currentPrice>0?(fd.trueGain/fd.totalInvested)*100:0;
    // Fund-level display cost: when units were switched out, reduce cost basis proportionally
    // so the gain/loss only reflects price movement, not units that moved to another fund
    fd.isSwitch=fd.totalInvested===0&&fd.switchInValue>0;
    if(fd.totalInvested>0&&fd.switchOutUnits<0){
      const grossPremNet=fd.premiumUnits+fd.feeUnits; // net units from premiums before any switch
      const remainFrac=grossPremNet>0?(grossPremNet+fd.switchOutUnits)/grossPremNet:1;
      fd.adjustedInvested=fd.totalInvested*Math.max(0,remainFrac);
    }else{
      fd.adjustedInvested=fd.totalInvested;
    }
    fd.displayCost=fd.adjustedInvested>0?fd.adjustedInvested:(fd.isSwitch?fd.switchInValue:0);
    fd.displayGain=fd.currentPrice>0&&fd.displayCost>0?fd.netPremiumValue-fd.displayCost:fd.trueGain;
    fd.displayGainPct=fd.displayCost>0&&fd.currentPrice>0?(fd.displayGain/fd.displayCost)*100:0;
  }
  return funds;
}

function calcTimeSeries(txs){
  if(txs.length<2)return[];
  const sorted=[...txs].sort((a,b)=>a.txDate.localeCompare(b.txDate));
  const holdings={},lastPrice={};
  const byDate={};
  for(const tx of sorted){
    const f=tx.fundName;
    if(!holdings[f])holdings[f]=0;
    holdings[f]+=tx.units;
    if(tx.price>0)lastPrice[f]=tx.price;
    let total=0;
    for(const[fund,units]of Object.entries(holdings))total+=Math.max(0,units)*(lastPrice[fund]||lookupFundPrice(fund)||0);
    byDate[tx.txDate]={date:tx.txDate,value:total};
  }
  // Always add today using live fund prices so the chart reflects current market value,
  // not just the price from the last transaction (critical for advance-premium clients
  // who have very few transactions after the initial deposit).
  const todayStr=new Date().toISOString().split("T")[0];
  if(Object.keys(fundPrices||{}).length>0){
    let todayTotal=0;
    for(const[fund,units]of Object.entries(holdings))
      todayTotal+=Math.max(0,units)*(fundPrices[fund]||lastPrice[fund]||0);
    if(todayTotal>0)byDate[todayStr]={date:todayStr,value:todayTotal};
  }
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}

// Approximate period returns (1M / 3M / 6M) using the transaction-based time series.
// Uses simplified Modified Dietz: (endValue - beginValue - cashFlows) / beginValue.
// Historical values use the prices embedded in the time series (last known price at each tx date).
function calcPeriodReturns(txs, currentValue){
  const result={};
  if(!txs||txs.length<2||currentValue<=0)return result;
  const ts=calcTimeSeries(txs);
  if(!ts.length)return result;
  const sorted=[...txs].sort((a,b)=>a.txDate.localeCompare(b.txDate));
  const nowMs=Date.now();
  for(const[months,key]of[[1,"1M"],[3,"3M"],[6,"6M"]]){
    const cutoff=new Date(nowMs);
    cutoff.setMonth(cutoff.getMonth()-months);
    const cutoffStr=cutoff.toISOString().split("T")[0];
    let past=null;
    for(const entry of ts){if(entry.date<=cutoffStr)past=entry;else break;}
    if(!past||past.value<=0)continue;
    if((cutoff-new Date(past.date))/86400000>45)continue; // no data within 45 days of target
    const cashIn=sorted
      .filter(tx=>tx.category==="premium"&&tx.txDate>past.date)
      .reduce((s,tx)=>s+Math.abs(tx.amount),0);
    const r=(currentValue-past.value-cashIn)/past.value;
    result[key]={pct:r*100, annPct:(Math.pow(1+r,12/months)-1)*100};
  }
  return result;
}

// Compute weighted average entry price per fund + switch history.
// Returns per-fund: { avgCost, firstDate, currentPrice, changePct,
//   premiums:[{date,units,price,chgPct}],
//   switchOuts:[{date,units,price,vsAvgPct}],   — exited at profit/loss vs avg entry
//   switchIns:[{date,units,price,chgPct}]        — entered via switch, vs current price
// }
function calcEntryPrices(txs){
  const byFund={};
  const ensure=name=>{
    if(!byFund[name])byFund[name]={premiums:[],switchOuts:[],switchIns:[],
      totalUnits:0,totalAmount:0,firstDate:null};
  };
  for(const tx of txs){
    const price=tx.price;
    if(!price||price<=0)continue;
    if(tx.category==="premium"&&tx.units>0){
      ensure(tx.fundName);
      const f=byFund[tx.fundName];
      const amt=Math.abs(tx.amount)||tx.units*price;
      f.premiums.push({date:tx.txDate,units:tx.units,price,amount:amt});
      f.totalUnits+=tx.units;
      f.totalAmount+=amt;
      if(!f.firstDate||tx.txDate<f.firstDate)f.firstDate=tx.txDate;
    } else if(tx.category==="switch_out"){
      ensure(tx.fundName);
      byFund[tx.fundName].switchOuts.push({date:tx.txDate,units:Math.abs(tx.units),price,amount:Math.abs(tx.amount||tx.units*price)});
    } else if(tx.category==="switch_in"){
      ensure(tx.fundName);
      byFund[tx.fundName].switchIns.push({date:tx.txDate,units:tx.units,price,amount:Math.abs(tx.amount||tx.units*price)});
      if(!byFund[tx.fundName].firstDate||tx.txDate<byFund[tx.fundName].firstDate)
        byFund[tx.fundName].firstDate=tx.txDate;
    }
  }
  for(const[name,f]of Object.entries(byFund)){
    f.avgCost=f.totalUnits>0?f.totalAmount/f.totalUnits:0;
    const cur=lookupFundPrice(name);
    f.currentPrice=cur;
    f.changePct=f.avgCost>0&&cur>0?((cur-f.avgCost)/f.avgCost*100):null;
    f.premiums.sort((a,b)=>a.date.localeCompare(b.date));
    f.premiums.forEach(p=>{p.chgPct=cur>0&&p.price>0?((cur-p.price)/p.price*100):null;});
    f.switchOuts.sort((a,b)=>a.date.localeCompare(b.date));
    f.switchOuts.forEach(s=>{s.vsAvgPct=f.avgCost>0?((s.price-f.avgCost)/f.avgCost*100):null;});
    f.switchIns.sort((a,b)=>a.date.localeCompare(b.date));
    f.switchIns.forEach(s=>{s.chgPct=cur>0&&s.price>0?((cur-s.price)/s.price*100):null;});
  }
  return byFund;
}

function portfolioTotals(fundData){
  let totalInvested=0,totalValue=0,bonusValue=0,trueGain=0,dividendPaid=0;
  for(const fd of Object.values(fundData)){
    totalInvested+=fd.totalInvested;
    totalValue+=fd.totalValue;
    bonusValue+=fd.bonusValue;
    trueGain+=fd.trueGain;
    dividendPaid+=fd.dividendPaid;
  }
  const trueGainPct=totalInvested>0?(trueGain/totalInvested)*100:0;
  return{totalInvested,totalValue,bonusValue,trueGain,trueGainPct,dividendPaid};
}

function getStartupBonus(product,term,ap){
  const tbl=STARTUP_BONUS[product];
  if(!tbl)return null;
  const tiers=tbl[parseInt(term)];
  if(!tiers)return null;
  let matched=null;
  for(const t of tiers){if(ap>=t.min)matched=t;}
  return matched;
}

function parseNum(val){
  if(val===null||val===undefined||val==="-"||val==="")return 0;
  const s=String(val).replace(/[$,\s]/g,"");
  const neg=s.startsWith("(")||s.startsWith("-");
  const n=parseFloat(s.replace(/[()]/g,""));
  if(isNaN(n))return 0;
  return neg?-Math.abs(n):Math.abs(n)*(String(val).includes("-")&&!String(val).includes("(")?-1:1);
}
function smartParseNum(val){
  if(val===null||val===undefined||val==="-"||val==="")return 0;
  const s=String(val).trim().replace(/[$,]/g,"");
  if(s.startsWith("(")&&s.endsWith(")"))return-parseFloat(s.slice(1,-1))||0;
  return parseFloat(s)||0;
}
function normalizeDobInput(input){input.value=input.value.replace(/-/g,"/");}
function parseDate(val){
  if(!val)return"";
  if(val instanceof Date){
    return val.getFullYear()+"-"+String(val.getMonth()+1).padStart(2,"0")+"-"+String(val.getDate()).padStart(2,"0");
  }
  const s=String(val).trim();
  const m1=s.match(/^(\d{2})-(\d{2})-(\d{4})$/);// DD-MM-YYYY
  if(m1)return`${m1[3]}-${m1[2]}-${m1[1]}`;
  const m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);// YYYY-MM-DD
  if(m2)return s;
  const m3=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);// DD/MM/YYYY
  if(m3)return`${m3[3]}-${m3[2]}-${m3[1]}`;
  return s;
}
function findCol(headers,candidates){
  for(const c of candidates){
    const idx=headers.findIndex(h=>String(h).toLowerCase().includes(c.toLowerCase()));
    if(idx>=0)return idx;
  }
  return-1;
}

async function parseExcelFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){resolve([]);return;}

        const headers=rows[0].map(h=>String(h).trim());
        const C={
          fund:findCol(headers,["fund name","fund"]),
          type:findCol(headers,["transaction type","type"]),
          details:findCol(headers,["transaction details","details"]),
          date:findCol(headers,["transaction date","date"]),
          units:findCol(headers,["units"]),
          amount:findCol(headers,["transaction amount","amount"]),
          price:findCol(headers,["price(dollar","price (dollar","price per unit","price","nav"]),
          free:findCol(headers,["free units","free"])
        };

        const txs=[];
        for(let i=1;i<rows.length;i++){
          const row=rows[i];
          const fundName=String(row[C.fund]||"").trim();
          if(!fundName)continue;
          const txType=String(row[C.type]||"").trim();
          const txDetails=String(row[C.details]||"").trim();
          const txDate=parseDate(row[C.date]);
          const units=smartParseNum(row[C.units]);
          const amount=smartParseNum(row[C.amount]);
          const price=smartParseNum(row[C.price]);
          const freeLabel=C.free>=0?String(row[C.free]||"").trim():"";
          if(!txDate)continue;
          txs.push({
            id:uid(),fundName,txType,txDetails,txDate,
            units,amount,price,freeLabel,
            category:categorize(txType,txDetails)
          });
        }
        resolve(txs);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function parseDistributionHistoryFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){resolve([]);return;}
        const headers=rows[0].map(h=>String(h).trim());
        const C={
          fund:findCol(headers,["fund name","fund"]),
          date:findCol(headers,["declaration date","date"]),
          distRate:findCol(headers,["distribution rate","dist rate","rate"]),
          units:findCol(headers,["units holding","units"]),
          price:findCol(headers,["fund price at declaration","fund price at","fund price","price"]),
          paymode:findCol(headers,["paymode","pay mode"]),
          encashment:findCol(headers,["encashment"]),
          reinvestment:findCol(headers,["reinvestment"]),
        };
        const records=[];
        for(let i=1;i<rows.length;i++){
          const row=rows[i];
          const fundName=String(row[C.fund]||"").trim();
          if(!fundName)continue;
          const declarationDate=parseDate(row[C.date]);
          if(!declarationDate)continue;
          const distributionRate=C.distRate>=0?smartParseNum(row[C.distRate]):0;
          const unitsHolding=C.units>=0?smartParseNum(row[C.units]):0;
          const fundPrice=C.price>=0?smartParseNum(row[C.price]):0;
          const encashment=C.encashment>=0?smartParseNum(row[C.encashment]):0;
          const reinvestment=C.reinvestment>=0?smartParseNum(row[C.reinvestment]):0;
          const paymode=C.paymode>=0?String(row[C.paymode]||"").trim():"";
          if(distributionRate<=0&&encashment<=0&&reinvestment<=0)continue;
          records.push({fundName,declarationDate,distributionRate,unitsHolding,fundPrice,encashment,reinvestment,paymode});
        }
        resolve(records);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

  _snapshotSavedToday=today;

  }
}

    renderAll();
    // Load transactions for any client not yet cached so dashboard values are visible immediately
    const toLoad=clients.filter(c=>!clientTxs[c.fid]);
    if(toLoad.length>0){
      Promise.all(toLoad.map(c=>loadClientTxs(c.fid))).then(()=>renderAll());
    }
  },err=>console.error("clients listener error:",err)));
  unsubs.push(onSnapshot(collection(db,"fundPrices"),snap=>{
    fundPrices={};fundPriceChanges={};fundPriceSource={};
    snap.forEach(d=>{
      const fd=d.data();
      fundPrices[fd.name]=fd.price;
      if(fd.change1D!=null||fd.change7D!=null)fundPriceChanges[fd.name]={change1D:fd.change1D??null,change7D:fd.change7D??null};
      if(fd.source)fundPriceSource[fd.name]=fd.source;
    });
    renderAll();
    saveDailySnapshots();
  },err=>console.error("fundPrices listener error:",err)));
  unsubs.push(onSnapshot(collection(db,"underlyingPrices"),snap=>{
    underlyingPrices={};snap.forEach(d=>{const ud=d.data();underlyingPrices[ud.ftSymbol]=ud.price;});
    renderAll();
  },err=>console.error("underlyingPrices listener error:",err)));
  const qSnap=query(collection(db,"portfolioSnapshots"),where("uid","==",OWNER));
  unsubs.push(onSnapshot(qSnap,snap=>{
    portfolioSnapshots={};
    snap.forEach(d=>{
      const sd=d.data();
      if(!portfolioSnapshots[sd.clientId])portfolioSnapshots[sd.clientId]=[];
      portfolioSnapshots[sd.clientId].push({date:sd.date,totalValue:sd.totalValue,adjGain:sd.adjGain});
    });
    Object.keys(portfolioSnapshots).forEach(cid=>{
      portfolioSnapshots[cid].sort((a,b)=>b.date.localeCompare(a.date));
    });
    renderAll();
  },err=>console.error("snapshots listener error:",err)));
}

// ── Portfolio snapshot helpers ──
function periodDays(p){return{"1D":1,"1W":7,"1M":30,"3M":90}[p]||1;}
function getSnapshotBefore(clientId,daysAgo){
  const snaps=portfolioSnapshots[clientId];
  if(!snaps||!snaps.length)return null;
  const d=new Date();d.setDate(d.getDate()-daysAgo);
  const cutoff=d.toISOString().slice(0,10);
  // newest snapshot that is on or before the cutoff date
  return snaps.find(s=>s.date<=cutoff)||null;
}

// ── Premium reminder helpers ──
function getRelevantPremiumDate(startDate){
  if(!startDate)return null;
  const start=new Date(startDate);
  const today=new Date();today.setHours(0,0,0,0);
  // this year's anniversary
  let ann=new Date(start);ann.setFullYear(today.getFullYear());
  const d=Math.ceil((ann-today)/86400000);
  if(d>=-30&&d<=30)return{date:ann,days:d};
  // next year's anniversary (if within 30 days)
  let annNext=new Date(start);annNext.setFullYear(today.getFullYear()+1);
  const dn=Math.ceil((annNext-today)/86400000);
  if(dn>=0&&dn<=30)return{date:annNext,days:dn};
  return null;
}
function premiumDaysUntil(startDate,premiumPaidYear){
  const r=getRelevantPremiumDate(startDate);
  if(!r)return null;
  if((premiumPaidYear||0)>=r.date.getFullYear())return null; // paid this cycle
  return r.days;
}
function premiumBadgeHtml(startDate,premiumPaidYear,fid){
  const r=getRelevantPremiumDate(startDate);
  if(!r)return"";
  if((premiumPaidYear||0)>=r.date.getFullYear())return"";
  const d=r.days;
  const cls=d<=7?"urgent":"warning";
  const label=d<0?"Overdue "+Math.abs(d)+"d":d===0?"Due today":d===1?"Due tomorrow":"Due in "+d+"d";
  const payBtn=fid?"<button class=\"prem-pay-btn\" onclick=\"markPremiumPaid(event,'"+fid+"',"+r.date.getFullYear()+")\">✓ Paid</button>":"";
  return"<span class=\"prem-badge "+cls+"\">⏰ AP "+label+payBtn+"</span>";
}

function buildClientList(list){
  if(list.length===0)return`<div class="empty"><span class="empty-icon">🔍</span>No clients match your search.</div>`;
  // Pre-compute gain % so we can sort highest first
  const withGain=list.map(c=>{
    const txs=clientTxs[c.fid]||[];
    const hasTxs=txs.length>0;
    const hasPrice=Object.keys(fundPrices).length>0;
    const fundData=hasTxs?calcPortfolio(txs):{};
    const totals=hasTxs&&hasPrice?portfolioTotals(fundData):{};
    const _cb=getStartupBonus(c.product,c.term,c.annualPremium);
    const _bGrant=_cb?c.annualPremium*_cb.pct/100:0;
    const _adjGain=hasTxs&&hasPrice?totals.totalValue-totals.totalInvested-_bGrant:null;
    const _adjPct=_adjGain!==null&&totals.totalInvested>0?_adjGain/totals.totalInvested*100:null;
    return{c,txs,hasTxs,hasPrice,totals,_adjGain,_adjPct};
  });
  if(dashSort==="value") withGain.sort((a,b)=>(b.totals.totalValue??0)-(a.totals.totalValue??0));
  else if(dashSort==="name") withGain.sort((a,b)=>a.c.name.localeCompare(b.c.name));
  else withGain.sort((a,b)=>(b._adjPct??-Infinity)-(a._adjPct??-Infinity));

  const cards=withGain.map(({c,txs,hasTxs,hasPrice,totals,_adjGain,_adjPct},i)=>{
    // Period delta vs snapshot
    let deltaHtml="";
    if(hasTxs&&hasPrice&&totals.totalValue){
      const snap=getSnapshotBefore(c.fid,periodDays(dashPeriod));
      if(snap&&snap.totalValue){
        const delta=totals.totalValue-snap.totalValue;
        const deltaPct=snap.totalValue>0?delta/snap.totalValue*100:0;
        const col=delta>=0?"var(--green)":"var(--red)";
        const arrow=delta>=0?"▲":"▼";
        deltaHtml="<div style=\"font-size:10px;color:"+col+";font-weight:700;margin-top:2px;\">"+arrow+" "+$f(Math.abs(delta))+" ("+Math.abs(deltaPct).toFixed(1)+"%) vs "+dashPeriod+"</div>";
      } else {
        deltaHtml="<div style=\"font-size:10px;color:var(--dim);margin-top:2px;\">No "+dashPeriod+" data yet</div>";
      }
    }
    const premBadge=premiumBadgeHtml(c.startDate,c.premiumPaidYear,c.fid);
    const divIncome=(getStrategy(c.product)==="dividend"&&hasTxs&&hasPrice)
      ?"<span style=\"color:#d8b4fe;\">💰 ~"+$f(totals.totalValue*(c.dividendRate||6)/100/12)+"/mo income</span>":"";
    const _cardDaysToB=getDaysToBirthday(c.dob);
    const bdayBadge=_cardDaysToB!==null&&_cardDaysToB<=30
      ?"<span style=\"color:#f59e0b;\">🎂 "+(_cardDaysToB===0?"Birthday today!":"Birthday in "+_cardDaysToB+"d")+"</span>":"";
    const _cardMode=getCurrentMode(c);
    const _cardNextDate=getNextPaymentDate(c.startDate,_cardMode);
    const _cardDaysNext=daysUntil(_cardNextDate);
    const payModeBadge="<span style=\"color:var(--dim);\">💳 "+(PAYMENT_MODES[_cardMode]?.label||_cardMode)+"</span>";
    const payAlertBadge=_cardDaysNext!==null&&_cardDaysNext<=7
      ?"<span style=\"color:"+(_cardDaysNext<0?"var(--red)":"var(--gold)")+";font-weight:700;\">🔔 "+(_cardDaysNext<0?"Payment overdue":"Payment due in "+_cardDaysNext+"d")+"</span>":"";
    return "<div class=\"client-card\" style=\"animation-delay:"+i*0.05+"s\" onclick=\"viewClient('"+c.fid+"')\">"
      +"<div style=\"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;\">"
        +"<div>"
          +"<div style=\"font-size:16px;font-weight:800;margin-bottom:5px;\">"+renderName(c.name)+"</div>"
          +"<div style=\"display:flex;gap:6px;flex-wrap:wrap;align-items:center;\">"
            +productBadge(c.product)+stratBadge(c.product)+premBadge
          +"</div>"
        +"</div>"
        +(hasTxs&&hasPrice
          ?"<div style=\"text-align:right;\">"
            +"<div style=\"font-size:11px;color:var(--dim);\">Portfolio Value</div>"
            +"<div style=\"font-size:20px;font-weight:900;color:var(--gold-l);\">"+$f(totals.totalValue)+"</div>"
            +"<div style=\"font-size:12px;font-weight:700;color:"+((_adjGain??0)>=0?"var(--green)":"var(--red)")+";\">"+$pct(_adjPct??0)+" true gain</div>"
            +deltaHtml
          +"</div>"
          :"")
      +"</div>"
      +"<div style=\"display:flex;gap:16px;font-size:12px;color:var(--dim);flex-wrap:wrap;\">"
        +(c.policyNo?"<span>📋 <span class=\"name-blur\">"+esc(c.policyNo)+"</span></span>":"")
        +(bdayBadge?bdayBadge:"")
        +(payAlertBadge?payAlertBadge:payModeBadge)
        +"<span>📅 Since "+fmtDate(c.startDate)+"</span>"
        +"<span>💵 AP: "+$f(c.annualPremium)+"/yr</span>"
        +divIncome
        +"<span>📁 "+(hasTxs?txs.length+" transactions":"No data uploaded")+"</span>"
      +"</div>"
    +"</div>";
  }).join("");

  return`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">${cards}</div>`;
}

window.doFindSwitchClients=async()=>{
  const out=document.getElementById("swOutSel")?.value||swOutFund||"";
  const into=document.getElementById("swInSel")?.value||swInFund||"";
  const pct=parseFloat(document.getElementById("swPctIn")?.value)||swPct||20;
  swOutFund=out;swInFund=into;swPct=pct;swResults=[];swSelected=new Set();swScanned=false;
  const toLoad=clients.filter(c=>!clientTxs[c.fid]);
  if(toLoad.length>0)await Promise.all(toLoad.map(c=>loadClientTxs(c.fid)));
  const res=[];
  for(const c of clients){
    const txs=clientTxs[c.fid]||[];if(!txs.length)continue;
    const fd=calcPortfolio(txs)[out];
    if(!fd||fd.netUnits<=0)continue;
    const price=fundPrices[out]||0;if(!price)continue;
    const val=fd.netUnits*price;
    // Determine the most recent entry event for the switch-out fund
    const ep=calcEntryPrices(txs)[out]||{premiums:[],switchIns:[],avgCost:0,changePct:null};
    const lastSI=ep.switchIns.length?ep.switchIns[ep.switchIns.length-1]:null;
    const lastPrem=ep.premiums.length?ep.premiums[ep.premiums.length-1]:null;
    let lastEntry=null;
    if(lastSI&&lastPrem){lastEntry=lastSI.date>=lastPrem.date?{...lastSI,type:"switch_in"}:{...lastPrem,type:"premium"};}
    else if(lastSI){lastEntry={...lastSI,type:"switch_in"};}
    else if(lastPrem){lastEntry={...lastPrem,type:"premium"};}
    res.push({cid:c.fid,name:c.name,policyNo:c.policyNo||"",val,amt:val*pct/100,lastEntry,avgCost:ep.avgCost,changePct:ep.changePct});
    swSelected.add(c.fid);
  }
  res.sort((a,b)=>b.val-a.val);
  swResults=res;swScanned=true;
  renderPage();
};
window.swToggle=(id,checked)=>{
  const wasZero=swSelected.size===0;
  checked?swSelected.add(id):swSelected.delete(id);
  const isZero=swSelected.size===0;
  // If summary visibility changed (0↔1), do a full re-render so the summary appears/disappears
  if(wasZero!==isZero){renderPage();return;}
  // Otherwise patch inline for performance
  const row=document.getElementById("swRow-"+id);
  if(row)row.style.borderColor=checked?"var(--gold-border)":"rgba(255,255,255,0.06)";
  const ct=document.getElementById("swCount");
  if(ct)ct.textContent=`(${swResults.filter(r=>swSelected.has(r.cid)).length} of ${swResults.length} selected)`;
};
window.swSelectAll=(all)=>{
  swResults.forEach(r=>all?swSelected.add(r.cid):swSelected.delete(r.cid));
  renderPage();
};
window.onSwFundChange=()=>{
  const out=document.getElementById("swOutSel")?.value||"";
  const into=document.getElementById("swInSel")?.value||"";
  if(!out||!into||out===into){
    swOutFund=out;swInFund=into;swResults=[];swSelected=new Set();swScanned=false;
    renderPage();return;
  }
  doFindSwitchClients();
};
window.onSwPctChange=(val)=>{
  const p=Math.min(100,Math.max(1,parseFloat(val)||swPct));
  swPct=p;
  // Recalculate amounts in-place — no rescan needed
  swResults.forEach(r=>{r.amt=r.val*p/100;});
  renderPage();
};

// ── IndexedDB helpers for template persistence ──
function _idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("ilp_tracker_tmpl",1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore("tmpl");
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbGetTemplate(){
  try{
    const db=await _idbOpen();
    return new Promise(res=>{
      const tx=db.transaction("tmpl","readonly");
      const g=tx.objectStore("tmpl").get("pdf");
      g.onsuccess=()=>res(g.result||null);
      g.onerror=()=>res(null);
    });
  }catch(e){return null;}
}
async function idbSaveTemplate(bytes){
  try{
    const db=await _idbOpen();
    return new Promise((res,rej)=>{
      const tx=db.transaction("tmpl","readwrite");
      tx.objectStore("tmpl").put(bytes,"pdf");
      tx.oncomplete=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }catch(e){console.error("IndexedDB save failed:",e);}
}

window.uploadSwTemplate=async(file)=>{
  if(!file)return;
  showToast("Saving template…");
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  swTemplatePdfBytes=bytes;
  await idbSaveTemplate(bytes);
  showToast("✅ Template saved — won't need re-upload after refresh");
  renderPage();
};

window.loadSwTemplate=async()=>{
  if(swTemplatePdfBytes)return swTemplatePdfBytes;
  // 1. Try loading from the app URL (PDF committed to repo → served by Vercel)
  try{
    const res=await fetch("./fund-switch-form.pdf",{cache:"default"});
    if(res.ok){
      const bytes=new Uint8Array(await res.arrayBuffer());
      swTemplatePdfBytes=bytes;
      return bytes;
    }
  }catch(e){}
  // 2. Fall back to IndexedDB (from a previous in-app upload)
  const saved=await idbGetTemplate();
  if(saved){swTemplatePdfBytes=saved;return saved;}
  return null;
};

window.generateFundSwitchForms=async()=>{
  // Check pdf-lib loaded
  if(typeof PDFLib==="undefined"){
    _swErrModal("PDF library failed to load","Make sure you have an internet connection and reload the page. The pdf-lib library (unpkg.com) must be reachable.");
    return;
  }
  const bytes=await loadSwTemplate();
  if(!bytes){
    _swErrModal("No template found","Upload the blank Income fund switch PDF first using the '📤 Upload Template' button at the top of this tab.");
    return;
  }
  const sel=swResults.filter(r=>swSelected.has(r.cid));
  if(!sel.length){showToast("Select at least one client");return;}
  showToast(`Generating ${sel.length} form${sel.length>1?"s":""}…`);
  let ok=0,errs=[];
  for(const r of sel){
    const c=clients.find(x=>x.fid===r.cid);
    if(!c)continue;
    try{
      const filled=await _fillClientPdf(bytes,c);
      _downloadFilledPdf(filled,`FundSwitch_${(c.policyNo||c.name).replace(/[^a-zA-Z0-9_-]/g,"_")}.pdf`);
      await new Promise(res=>setTimeout(res,350));
      ok++;
    }catch(err){
      console.error("Fill error for",c.name,err);
      errs.push(`${c.name}: ${err.message}`);
    }
  }
  if(ok>0)showToast(`✅ ${ok} form${ok>1?"s":""} downloaded`);
  if(errs.length)_swErrModal("Some forms failed",errs.join("\n\n"));
};

async function _fillClientPdf(templateBytes,c){
  const{PDFDocument}=PDFLib;
  const pdfDoc=await PDFDocument.load(templateBytes,{ignoreEncryption:true});

  const age=getAge(c.dob);
  const is62Plus=age!==null&&age>=62;
  const today=new Date();
  const todayStr=`${String(today.getDate()).padStart(2,"0")}/${String(today.getMonth()+1).padStart(2,"0")}/${today.getFullYear()}`;
  const isLegacy=c.product==="Legacy Flex Solitaire";
  const hasRegular=!isLegacy;
  const isSG=!c.nationality||c.nationality==="Singaporean";

  const form=pdfDoc.getForm();
  const fields=form.getFields();
  if(fields.length===0)return await pdfDoc.save();

  // Set a single text field by exact name
  const _set=(name,val)=>{try{form.getTextField(name).setText(val||"");return true;}catch(e){return false;}};
  // Try a list of exact names — first match wins
  const _try=(names,val)=>{for(const n of names){if(_set(n,val))return true;}return false;};
  // Check/uncheck a checkbox — silently ignores if field doesn't exist
  const _chk=(name,on)=>{try{on?form.getCheckBox(name).check():form.getCheckBox(name).uncheck();return true;}catch(e){return false;}};

  // ── PAGE 1: AFF — Policyholder particulars ──
  _set("Name of policyholder or assignee1 as shown in NRIC", c.name);
  _set("NRICFIN numsdfghber", c.nric||"");
  _chk("62 years of age or olderfgh%^&", is62Plus);
  _set("Policy numbersdfgh", c.policyNo||"");
  // AFF policy list slot #1 — fields "1","2","3","4" are the four policy slots
  _set("1", c.policyNo||"");

  // ── PAGE 2: Section A Q2 — current age only; rest pre-filled in template ──
  // "2" = AFF policy list slot #2 (NOT Q2); "2_2" is the Q2 current age answer field
  _set("2_2", age!==null?String(age):"");

  // ── PAGE 4: Section C — Declaration (no advice) ──
  _set("Name ofsdfg Policyholder or Assignee2", c.name);
  _set("NRICFIN number_2", c.nric||"");
  _set("Date ddmmyyyy", todayStr);

  // ── PAGE 7: Policyholder acknowledgement + Advisor date ──
  _set("Name of Policyholder or Assignee9", c.name);
  _set("NRICPassport n567umberFIN", c.nric||"");
  _set("Date ddmmyyyy_2", todayStr);   // client signed date
  _set("Date ddmmyyyy_3", todayStr);   // advisor signed date

  // ── PAGE 10: Fund Switch form — Policyholder details ──
  _set("Full name as insdfgh NRICPassportLongTerm Pass", c.name);
  _set("NRICpassport number", c.nric||"");
  // Nationality checkboxes (defaults to Singaporean if not stored on client)
  _chk("Singaporean#$%FGH", isSG);
  _chk("Singaporean$%^&\\_2", isSG);
  // Country / City of residence
  _try(["Country of residencesdfgh","Country of residfghdence_2"], c.countryOfResidence||"Singapore");
  _try(["City of residencesdfgh","City of resifghdence_2"], c.cityOfResidence||"Singapore");
  // Occupation / nature of work / income — blank until added to client profile (*)
  _set("Occufghpation", c.occupation||"");
  _set("Nature of worksdfg", c.natureOfWork||"");
  _set("Annual incomsdfge S", c.annualIncome||"");
  // Tick the "Fund switch" transaction type checkbox on the cover
  _chk("Fund switch or change in fund percentage", true);

  // ── PAGE 11: Section 1A — fund switch (all ILP except Legacy Flex Solitaire) ──
  if(hasRegular){
    _set("Switch out from Please state Fund nameRow1", swOutFund);
    _set("Percentage to switch outRow1", String(swPct));
    _set("Switch in to Please state Fund nameRow1", swInFund);
    _set("Percentage to switch inRow1", "100");
  }

  // ── PAGE 11: Section 1B — Legacy Flex Solitaire only ──
  if(isLegacy){
    _set("Switch out from Please state Fund nameRow1_2", swOutFund);
    _set("Percentage to switch outRow1_2", String(swPct));
    _set("Switch in to Please state Fund nameRow1_2", swInFund);
    _set("Percentage to switch inRow1_2", "100");
  }

  // ── PAGE 16: Today's date for policyholder signature block ──
  _set("Signature of policyholder or assignee Signed in Singapore on ddmmyyyy", todayStr);

  try{form.flatten();}catch(e){}
  return await pdfDoc.save();
}

function _downloadFilledPdf(bytes,filename){
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

function calcAllocFromTxs(txs){
  const byFund={};let total=0;
  for(const tx of txs){
    if(tx.category==="premium"){
      const amt=Math.abs(tx.amount);
      byFund[tx.fundName]=(byFund[tx.fundName]||0)+amt;
      total+=amt;
    }
  }
  // Always include ALL unique funds (including those with only switch/bonus/fee transactions)
  const allFunds=[...new Set(txs.map(t=>t.fundName))];
  return allFunds
    .map(name=>({name,allocation:total>0&&byFund[name]?Math.round((byFund[name]/total)*100):0}))
    .sort((a,b)=>b.allocation-a.allocation);
}

async function processAddClientExcel(file){
  const statusEl=document.getElementById("acUploadStatus");
  const fundListEl=document.getElementById("acFundList");
  const zone=document.getElementById("addClientDrop");
  function setStatus(msg,color,bg,border){
    if(!statusEl)return;
    statusEl.style.display="block";statusEl.style.color=color;
    statusEl.style.background=bg;statusEl.style.border=`1px solid ${border}`;
    statusEl.innerHTML=msg;
  }
  setStatus("⏳ Parsing Excel...","var(--gold)","rgba(245,158,11,0.08)","var(--gold-border)");
  try{
    if(!window.XLSX)throw new Error("Excel parser not loaded. Please refresh.");
    const txs=await parseExcelFile(file);
    if(!txs.length)throw new Error("No valid transactions found. Check the file format.");
    pendingClientTxs=txs;
    const allocs=calcAllocFromTxs(txs);
    const uniqueFunds=new Set(txs.map(t=>t.fundName)).size;
    setStatus(`✅ ${txs.length} transactions loaded · ${uniqueFunds} funds detected`,"var(--green)","rgba(34,197,94,0.08)","rgba(34,197,94,0.3)");
    if(zone){zone.style.borderColor="rgba(34,197,94,0.5)";zone.querySelector("div").textContent="✅";}
    if(fundListEl){
      fundListEl.style.display="block";
      fundListEl.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Detected Funds & Allocations</div>`+
        allocs.map(a=>`<div style="display:flex;justify-content:space-between;padding:7px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px;font-size:13px;">
          <span style="color:var(--gold-l);font-weight:600;">${esc(a.name)}</span>
          <span style="color:${a.allocation>0?"var(--muted)":"var(--dim)"};">${a.allocation>0?a.allocation+"%":"Switch"}</span>
        </div>`).join("");
    }
  }catch(err){
    pendingClientTxs=[];
    setStatus(`❌ ${esc(err.message)}`,"#fca5a5","rgba(239,68,68,0.08)","rgba(239,68,68,0.3)");
  }
}

  const el=document.getElementById("bonusIndicator");
  if(!el)return;
  if(!product||!term||!ap){el.innerHTML="";return;}
  const tbl=STARTUP_BONUS[product];
  if(!tbl){el.innerHTML="";return;}
  const tiers=tbl[parseInt(term)];
  if(!tiers){el.innerHTML="";return;}
  let matched=null;

    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-radius:8px;margin-bottom:4px;

window.doAddClient=async()=>{
  const name=document.getElementById("cName")?.value.trim()||"";
  const policyNo=document.getElementById("cPolicy")?.value.trim()||"";
  const product=document.getElementById("cProduct")?.value||"";
  const rawStartDate=document.getElementById("cStart")?.value.trim()||"";
  const startDate=parseDate(rawStartDate);
  const term=document.getElementById("cTerm")?.value||"";
  const ap=document.getElementById("cAP")?.value||"";
  const notes=document.getElementById("cNotes")?.value.trim()||"";
  const nric=document.getElementById("cNRIC")?.value.trim()||"";
  const rawDob=document.getElementById("cDOB")?.value.trim()||"";
  const dob=rawDob?parseDate(rawDob):"";
  const payMode=document.getElementById("cPayMode")?.value||"annual";
  const isDivProduct=product==="Invest Flex Vantage"||product==="Invest Flex TriVantage";
  const dividendRate=isDivProduct?parseFloat(document.getElementById("cDivRate")?.value||"6")||6:null;
  const errEl=document.getElementById("addClientErr");
  const errs=[];
  if(!name)errs.push("Name required.");
  if(!product)errs.push("Product required.");
  if(!rawStartDate||!startDate.match(/^\d{4}-\d{2}-\d{2}$/))errs.push("Start date required (format: DD-MM-YYYY).");
  if(!term)errs.push("Policy term required.");
  if(!ap||parseFloat(ap)<=0)errs.push("Annual premium required.");
  if(errEl){if(errs.length){errEl.textContent=errs.join(" ");errEl.style.display="block";return;}errEl.style.display="none";}
  const funds=calcAllocFromTxs(pendingClientTxs);
  const contactNo=(document.getElementById("cContact")?.value||"").trim();
  const obj={
    uid:OWNER,name,policyNo,product,strategy:getStrategy(product),
    startDate,term:parseInt(term),annualPremium:parseFloat(ap),
    ...(dividendRate!==null?{dividendRate}:{}),
    ...(nric?{nric}:{}),
    ...(dob?{dob}:{}),
    ...(contactNo?{contactNo}:{}),
    paymentModeHistory:[{effectiveYear:1,mode:payMode}],
    funds,notes,createdAt:new Date().toISOString()
  };
  try{
    const ref=await saveClient(obj);
    if(pendingClientTxs.length>0)await saveTransactions(ref.id,pendingClientTxs);
    pendingClientTxs=[];
    showToast("✅ Client saved!");
    tab="dashboard";renderAll();
  }catch(e){if(errEl){errEl.textContent="Error: "+e.message;errEl.style.display="block";}}
};
