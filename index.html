<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILP Portfolio Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
button,input,select,textarea{font-family:inherit;}

/* ── Midnight Gold palette ── */
:root{
  --bg:#04080f;--bg2:#07101e;--bg3:#0c1828;--bg4:#111f30;
  --gold:#f59e0b;--gold-l:#fbbf24;--gold-d:#d97706;--gold-dim:#92400e;
  --gold-glow:rgba(245,158,11,0.15);--gold-border:rgba(245,158,11,0.22);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;--faint:#1e293b;
  --green:#22c55e;--green-d:#15803d;--red:#ef4444;--blue:#60a5fa;
  --radius:14px;
}

/* ── Animations ── */
@property --ba{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes borderSpin{to{--ba:360deg;}}
@keyframes goldShimmer{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
@keyframes goldSweep{0%,15%{left:-70%;}80%,100%{left:120%;}}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,15px) scale(0.97);}
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes coinFlip{0%,100%{transform:rotateY(0deg);}50%{transform:rotateY(180deg);}}
@keyframes countUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmerBar{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes glow{0%,100%{box-shadow:0 0 12px var(--gold-glow);}50%{box-shadow:0 0 28px rgba(245,158,11,0.35);}}
@keyframes breathe{0%,100%{filter:brightness(0.7);}50%{filter:brightness(1.3);}}

/* ── Base ── */
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(245,158,11,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 80%,rgba(251,191,36,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(217,119,6,0.03) 0%,transparent 60%);
}

/* ── Floating orbs (background) ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);animation:orbFloat ease-in-out infinite;}
.orb1{width:400px;height:400px;top:-100px;left:-100px;background:rgba(245,158,11,0.05);animation-duration:18s;}
.orb2{width:300px;height:300px;bottom:-80px;right:-80px;background:rgba(251,191,36,0.04);animation-duration:22s;animation-delay:-8s;}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.login-card{
  background:rgba(7,16,30,0.96);backdrop-filter:blur(20px);
  border-radius:24px;padding:48px 32px 40px;
  border:1px solid var(--gold-border);
  max-width:380px;width:100%;text-align:center;
  box-shadow:0 8px 60px rgba(0,0,0,0.8),0 0 40px var(--gold-glow),inset 0 1px 0 rgba(245,158,11,0.08);
  animation:fadeInUp 0.5s ease;
}
.login-icon{font-size:52px;margin-bottom:16px;display:inline-block;animation:coinFlip 4s ease-in-out infinite;}
.login-card h2{
  font-size:24px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 50%,#fde68a 100%);
  background-size:200% 200%;animation:goldShimmer 4s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{font-size:13px;color:var(--dim);margin-bottom:36px;line-height:1.7;}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 20px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);background:#fff;
  color:#3c4043;font-size:15px;font-weight:600;cursor:pointer;
  transition:box-shadow 0.2s,transform 0.2s;
}
.btn-google:hover{box-shadow:0 4px 20px rgba(0,0,0,0.5);transform:translateY(-1px);}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#04080f,#060e1a,#080f1e,#05090e);
  background-size:400% 400%;animation:goldShimmer 12s ease infinite;
  padding:12px 24px 10px;border-bottom:1px solid var(--gold-border);
  position:relative;overflow:hidden;text-align:center;z-index:1;
}
.header::before{
  content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.06),rgba(251,191,36,0.04),transparent);
  animation:goldSweep 8s ease-in-out infinite;
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.6),rgba(251,191,36,0.8),rgba(245,158,11,0.6),transparent);
}
.header h1{
  font-size:18px;font-weight:800;letter-spacing:-0.2px;margin-bottom:0;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 40%,#fde68a 70%,var(--gold-l) 100%);
  background-size:300% 300%;animation:goldShimmer 5s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}
.header-sub{font-size:12px;color:#a16207;font-weight:600;font-style:italic;position:relative;}
.signout{
  position:absolute;top:14px;right:14px;
  background:rgba(30,41,59,0.7);border:1px solid var(--faint);
  border-radius:8px;padding:6px 12px;color:var(--dim);
  font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;z-index:10;
}
.signout:hover{background:rgba(127,29,29,0.5);border-color:rgba(239,68,68,0.3);color:#fca5a5;}

/* ── Tabs ── */
.tabs{
  display:flex;justify-content:center;background:rgba(4,8,15,0.95);
  border-bottom:1px solid rgba(30,41,59,0.5);
  overflow-x:auto;backdrop-filter:blur(8px);position:relative;z-index:1;
}
.tab-btn{
  padding:13px 18px;border:none;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  background:transparent;color:var(--dim);
  border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;
  position:relative;
}
.tab-btn.active{color:#06b6d4;}
.tab-btn.active::before{
  content:'';position:absolute;inset:-1px;padding:1.5px;
  background:conic-gradient(from var(--ba),#f59e0b 0deg,transparent 60deg,transparent 150deg,#06b6d4 180deg,transparent 240deg,transparent 330deg,#f59e0b 360deg);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  border-radius:4px 4px 0 0;animation:borderSpin 2.5s linear infinite;pointer-events:none;
}
.tab-btn:hover:not(.active){color:var(--muted);border-bottom-color:rgba(6,182,212,0.35);}

/* ── Content ── */
.content{padding:20px 24px;max-width:980px;margin:0 auto;position:relative;z-index:1;}

/* ── Cards ── */
.card{
  background:var(--bg2);backdrop-filter:blur(12px);
  border-radius:var(--radius);padding:20px;
  border:1px solid rgba(30,41,59,0.6);margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(245,158,11,0.03);
  transition:border-color 0.22s,box-shadow 0.22s;
}
.card:hover{border-color:var(--gold-border);box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 20px var(--gold-glow);}
.card-gold{
  background:linear-gradient(135deg,#080e1a,#0a1220,#0d1628);
  border:1px solid var(--gold-border);
  box-shadow:0 0 30px var(--gold-glow),inset 0 1px 0 rgba(245,158,11,0.06);
}
.card-dark{background:var(--bg3);border-radius:var(--radius);padding:16px;border:1px solid rgba(30,41,59,0.4);margin-bottom:12px;}

/* ── Client card ── */
.client-card{
  background:var(--bg2);border-radius:var(--radius);padding:18px;
  border:1px solid rgba(30,41,59,0.5);margin-bottom:12px;
  cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;
  animation:fadeInUp 0.4s ease both;
}
.client-card::before{
  content:'';position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.04),transparent);
  transition:left 0.5s ease;
}
.client-card:hover{border-color:var(--gold-border);box-shadow:0 0 24px var(--gold-glow);transform:translateY(-2px);}
.client-card:hover::before{left:120%;}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
@media(max-width:600px){.stat-grid-4{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:var(--bg3);border-radius:12px;padding:14px;
  border:1px solid rgba(30,41,59,0.5);text-align:center;
  transition:border-color 0.2s;
}
.stat-card:hover{border-color:var(--gold-border);}
.stat-lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:900;}
.stat-val.gold{color:var(--gold-l);}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.blue{color:var(--blue);}
.stat-val.muted{color:var(--muted);}

/* ── Fund card ── */
.fund-card{
  background:var(--bg3);border-radius:var(--radius);padding:16px;
  border:1px solid rgba(30,41,59,0.5);margin-bottom:10px;
  animation:fadeInUp 0.4s ease both;transition:border-color 0.2s,opacity 0.2s;
}
.fund-card.dragging{opacity:0.35;border-color:var(--gold);}
.fund-card.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,158,11,0.25);}
.fund-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.drag-handle{color:var(--dim);cursor:grab;font-size:16px;line-height:1;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.fund-name{font-size:14px;font-weight:700;color:var(--gold-l);flex:1;margin:0;}
.fund-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(30,41,59,0.4);font-size:12px;}
.fund-row:last-child{border-bottom:none;}
.fund-row .lk{color:var(--dim);}
.fund-row .lv{font-weight:700;}
.btn-reinvest{background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:6px;padding:3px 9px;color:#c4b5fd;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
.btn-reinvest:hover{background:rgba(139,92,246,0.3);}

/* ── Progress bar ── */
.prog-wrap{background:rgba(0,0,0,0.3);border-radius:8px;height:8px;overflow:hidden;margin:4px 0;}
.prog-bar{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-l));
  background-size:200% auto;animation:shimmerBar 2.5s linear infinite;
  transition:width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.prog-bar.green{background:linear-gradient(90deg,var(--green-d),var(--green),#86efac);background-size:200% auto;animation:shimmerBar 2.5s linear infinite;}
.prog-bar.red{background:var(--red);}

/* ── Buttons ── */
.btn-pri{
  padding:12px 20px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  color:#0a0500;font-size:14px;font-weight:800;
  transition:all 0.22s;box-shadow:0 2px 16px rgba(245,158,11,0.3);
}
.btn-pri:hover{background:linear-gradient(135deg,var(--gold),var(--gold-l));box-shadow:0 0 28px rgba(245,158,11,0.5);transform:translateY(-2px);}
.btn-pri:active{transform:translateY(0);}
.btn-pri.full{width:100%;}
.btn-sec{
  padding:10px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  background:transparent;border:1px solid var(--gold-border);color:var(--gold);
  transition:all 0.2s;
}
.btn-sec:hover{background:var(--gold-glow);box-shadow:0 0 12px var(--gold-glow);}
.btn-sm{
  padding:5px 14px;border-radius:7px;border:1px solid var(--gold-border);
  background:rgba(245,158,11,0.08);color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;
}
.btn-sm:hover{background:var(--gold-glow);box-shadow:0 0 10px var(--gold-glow);}
.btn-del{
  background:rgba(127,29,29,0.6);border:1px solid rgba(239,68,68,0.2);
  border-radius:7px;padding:5px 12px;color:#fca5a5;font-size:12px;cursor:pointer;transition:all 0.2s;
}
.btn-del:hover{background:rgba(153,27,27,0.9);box-shadow:0 0 10px rgba(239,68,68,0.2);}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
  background:rgba(245,158,11,0.08);border:1px solid var(--gold-border);color:var(--gold);
  transition:all 0.2s;margin-bottom:16px;
}
.btn-back:hover{background:var(--gold-glow);}
.btn-present{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.1));
  border:1px solid var(--gold-border);color:var(--gold-l);transition:all 0.22s;
}
.btn-present:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-1px);}

/* ── Inputs ── */
.lbl{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600;}
.inp{
  width:100%;padding:10px 13px;border-radius:10px;
  border:1px solid rgba(30,41,59,0.6);background:rgba(12,24,40,0.9);
  color:var(--text);font-size:14px;transition:all 0.2s;outline:none;
}
.inp:hover{border-color:var(--gold-border);}
.inp:focus{border-color:rgba(245,158,11,0.6);box-shadow:0 0 0 3px rgba(245,158,11,0.08);}
.sel{
  width:100%;padding:10px 13px;border-radius:10px;
  border:1px solid rgba(30,41,59,0.6);background:rgba(12,24,40,0.9);
  color:var(--text);font-size:14px;transition:all 0.2s;outline:none;cursor:pointer;
}
.sel:hover{border-color:var(--gold-border);}
.sel:focus{border-color:rgba(245,158,11,0.6);box-shadow:0 0 0 3px rgba(245,158,11,0.08);}
.sel option{background:#0c1828;}
.inp.err{border-color:var(--red)!important;background:rgba(45,10,10,0.9)!important;}

/* ── Badges ── */
.badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-growth{background:rgba(21,128,61,0.25);color:#86efac;border:1px solid rgba(34,197,94,0.3);}
.badge-dividend{background:rgba(120,53,15,0.35);color:var(--gold-l);border:1px solid var(--gold-border);}
.badge-flex{background:rgba(30,58,138,0.35);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}
.badge-vantage{background:rgba(109,40,217,0.25);color:#d8b4fe;border:1px solid rgba(139,92,246,0.25);}
.badge-trivantage{background:rgba(80,7,36,0.4);color:#fda4af;border:1px solid rgba(244,63,94,0.25);}

/* ── Grid helpers ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}}

/* ── Upload / drag-drop ── */
.drop-zone{
  border:2px dashed var(--gold-border);border-radius:var(--radius);
  padding:32px;text-align:center;cursor:pointer;transition:all 0.22s;
  background:rgba(245,158,11,0.03);position:relative;overflow:hidden;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--gold);background:rgba(245,158,11,0.08);
  box-shadow:0 0 24px var(--gold-glow);
}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:36px;margin-bottom:10px;display:block;}
.drop-text{font-size:14px;color:var(--muted);}
.drop-hint{font-size:11px;color:var(--dim);margin-top:4px;}

/* ── Transaction table ── */
.tx-table{width:100%;border-collapse:collapse;font-size:12px;}
.tx-table th{padding:8px 10px;text-align:left;color:var(--dim);border-bottom:1px solid var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:10px;}
.tx-table td{padding:9px 10px;border-bottom:1px solid rgba(15,25,40,0.8);color:var(--muted);}
.tx-table tr:hover td{background:rgba(245,158,11,0.03);}
.tx-table tr:last-child td{border-bottom:none;}
.tx-cat{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;}
.tx-premium{background:rgba(21,128,61,0.2);color:#86efac;}
.tx-bonus{background:rgba(120,53,15,0.3);color:var(--gold-l);}
.tx-fee{background:rgba(127,29,29,0.3);color:#fca5a5;}
.tx-dividend{background:rgba(109,40,217,0.25);color:#d8b4fe;}
.tx-reinvestment{background:rgba(109,40,217,0.2);color:#c4b5fd;}
.tx-switch_in{background:rgba(14,165,233,0.2);color:#7dd3fc;}
.tx-switch_out{background:rgba(234,88,12,0.2);color:#fdba74;}
.tx-other{background:rgba(30,41,59,0.5);color:var(--muted);}

/* ── Fund price editor ── */
.price-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(max-width:600px){.price-grid{grid-template-columns:1fr;}}
.price-card{
  background:var(--bg3);border-radius:10px;padding:12px 14px;
  border:1px solid rgba(30,41,59,0.5);
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;transition:border-color 0.18s,background 0.18s;
}
.price-card:hover{border-color:rgba(245,158,11,0.35);background:var(--bg4);}
.price-val{font-size:15px;font-weight:800;color:var(--green);white-space:nowrap;}

/* ── Presentation overlay ── */
.present-overlay{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#020508,#04080f,#060b14);
  overflow-y:auto;padding:40px 24px;display:none;
}
.present-overlay.show{display:block;}
.present-close{
  position:fixed;top:16px;right:16px;
  background:rgba(245,158,11,0.15);border:1px solid var(--gold-border);
  border-radius:8px;padding:8px 16px;color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;
  z-index:10000;transition:all 0.2s;
}
.present-close:hover{background:var(--gold-glow);}
.present-name{
  font-size:32px;font-weight:900;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,var(--gold-l),var(--gold),#fde68a,var(--gold-l));
  background-size:300% 300%;animation:goldShimmer 4s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.present-date{text-align:center;font-size:13px;color:var(--dim);margin-bottom:32px;}
.present-big{font-size:48px;font-weight:900;color:var(--gold-l);text-align:center;animation:countUp 0.5s ease;}

/* ── Empty state ── */
.empty{text-align:center;padding:40px;color:var(--dim);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:0.5;}

/* ── Section title ── */
.sec-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-glow),transparent);}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:16px;}
.search-inp{
  width:100%;padding:11px 16px 11px 40px;border-radius:12px;
  border:1px solid rgba(30,41,59,0.6);background:var(--bg2);
  color:var(--text);font-size:14px;outline:none;transition:all 0.2s;
}
.search-inp:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px rgba(245,158,11,0.06);}

// ── Transaction categorisation ──
function categorize(txType,txDetails){
  const t=(txType||"").toLowerCase(),d=(txDetails||"").toLowerCase();
  if(d.includes("investment bonus")||d.includes("bonus unit"))return"bonus";
  if(t.includes("free fund"))return"bonus";
  if(d.includes("distribution reinvestment")||d.includes("reinvestment"))return"reinvestment";
  if(d.includes("fund switch out")||d.includes("switch out"))return"switch_out";
  if(d.includes("fund switch in")||d.includes("switch in"))return"switch_in";
  if(d.includes("regular premium")||d.includes("top-up")||d.includes("top up"))return"premium";
  if(d.includes("policy fee")||d.includes("admin fee")||d.includes("mortality"))return"fee";
  if(t.includes("dividend")||d.includes("dividend"))return"dividend";
  if(t.includes("buy"))return"premium";
  if(t.includes("sell"))return"fee";
  return"other";
}

// ── Portfolio calculation ──
function calcPortfolio(txs){
  const funds={};
  for(const tx of txs){
    const f=tx.fundName;
    if(!funds[f])funds[f]={
      premiumUnits:0,feeUnits:0,bonusUnits:0,
      reinvestUnits:0,switchInUnits:0,switchOutUnits:0,
      totalInvested:0,switchInValue:0,dividendReinvested:0,dividendPaid:0,txCount:0
    };
    const fd=funds[f];fd.txCount++;
    if(tx.category==="premium"){fd.premiumUnits+=tx.units;fd.totalInvested+=Math.abs(tx.amount);}
    else if(tx.category==="bonus"){fd.bonusUnits+=tx.units;}
    else if(tx.category==="fee"){fd.feeUnits+=tx.units;}
    else if(tx.category==="reinvestment"){fd.reinvestUnits+=tx.units;fd.dividendReinvested+=Math.abs(tx.amount);}
    else if(tx.category==="switch_in"){fd.switchInUnits+=tx.units;fd.switchInValue+=Math.abs(tx.amount);}
    else if(tx.category==="switch_out"){fd.switchOutUnits+=tx.units;}
    else if(tx.category==="dividend"){fd.dividendPaid+=Math.abs(tx.amount);}
  }
  for(const[name,fd]of Object.entries(funds)){
    const price=fundPrices[name]||0;
    fd.currentPrice=price;
    fd.netUnits=fd.premiumUnits+fd.feeUnits+fd.reinvestUnits+fd.switchInUnits+fd.switchOutUnits;
    fd.totalUnits=fd.netUnits+fd.bonusUnits;
    fd.netPremiumValue=fd.netUnits*price;
    fd.bonusValue=fd.bonusUnits*price;
    fd.totalValue=fd.totalUnits*price;
    // Portfolio-level gain uses premium cost only (avoids double-counting switches)
    fd.trueGain=fd.currentPrice>0?fd.netPremiumValue-fd.totalInvested:0;
    fd.trueGainPct=fd.totalInvested>0&&fd.currentPrice>0?(fd.trueGain/fd.totalInvested)*100:0;
    // Fund-level display cost: when units were switched out, reduce cost basis proportionally
    // so the gain/loss only reflects price movement, not units that moved to another fund
    fd.isSwitch=fd.totalInvested===0&&fd.switchInValue>0;
    if(fd.totalInvested>0&&fd.switchOutUnits<0){
      const grossPremNet=fd.premiumUnits+fd.feeUnits; // net units from premiums before any switch
      const remainFrac=grossPremNet>0?(grossPremNet+fd.switchOutUnits)/grossPremNet:1;
      fd.adjustedInvested=fd.totalInvested*Math.max(0,remainFrac);
    }else{
      fd.adjustedInvested=fd.totalInvested;
    }
    fd.displayCost=fd.adjustedInvested>0?fd.adjustedInvested:(fd.isSwitch?fd.switchInValue:0);
    fd.displayGain=fd.currentPrice>0&&fd.displayCost>0?fd.netPremiumValue-fd.displayCost:fd.trueGain;
    fd.displayGainPct=fd.displayCost>0&&fd.currentPrice>0?(fd.displayGain/fd.displayCost)*100:0;
  }
  return funds;
}

function calcTimeSeries(txs){
  if(txs.length<2)return[];
  const sorted=[...txs].sort((a,b)=>a.txDate.localeCompare(b.txDate));
  const holdings={},lastPrice={};
  const byDate={};
  for(const tx of sorted){
    const f=tx.fundName;
    if(!holdings[f])holdings[f]=0;
    holdings[f]+=tx.units;
    if(tx.price>0)lastPrice[f]=tx.price;
    let total=0;
    for(const[fund,units]of Object.entries(holdings))total+=Math.max(0,units)*(lastPrice[fund]||0);
    byDate[tx.txDate]={date:tx.txDate,value:total};
  }
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}

function portfolioTotals(fundData){
  let totalInvested=0,totalValue=0,bonusValue=0,trueGain=0,dividendPaid=0;
  for(const fd of Object.values(fundData)){
    totalInvested+=fd.totalInvested;
    totalValue+=fd.totalValue;
    bonusValue+=fd.bonusValue;
    trueGain+=fd.trueGain;
    dividendPaid+=fd.dividendPaid;
  }
  const trueGainPct=totalInvested>0?(trueGain/totalInvested)*100:0;
  return{totalInvested,totalValue,bonusValue,trueGain,trueGainPct,dividendPaid};
}

// ── Excel / CSV parser ──
function parseNum(val){
  if(val===null||val===undefined||val==="-"||val==="")return 0;
  const s=String(val).replace(/[$,\s]/g,"");
  const neg=s.startsWith("(")||s.startsWith("-");
  const n=parseFloat(s.replace(/[()]/g,""));
  if(isNaN(n))return 0;
  return neg?-Math.abs(n):Math.abs(n)*(String(val).includes("-")&&!String(val).includes("(")?-1:1);
}
function smartParseNum(val){
  if(val===null||val===undefined||val==="-"||val==="")return 0;
  const s=String(val).trim().replace(/[$,]/g,"");
  if(s.startsWith("(")&&s.endsWith(")"))return-parseFloat(s.slice(1,-1))||0;
  return parseFloat(s)||0;
}
function parseDate(val){
  if(!val)return"";
  if(val instanceof Date){
    return val.getFullYear()+"-"+String(val.getMonth()+1).padStart(2,"0")+"-"+String(val.getDate()).padStart(2,"0");
  }
  const s=String(val).trim();
  const m1=s.match(/^(\d{2})-(\d{2})-(\d{4})$/);// DD-MM-YYYY
  if(m1)return`${m1[3]}-${m1[2]}-${m1[1]}`;
  const m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);// YYYY-MM-DD
  if(m2)return s;
  const m3=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);// DD/MM/YYYY
  if(m3)return`${m3[3]}-${m3[2]}-${m3[1]}`;
  return s;
}
function findCol(headers,candidates){
  for(const c of candidates){
    const idx=headers.findIndex(h=>String(h).toLowerCase().includes(c.toLowerCase()));
    if(idx>=0)return idx;
  }
  return-1;
}

async function parseExcelFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){resolve([]);return;}

        const headers=rows[0].map(h=>String(h).trim());
        const C={
          fund:findCol(headers,["fund name","fund"]),
          type:findCol(headers,["transaction type","type"]),
          details:findCol(headers,["transaction details","details"]),
          date:findCol(headers,["transaction date","date"]),
          units:findCol(headers,["units"]),
          amount:findCol(headers,["transaction amount","amount"]),
          price:findCol(headers,["price(dollar","price (dollar","price per unit","price","nav"]),
          free:findCol(headers,["free units","free"])
        };

        const txs=[];
        for(let i=1;i<rows.length;i++){
          const row=rows[i];
          const fundName=String(row[C.fund]||"").trim();
          if(!fundName)continue;
          const txType=String(row[C.type]||"").trim();
          const txDetails=String(row[C.details]||"").trim();
          const txDate=parseDate(row[C.date]);
          const units=smartParseNum(row[C.units]);
          const amount=smartParseNum(row[C.amount]);
          const price=smartParseNum(row[C.price]);
          const freeLabel=C.free>=0?String(row[C.free]||"").trim():"";
          if(!txDate)continue;
          txs.push({
            id:uid(),fundName,txType,txDetails,txDate,
            units,amount,price,freeLabel,
            category:categorize(txType,txDetails)
          });
        }
        resolve(txs);
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function calcAllocFromTxs(txs){
  const byFund={};let total=0;
  for(const tx of txs){
    if(tx.category==="premium"){
      const amt=Math.abs(tx.amount);
      byFund[tx.fundName]=(byFund[tx.fundName]||0)+amt;
      total+=amt;
    }
  }
  // Always include ALL unique funds (including those with only switch/bonus/fee transactions)
  const allFunds=[...new Set(txs.map(t=>t.fundName))];
  return allFunds
    .map(name=>({name,allocation:total>0&&byFund[name]?Math.round((byFund[name]/total)*100):0}))
    .sort((a,b)=>b.allocation-a.allocation);
}

async function processAddClientExcel(file){
  const statusEl=document.getElementById("acUploadStatus");

  try{
    if(!window.XLSX)throw new Error("Excel parser not loaded. Please refresh.");
    const txs=await parseExcelFile(file);
    if(!txs.length)throw new Error("No valid transactions found. Check the file format.");
    pendingClientTxs=txs;

    setStatus(`✅ ${txs.length} transactions loaded · ${uniqueFunds} funds detected`,"var(--green)","rgba(34,197,94,0.08)","rgba(34,197,94,0.3)");
    if(zone){zone.style.borderColor="rgba(34,197,94,0.5)";zone.querySelector("div").textContent="✅";}

      fundListEl.style.display="block";
      fundListEl.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Detected Funds & Allocations</div>`+
        allocs.map(a=>`<div style="display:flex;justify-content:space-between;padding:7px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px;font-size:13px;">

    pendingClientTxs=[];
    setStatus(`❌ ${esc(err.message)}`,"#fca5a5","rgba(239,68,68,0.08)","rgba(239,68,68,0.3)");

}

window.updateBonusDisplay=()=>{
  const product=document.getElementById("cProduct")?.value||"";
  const term=document.getElementById("cTerm")?.value||"";
  const ap=parseFloat(document.getElementById("cAP")?.value||"0")||0;
  const el=document.getElementById("bonusIndicator");
  if(!el)return;
  if(!product||!term||!ap){el.innerHTML="";return;}
  const tbl=STARTUP_BONUS[product];
  if(!tbl){el.innerHTML="";return;}
  const tiers=tbl[parseInt(term)];
  if(!tiers){el.innerHTML="";return;}
  let matched=null;
  for(const t of tiers){if(ap>=t.min)matched=t;}
  const tiersHtml=tiers.map(t=>{
    const active=matched&&matched.tier===t.tier;
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-radius:8px;margin-bottom:4px;
      background:${active?"rgba(245,158,11,0.15)":"rgba(12,24,40,0.6)"};
      border:1px solid ${active?"var(--gold-border)":"rgba(30,41,59,0.4)"};
      opacity:${ap>=t.min?"1":"0.45"};">
      <div style="font-size:12px;">
        <span style="font-weight:700;color:${active?"var(--gold-l)":"var(--muted)"};">${t.tier}</span>
        <span style="color:var(--dim);margin-left:8px;">≥ ${$f(t.min)}/yr</span>
      </div>
      <div style="font-size:14px;font-weight:800;color:${active?"var(--gold-l)":"var(--dim)"};">${t.pct}%${active?" ✓":""}</div>
    </div>`;
  }).join("");
  el.innerHTML=`<div style="background:var(--bg3);border-radius:10px;padding:12px 14px;border:1px solid var(--gold-border);">
    <div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">🎁 Startup Bonus</div>
    ${tiersHtml}
    ${matched
      ?`<div style="margin-top:8px;padding:8px 12px;background:rgba(245,158,11,0.1);border-radius:7px;font-size:13px;font-weight:800;color:var(--gold-l);text-align:center;">
          ${matched.pct}% on ${$f(ap)} = <span style="color:var(--green);">${$f(ap*matched.pct/100)}</span>
        </div>`
      :`<div style="margin-top:6px;font-size:12px;color:var(--red);text-align:center;">⚠️ Premium below minimum for this term — no startup bonus</div>`
    }
  </div>`;
};

window.doAddClient=async()=>{
  const name=document.getElementById("cName")?.value.trim()||"";
  const policyNo=document.getElementById("cPolicy")?.value.trim()||"";
  const product=document.getElementById("cProduct")?.value||"";
  const rawStartDate=document.getElementById("cStart")?.value.trim()||"";
  const startDate=parseDate(rawStartDate);
  const term=document.getElementById("cTerm")?.value||"";
  const ap=document.getElementById("cAP")?.value||"";
  const notes=document.getElementById("cNotes")?.value.trim()||"";
  const errEl=document.getElementById("addClientErr");
  const errs=[];
  if(!name)errs.push("Name required.");
  if(!product)errs.push("Product required.");
  if(!rawStartDate||!startDate.match(/^\d{4}-\d{2}-\d{2}$/))errs.push("Start date required (format: DD-MM-YYYY).");
  if(!term)errs.push("Policy term required.");
  if(!ap||parseFloat(ap)<=0)errs.push("Annual premium required.");
  if(errEl){if(errs.length){errEl.textContent=errs.join(" ");errEl.style.display="block";return;}errEl.style.display="none";}
  const funds=calcAllocFromTxs(pendingClientTxs);
  const obj={
    uid:OWNER,name,policyNo,product,strategy:getStrategy(product),
    startDate,term:parseInt(term),annualPremium:parseFloat(ap),
    funds,notes,createdAt:new Date().toISOString()
  };
  try{
    const ref=await saveClient(obj);
    if(pendingClientTxs.length>0)await saveTransactions(ref.id,pendingClientTxs);
    pendingClientTxs=[];
    showToast("✅ Client saved!");
    tab="dashboard";renderAll();
  }catch(e){if(errEl){errEl.textContent="Error: "+e.message;errEl.style.display="block";}}
};

function buildTxTable(txs,filter,showFees=false){
  const visible=showFees?txs:txs.filter(t=>t.category!=="fee");
  const filtered=filter==="all"?visible:visible.filter(t=>t.category===filter);
  if(filtered.length===0)return`<div class="empty">No ${filter} transactions.</div>`;
  const sorted=[...filtered].sort((a,b)=>b.txDate.localeCompare(a.txDate));
  return`<table class="tx-table">
    <thead><tr>
      <th>Date</th><th>Fund</th><th>Type</th><th>Details</th>
      <th style="text-align:right;">Units</th>
      <th style="text-align:right;">Amount</th>
      <th style="text-align:right;">Price/Unit</th>
      <th>Category</th>
    </tr></thead>
    <tbody>${sorted.map(tx=>`<tr>
      <td style="white-space:nowrap;">${fmtDate(tx.txDate)}</td>
      <td style="max-width:160px;font-size:11px;">${esc(tx.fundName)}</td>
      <td style="font-size:11px;">${esc(tx.txType)}</td>
      <td style="font-size:11px;">${esc(tx.txDetails)}</td>
      <td style="text-align:right;font-family:monospace;color:${tx.units<0?"var(--red)":"var(--text)"};">${tx.units.toFixed(4)}</td>
      <td style="text-align:right;font-family:monospace;color:${tx.amount<0?"var(--red)":"var(--text)"};">${$f(tx.amount)}</td>
      <td style="text-align:right;font-family:monospace;">$${tx.price.toFixed(6)}</td>
      <td><span class="tx-cat tx-${tx.category}">${tx.category}</span></td>
    </tr>`).join("")}</tbody>
  </table>`;
}
// ── Fund card drag-and-drop ordering ──
function getFundOrder(clientId,names){
  try{
    const saved=JSON.parse(localStorage.getItem(`fo_${clientId}`)||"[]");
    if(!saved.length)return names;
    const ordered=saved.filter(n=>names.includes(n));
    names.filter(n=>!saved.includes(n)).forEach(n=>ordered.push(n));
    return ordered;
  }catch{return names;}
}
function saveFundOrder(clientId,names){
  localStorage.setItem(`fo_${clientId}`,JSON.stringify(names));
}
let _dragFund=null;
window.fundDragStart=(e,clientId,fname)=>{
  _dragFund={clientId,fname};
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed="move";
};
window.fundDragOver=(e)=>{
  e.preventDefault();
  e.currentTarget.classList.add("drag-over");
  e.dataTransfer.dropEffect="move";
};
window.fundDragLeave=(e)=>{e.currentTarget.classList.remove("drag-over");};
window.fundDrop=(e,clientId)=>{
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if(!_dragFund||_dragFund.clientId!==clientId)return;
  const target=e.currentTarget.dataset.fund;
  if(!target||target===_dragFund.fname){_dragFund=null;return;}
  const txs=clientTxs[clientId]||[];
  const names=getFundOrder(clientId,Object.keys(calcPortfolio(txs)));
  const fi=names.indexOf(_dragFund.fname),ti=names.indexOf(target);
  if(fi!==-1&&ti!==-1){names.splice(fi,1);names.splice(ti,0,_dragFund.fname);}
  saveFundOrder(clientId,names);
  _dragFund=null;
  renderAll();
};

// ── Price fetch engine (Vercel serverless) ──
// Calls /api/fund-prices which runs server-side — no CORS proxies needed.
window.doFetchPrices=async()=>{
  const btn=document.getElementById("fetchBtn");
  const statusEl=document.getElementById("fetchStatus");
  if(btn){btn.disabled=true;btn.textContent="⏳ Fetching...";}
  function setStatus(msg,color="var(--gold)",bg="rgba(245,158,11,0.1)",border="var(--gold-border)"){
    if(!statusEl)return;
    statusEl.style.display="block";statusEl.style.background=bg;statusEl.style.border=`1px solid ${border}`;statusEl.style.color=color;statusEl.innerHTML=msg;
  }
  function reset(){if(btn){btn.disabled=false;btn.textContent="⟳ Fetch Latest Prices";}}

  setStatus("⏳ Fetching latest prices from Income's website...");
  try{
    const resp=await fetch('/api/fund-prices',{signal:AbortSignal.timeout(35000)});
    if(!resp.ok)throw new Error(`Server error ${resp.status}`);
    const data=await resp.json();
    if(!data.prices||Object.keys(data.prices).length===0)throw new Error(data.error||'No prices returned');

    let found=0;
    for(const[name,price]of Object.entries(data.prices)){await saveFundPriceDB(name,price);found++;}

    // Save each price to history so long-term performance can be calculated over time
    const today=new Date().toISOString().split("T")[0];
    const hb=writeBatch(db);
    for(const[name,price]of Object.entries(data.prices)){
      const did=name.replace(/[^a-zA-Z0-9]/g,"_")+"_"+today;
      hb.set(doc(db,"fundPriceHistory",did),{fundName:name,price:parseFloat(price),date:today,fetchedAt:new Date().toISOString()});
    }
    await hb.commit().catch(e=>console.warn("History save error:",e));

    reset();
    const missing=data.missing||[];
    const srcLabel=data.source==='monthly'?' (end-of-month prices)':'';
    if(missing.length===0){
      setStatus(`✅ All ${found} fund prices updated${srcLabel}!`,"var(--green)","rgba(34,197,94,0.1)","rgba(34,197,94,0.3)");
      showToast(`✅ All ${found} fund prices updated!`);
    }else{
      setStatus(`✅ ${found} prices updated${srcLabel}. Missing: ${missing.map(n=>n.replace('Income ','').replace(' Fund','')).join(', ')} — use ✏️ to enter manually.`,"var(--gold-l)","rgba(245,158,11,0.08)","var(--gold-border)");
      showToast(`✅ ${found} fund prices updated!`);
    }
    renderPage();
  }catch(e){
    reset();
    setStatus(
      `❌ Could not fetch prices. Use ✏️ to enter manually from <a href="https://www.income.com.sg/funds/historical-prices" target="_blank" style="color:var(--gold);">Income's website</a>. (${e.message})`,
      "#fca5a5","rgba(239,68,68,0.1)","rgba(239,68,68,0.3)"
    );
  }
};

// Auto-fetch prices once per day on page load (tracks date in localStorage per device)
async function autoFetchPricesOnStartup(){
  // Wait for Firestore listeners to hydrate fund prices first
  await new Promise(r=>setTimeout(r,3000));
  const today=new Date().toISOString().split("T")[0];
  const lastFetch=localStorage.getItem("lastAutoFetch");
  if(lastFetch===today)return; // Already fetched today on this device
  // Mark as fetched before starting (prevents double-fetch if user reloads mid-fetch)
  localStorage.setItem("lastAutoFetch",today);
  window.doFetchPrices().catch(()=>{});
}

async function processUpload(file,clientId){
  const statusEl=document.getElementById(`uploadStatus-${clientId}`);
  if(statusEl){statusEl.className="upload-status";statusEl.textContent="⏳ Parsing file...";}
  try{
    if(!window.XLSX){throw new Error("Excel parser not loaded. Please refresh the page.");}
    const txs=await parseExcelFile(file);
    if(txs.length===0)throw new Error("No valid transactions found. Check the file format.");
    await saveTransactions(clientId,txs);
    clientTxs[clientId]=txs;
    if(statusEl){statusEl.className="upload-status ok";statusEl.textContent=`✅ ${txs.length} transactions imported from ${file.name}`;}
    showToast(`✅ ${txs.length} transactions uploaded!`);
    // Refresh transactions listener
    loadClientTxs(clientId);
    renderPage();
  }catch(err){
    if(statusEl){statusEl.className="upload-status err";statusEl.textContent=`❌ ${err.message}`;}
  }
}
async function loadClientTxs(clientId){
  const q=query(collection(db,"transactions"),where("clientId","==",clientId),where("uid","==",OWNER));
  const snap=await getDocs(q);
  clientTxs[clientId]=[];
  snap.forEach(d=>clientTxs[clientId].push(d.data()));
  clientTxs[clientId].sort((a,b)=>b.txDate.localeCompare(a.txDate));
}

// ── Fund Detail Modal ─────────────────────────────────────────────────────────
let _fdmFund=null,_fdmPeriod="1Y",_fdmData=null,_fdmHistory=null,_fdmTimeseries=null,_fdmMStar=null,_fdmHoldings=null,_fdmTab="overview",_fdmChart=null;

function riskPips(level){
  return`<div class="risk-row">${[1,2,3,4,5,6,7].map(i=>`<div class="risk-pip${i<=level?" on"+(i>=6?" r"+i:""):""}"></div>`).join("")}</div>`;
}
function colorPct(v){
  if(v===null||v===undefined)return`<span style="color:var(--dim)">N/A</span>`;
  const c=v>=0?"var(--green)":"var(--red)";
  return`<span style="color:${c};font-weight:900;">${v>=0?"+":""}${v.toFixed(2)}%</span>`;
}

window.openFundDetail=(name)=>{
  _fdmFund=name;_fdmPeriod="1Y";_fdmData=null;_fdmHistory=null;_fdmTimeseries=null;_fdmMStar=null;_fdmHoldings=null;_fdmTab="overview";
  if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
  const ov=document.getElementById("fdmOverlay");
  if(!ov)return;
  ov.style.display="flex";
  renderFdmShell();
  renderFdmBody();
  // Fetch 6-year daily price history from Morningstar (primary chart source)
  fetchFdmTimeseries(name);
  // Load stored Firestore price history (fallback / supplements timeseries)
  loadFdmHistory(name);
  // Fetch live chart data from Income's website via Vercel
  fetchFdmData(name);
  // Fetch Morningstar performance data (for funds with known SecId mapping)
  fetchFdmMorningstar(name);
  // Fetch Morningstar holdings / allocation data
  fetchFdmHoldings(name);
};

function fetchFdmTimeseries(name){
  fetch(`/api/fund-timeseries?name=${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(20000)})
    .then(r=>r.json())
    .then(data=>{
      _fdmTimeseries=(data.prices&&data.prices.length>=2)?data:null;
      if(_fdmTab==="performance")renderFdmBody();
    })
    .catch(()=>{ _fdmTimeseries=null; });
}

async function loadFdmHistory(name){
  try{
    const q=query(collection(db,"fundPriceHistory"),where("fundName","==",name));
    const snap=await getDocs(q);
    const rows=[];
    snap.forEach(d=>rows.push(d.data()));
    // Sort newest first by date (YYYY-MM-DD strings sort correctly)
    rows.sort((a,b)=>b.date.localeCompare(a.date));
    _fdmHistory=rows;
    if(_fdmTab==="performance")renderFdmBody();
  }catch(e){_fdmHistory=[];if(_fdmTab==="performance")renderFdmBody();}
}

function calcPerfFromStored(history){
  if(!history||!history.length)return null;
  const latest=history[0];
  const latestDate=new Date(latest.date);
  const latestPrice=latest.price;
  const findPrice=(daysAgo)=>{
    const t=new Date(latestDate);t.setDate(t.getDate()-daysAgo);
    const ts=t.toISOString().split("T")[0];
    for(const e of history){if(e.date<=ts)return e.price;}
    return null;
  };
  const pct=(daysAgo)=>{
    const old=findPrice(daysAgo);
    if(old===null||old<=0)return null;
    return+((latestPrice-old)/old*100).toFixed(2);
  };
  return{"1M":pct(30),"3M":pct(91),"6M":pct(182),"1Y":pct(365),"3Y":pct(1095),"5Y":pct(1825)};
}

window.closeFundDetail=()=>{
  const ov=document.getElementById("fdmOverlay");
  if(ov)ov.style.display="none";
  if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
  _fdmFund=null;_fdmData=null;_fdmTimeseries=null;_fdmMStar=null;_fdmHoldings=null;
};

function fetchFdmData(name){
  fetch(`/api/fund-detail?name=${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(28000)})
    .then(r=>r.json())
    .then(data=>{
      _fdmData=data;
      // If user is on performance tab, re-render now that data arrived
      if(_fdmTab==="performance")renderFdmBody();
    })
    .catch(e=>{_fdmData={error:e.message};if(_fdmTab==="performance")renderFdmBody();});
}

function fetchFdmMorningstar(name){
  fetch(`/api/fund-morningstar?name=${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(20000)})
    .then(r=>r.json())
    .then(data=>{
      if(!data.noMapping&&!data.error){
        _fdmMStar=data;
        if(_fdmTab==="performance")renderFdmBody();
      }
    })
    .catch(()=>{});
}

function fetchFdmHoldings(name){
  fetch(`/api/fund-holdings?name=${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(20000)})
    .then(r=>r.json())
    .then(data=>{
      _fdmHoldings=data.noMapping?{noMapping:true}:data.error?{error:data.error}:data;
      if(_fdmTab==="holdings")renderFdmBody();
    })
    .catch(()=>{ _fdmHoldings={error:"Request failed"};if(_fdmTab==="holdings")renderFdmBody(); });
}

window.switchFdmTab=(tab)=>{
  _fdmTab=tab;
  if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
  renderFdmShell();
  renderFdmBody();
};

window.selectFdmPeriod=(period)=>{
  _fdmPeriod=period;
  if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
  renderFdmBody();
};

function renderFdmShell(){
  const info=FUND_DB[_fdmFund]||{};
  const RISK_LABEL=["","Very Low","Low","Low-Medium","Medium","Medium-High","High","Very High"];
  const ASSET_COLOR={"Fixed Income":"rgba(59,130,246,0.15)","Equity — Technology":"rgba(139,92,246,0.15)","Multi-Asset / Alternative":"rgba(245,158,11,0.12)","Money Market":"rgba(16,185,129,0.12)","Multi-Asset — Shariah Compliant":"rgba(16,185,129,0.12)"};
  const badgeBg=ASSET_COLOR[info.assetClass]||"rgba(100,116,139,0.15)";
  document.getElementById("fdmHdr").innerHTML=
    `<div class="fdm-title">${esc(_fdmFund)}</div>
     <div class="fdm-badges">
       <span class="fdm-badge" style="background:${badgeBg};color:#e2e8f0;">${info.assetClass||"—"}</span>
       <span class="fdm-badge" style="background:rgba(100,116,139,0.15);color:#cbd5e1;">🌍 ${info.geography||"—"}</span>
       <span class="fdm-badge" style="background:rgba(100,116,139,0.15);color:#cbd5e1;">${info.currency||"—"}</span>
       <span class="fdm-badge" style="background:rgba(239,68,68,0.1);color:#fca5a5;">Risk ${info.riskLevel||"—"}/7 · ${RISK_LABEL[info.riskLevel]||"—"}</span>
     </div>`;
  const TABS=[["overview","📋 Overview"],["performance","📈 Performance"],["holdings","💼 Holdings"],["history","📅 History"]];
  document.getElementById("fdmTabs").innerHTML=
    TABS.map(([k,v])=>`<button class="fdm-tab${_fdmTab===k?" active":""}" onclick="switchFdmTab('${k}')">${v}</button>`).join("");
}

function renderFdmBody(){
  const el=document.getElementById("fdmBody");
  if(!el)return;
  if(_fdmTab==="overview")el.innerHTML=renderFdmOverview();
  else if(_fdmTab==="performance")el.innerHTML=renderFdmPerformance();
  else if(_fdmTab==="holdings")el.innerHTML=renderFdmHoldings();
  else el.innerHTML=renderFdmHistory();
  if(_fdmTab==="performance"){

function renderFdmPerformance(){
  const PERIODS=["1M","3M","6M","1Y","3Y","5Y"];
  const info=FUND_DB[_fdmFund]||{};
  let h="";

  // Performance source priority: Morningstar → Firestore stored history → static factsheet → Vercel live API
  const storedPerf=calcPerfFromStored(_fdmHistory);
  const staticAR=info.annualizedReturns;
  const livePerf=_fdmData&&!_fdmData.error?_fdmData.performance:null;
  const msPerf=_fdmMStar&&_fdmMStar.performance?_fdmMStar.performance:null;

  let perf=null,perfSource="";
  if(msPerf&&Object.values(msPerf).some(v=>v!==null)){
    perf=msPerf;
    const stars=_fdmMStar.starRating?`${"★".repeat(_fdmMStar.starRating)}${"☆".repeat(5-_fdmMStar.starRating)}`:"";
    const aum=_fdmMStar.totalAssets?` · AUM SGD ${Number(_fdmMStar.totalAssets).toLocaleString()}M`:"";
    perfSource=`⭐ Morningstar data for ${esc(_fdmMStar.morningstarName||"")}${aum}${stars?" · "+stars:""}`;
  }else if(storedPerf&&_fdmHistory&&_fdmHistory.length>=2){
    perf=storedPerf;
    perfSource=`📅 Calculated from ${_fdmHistory.length} stored price points (${_fdmHistory[_fdmHistory.length-1]?.date} – ${_fdmHistory[0]?.date})`;
  }else if(staticAR){
    perf=staticAR;
    perfSource=`📋 From fund factsheet as of ${staticAR.asOf} — press ⟳ Fetch to start building live history`;
  }else if(livePerf){
    perf=livePerf;
    perfSource=`📡 From Income's website (limited to ~30 days of embedded price data)`;
  }

  // Latest price info
  const latest=_fdmData&&!_fdmData.error?_fdmData.latest:null;

  // Performance grid
  if(!perf&&_fdmHistory===null&&!_fdmData&&!_fdmMStar){
    h+=`<div class="fdm-loading">⏳ Loading performance data...</div>`;
    return h;
  }

  // Morningstar badge if data arrived
  if(_fdmMStar&&_fdmMStar.starRating){
    const stars="★".repeat(_fdmMStar.starRating)+"☆".repeat(5-_fdmMStar.starRating);
    const aum=_fdmMStar.totalAssets?`<span style="color:#94a3b8;font-size:11px;margin-left:10px;">AUM: SGD ${Number(_fdmMStar.totalAssets).toLocaleString()}M</span>`:"";
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:10px;">
      <span style="color:var(--gold);font-size:18px;letter-spacing:1px;">${stars}</span>
      <span style="color:#e2e8f0;font-size:12px;font-weight:700;">Morningstar Rating</span>
      ${aum}
      ${_fdmMStar.categoryName?`<span style="color:#94a3b8;font-size:11px;margin-left:auto;">${esc(_fdmMStar.categoryName)}</span>`:""}
    </div>`;
  }

  if(perf){
    h+=`<div class="fdm-sec-hd">📊 Performance by Period</div>`;
    h+=`<div class="fdm-perf-row">`;
    PERIODS.forEach(p=>{
      const v=perf[p];
      const col=v===null||v===undefined?"#6b7280":v>=0?"var(--green)":"var(--red)";
      const txt=v===null||v===undefined?"N/A":`${v>=0?"+":""}${v.toFixed(2)}%`;
      h+=`<div class="fdm-perf-cell${_fdmPeriod===p?" active":""}" onclick="selectFdmPeriod('${p}')">
        <div class="fdm-perf-period">${p}</div>
        <div class="fdm-perf-pct" style="color:${col};">${txt}</div>
      </div>`;
    });
    h+=`</div>`;
    if(perfSource)h+=`<div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">${perfSource}</div>`;
  }

  // Price chart — priority: Morningstar timeseries > Firestore history > live 30-day
  const hasTS=_fdmTimeseries&&_fdmTimeseries.prices&&_fdmTimeseries.prices.length>=2;
  const hasStored=_fdmHistory&&_fdmHistory.length>=2;
  if(!hasTS&&_fdmTimeseries===null&&_fdmHistory===null&&!_fdmData){
    h+=`<div class="fdm-loading" style="padding:20px;">⏳ Loading price chart...</div>`;
  }else if(hasTS||hasStored||(_fdmData&&!_fdmData.error&&_fdmData.chartData)){
    if(latest)h+=`<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;">Latest bid price: <strong style="color:#f1f5f9;">$${latest.price.toFixed(6)}</strong> as of ${latest.date}</div>`;
    // Calculate what will actually be shown (mirrors drawFdmChart priority)
    const DAYS={"1M":30,"3M":91,"6M":182,"1Y":365,"3Y":1095,"5Y":1825};
    const cutoffMs=Date.now()-(DAYS[_fdmPeriod]||365)*864e5;
    let chartSrc=null,chartFmt="iso";
    if(hasTS){chartSrc=_fdmTimeseries.prices;chartFmt="iso";}
    else if(hasStored){chartSrc=_fdmHistory.slice().reverse();chartFmt="iso";}
    else{chartSrc=_fdmData.chartData;chartFmt="dmy";}
    const toMs=d=>chartFmt==="iso"?new Date(d.date).getTime():new Date(d.date.split("/").reverse().join("-")).getTime();
    const inPeriod=chartSrc.filter(e=>toMs(e)>=cutoffMs);
    const shown=inPeriod.length>=2?inPeriod:chartSrc;
    const getDate=e=>e.date;
    const oldest=getDate(shown[0]),newest=getDate(shown[shown.length-1]);
    const insufficient=inPeriod.length<2;
    h+=`<div class="fdm-chart-wrap"><canvas id="fdmChartCanvas"></canvas></div>`;
    h+=`<div style="font-size:11px;color:#6b7280;margin-top:4px;margin-bottom:12px;">`;
    if(hasTS){
      h+=`📈 ${_fdmTimeseries.count} daily prices · ${oldest} – ${newest}`;
      if(insufficient)h+=` &nbsp;·&nbsp; <span style="color:#f59e0b;">Showing all available — fund has less than ${_fdmPeriod} of history</span>`;
    }else if(hasStored){
      h+=`Showing: ${oldest} – ${newest}`;
      if(insufficient)h+=` &nbsp;·&nbsp; <span style="color:#f59e0b;">Not enough history for ${_fdmPeriod} — showing all ${_fdmHistory.length} stored points</span>`;
    }else{
      h+=`Showing last 30 days from Income's website.`;
    }
    h+=`</div>`;
  }else if(_fdmData&&_fdmData.error){
    h+=`<div class="fdm-err">⚠️ Chart unavailable: ${esc(_fdmData.error)}</div>`;
  }

  if(!perf&&!_fdmData){
    h+=`<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px;">No performance data yet. Press <strong style="color:var(--gold);">⟳ Fetch Latest Prices</strong> from the Fund Prices tab to start building history.</div>`;
  }

  return h;
}

function drawFdmChart(period){
  const canvas=document.getElementById("fdmChartCanvas");
  if(!canvas)return;
  // 1. Morningstar timeseries — 6 years daily, best source for period filtering
  if(_fdmTimeseries&&_fdmTimeseries.prices&&_fdmTimeseries.prices.length>=2){
    return _drawChart(canvas,_fdmTimeseries.prices,period,"iso");
  }
  // 2. Stored Firestore history — accumulates over time
  if(_fdmHistory&&_fdmHistory.length>=2){
    const hist=_fdmHistory.slice().reverse().map(e=>({date:e.date,price:e.price}));
    return _drawChart(canvas,hist,period,"iso");
  }
  // 3. Live 30-day data from Income's website
  if(_fdmData&&!_fdmData.error&&_fdmData.chartData)return _drawChart(canvas,_fdmData.chartData,period,"dmy");
}
function _drawChart(canvas,chartData,period,fmt){
  if(!chartData||!chartData.length)return;
  const days={"1M":30,"3M":91,"6M":182,"1Y":365,"3Y":1095,"5Y":1825}[period]||365;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
  // Parse date depending on format: "DD/MM/YYYY" (dmy) or "YYYY-MM-DD" (iso)
  const toDate=d=>fmt==="iso"?new Date(d):new Date(d.split("/").reverse().join("-"));
  const filtered=chartData.filter(e=>toDate(e.date)>=cutoff);
  const data=filtered.length>=2?filtered:chartData;
  const prices=data.map(e=>e.price);
  const labels=data.map(e=>toDate(e.date).toLocaleDateString("en-SG",{day:"numeric",month:"short",year:data.length>180?"2-digit":"numeric"}));
  const first=prices[0],last=prices[prices.length-1];
  const isUp=last>=first;
  const col=isUp?"#10b981":"#ef4444";
  const colBg=isUp?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)";
  if(_fdmChart){_fdmChart.destroy();_fdmChart=null;}
  _fdmChart=new Chart(canvas,{
    type:"line",
    data:{labels,datasets:[{data:prices,borderColor:col,backgroundColor:colBg,borderWidth:2,fill:true,
      pointRadius:data.length>120?0:3,pointHoverRadius:7,tension:0.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',axis:'x',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:items=>items[0]?.label||"",
          label:c=>`Bid: $${c.raw.toFixed(6)}`
        }}
      },
      scales:{
        x:{ticks:{maxTicksLimit:7,color:"#6b7280",maxRotation:0},grid:{color:"rgba(255,255,255,0.04)"}},
        y:{ticks:{color:"#6b7280",callback:v=>"$"+v.toFixed(4)},grid:{color:"rgba(255,255,255,0.04)"}}
      }
    },
    plugins:[xhairPlugin]
  });
}

// 🧮 SCENARIO CALCULATOR
// ══════════════════════════════════════════════════════════════════════════════
let _calcSubTab="planner",_calcChart2=null;
let _calcS=[
  {name:"Bank / Savings Account",startAge:30,endAge:65,mode:"monthly",amount:500,lump:0,rate:2.5},
  {name:"Investment Fund",        startAge:30,endAge:65,mode:"monthly",amount:500,lump:0,rate:8.0}
];

function calcFV(s,yrsOverride){
  const yrs=yrsOverride!==undefined?yrsOverride:Math.max(0,(+s.endAge||65)-(+s.startAge||30));
  const mthly=s.mode==="monthly"?+s.amount:(+s.amount/12);
  const r=+s.rate/100,rm=r/12,mo=yrs*12,L=+(s.lump)||0;
  if(mo<=0)return{fv:L,totalDep:L,growth:0,pctGained:0,rule72:null,passiveMo:L*0.04/12,yrs,mthly,annual:mthly*12};
  const fv=rm<1e-9?L+mthly*mo:(()=>{const gf=Math.pow(1+rm,mo);return L*gf+mthly*(gf-1)/rm;})();
  const totalDep=L+mthly*mo;
  const growth=Math.max(0,fv-totalDep);
  return{fv,totalDep,growth,pctGained:totalDep>0?growth/totalDep*100:0,rule72:r>0?72/+s.rate:null,passiveMo:fv*0.04/12,yrs,mthly,annual:mthly*12};
}

function $fc(v){return"$"+Math.round(Math.max(0,v)).toLocaleString("en-SG");}

    </div>
    <div class="calc-sub-tabs">
      <button class="calc-sub-tab${_calcSubTab==="planner"?" active":""}" onclick="switchCalcTab('planner')">📊 Scenario Planner</button>
      <button class="calc-sub-tab${_calcSubTab==="projection"?" active":""}" onclick="switchCalcTab('projection')">📅 Year-by-Year Table</button>
    </div>`;
  if(_calcSubTab==="planner"){
    h+=buildCalcPlanner(s1,s2,r1,r2);
  } else {
    h+=buildCalcProjection(s1,s2);
  }
  h+=`</div>`;
  return h;
}

function buildCalcPlanner(s1,s2,r1,r2){
  const diff=r2.fv-r1.fv,diffPct=r1.fv>0?diff/r1.fv*100:0;
  const winCol=diff>=0?"var(--gold)":"#06b6d4";
  const winName=diff>=0?esc(s2.name):esc(s1.name);
  let h=``;

  // ── Results area: chart + cards ──
  h+=`<div class="calc-results-area">
    <div class="calc-chart-panel">
      <div class="calc-chart-title">Total Value Comparison</div>
      <canvas id="calcChartCanvas" style="position:absolute;inset:44px 18px 18px;width:calc(100% - 36px)!important;height:calc(100% - 62px)!important;"></canvas>
    </div>
    <div class="calc-result-cards">
      <div class="calc-rc" id="calc-rc-0" style="border-left:3px solid #06b6d4;">
        ${buildCalcCard(s1,r1,"#06b6d4",1)}
      </div>
      <div class="calc-rc" id="calc-rc-1" style="border-left:3px solid var(--gold);">
        ${buildCalcCard(s2,r2,"var(--gold)",2)}
      </div>
    </div>
  </div>`;

  // ── Difference banner ──
  if(r1.fv>0&&r2.fv>0){
    const mult=(r2.fv/r1.fv).toFixed(1);
    h+=`<div class="calc-diff-banner" id="calc-diff">
      <div class="calc-diff-ico">${diff>=0?"🏆":"📊"}</div>
      <div>
        <div class="calc-diff-main">${winName} creates <span style="color:${winCol};">${$fc(Math.abs(diff))} more wealth</span> over ${Math.max(r1.yrs,r2.yrs)} years</div>
        <div class="calc-diff-sub">
          That's <strong style="color:${winCol};">${Math.abs(diffPct).toFixed(1)}% more total value</strong>
          ${diff>=0?` · Scenario 2 is <strong style="color:var(--gold);">${mult}× larger</strong> than Scenario 1`:""}
          &nbsp;·&nbsp; Same deposits, dramatically different outcomes — the power of compounding.
        </div>
      </div>
    </div>`;
  }

  // ── Input panels ──
  h+=`<div class="calc-inputs-row">
    ${buildCalcInput(0,s1,"#06b6d4")}
    ${buildCalcInput(1,s2,"var(--gold)")}
  </div>`;

  h+=`<div class="calc-disclaimer">* Est. Monthly Passive Income uses the 4% annual withdrawal rule (FV × 4% ÷ 12). Illustrations are hypothetical and do not guarantee future returns. Compound interest formula assumes end-of-period contributions. Does not account for fees, taxes, inflation, or policy charges. Not financial advice — for illustration purposes only.</div>`;
  return h;
}

function buildCalcCard(s,r,col,num){
  const depPct=r.fv>0?(r.totalDep/r.fv*100):100;
  const growPct=100-depPct;
  return`<div class="calc-rc-name" style="color:${col};">Scenario ${num} · ${esc(s.name)}</div>
    <div class="calc-rc-fv">${$fc(r.fv)}</div>
    <div class="calc-rc-sub">Total value after ${r.yrs} year${r.yrs!==1?"s":""} at ${s.rate}% p.a.</div>
    <div style="height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06);margin-bottom:10px;display:flex;">
      <div style="width:${depPct.toFixed(1)}%;background:#3b82f6;"></div>
      <div style="width:${growPct.toFixed(1)}%;background:${col};"></div>
    </div>
    <div class="calc-rc-grid">
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Total Deposits</div>
        <div class="calc-rc-stat-val" style="color:#60a5fa;">${$fc(r.totalDep)}</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Growth Earned</div>
        <div class="calc-rc-stat-val" style="color:var(--green);">+${$fc(r.growth)}</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">% Gained on Deposits</div>
        <div class="calc-rc-stat-val" style="color:${r.pctGained>=0?"var(--green)":"var(--red)"};">${r.pctGained>=0?"+":""}${r.pctGained.toFixed(1)}%</div>
      </div>
      <div class="calc-rc-stat">
        <div class="calc-rc-stat-lbl">Est. Monthly Income*</div>
        <div class="calc-rc-stat-val" style="color:${col};">${$fc(r.passiveMo)}/mo</div>
      </div>
      ${r.rule72?`<div class="calc-rc-stat" style="grid-column:span 2;">
        <div class="calc-rc-stat-lbl">Rule of 72 — Money Doubles Every</div>
        <div class="calc-rc-stat-val">${r.rule72.toFixed(1)} years at ${s.rate}% p.a.</div>
      </div>`:""}
    </div>`;
}

function buildCalcInput(idx,s,col){
  const altAmt=s.mode==="monthly"?s.amount*12:s.amount/12;
  const altLabel=s.mode==="monthly"?"annual":"monthly";
  return`<div class="calc-input-panel">
    <div class="calc-ip-hd" style="color:${col};">⚙ Scenario ${idx+1} — Inputs</div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Scenario Name</label>
      <input class="calc-ip-name" value="${esc(s.name)}" placeholder="e.g. Bank Savings" oninput="calcSet(${idx},'name',this.value)" style="border-color:${col}30;"/>
    </div>
    <div class="calc-ip-2col">
      <div class="calc-ip-field" style="margin-bottom:0;">
        <label class="calc-ip-label">Start Age</label>
        <input class="calc-ip-input" type="number" min="0" max="99" value="${s.startAge}" oninput="calcSet(${idx},'startAge',+this.value)"/>
      </div>
      <div class="calc-ip-field" style="margin-bottom:0;">
        <label class="calc-ip-label">End Age</label>
        <input class="calc-ip-input" type="number" min="1" max="100" value="${s.endAge}" oninput="calcSet(${idx},'endAge',+this.value)"/>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Lump Sum / Initial Amount (optional)</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym left">$</span>
        <input class="calc-ip-input pl" type="number" min="0" value="${s.lump||0}" oninput="calcSet(${idx},'lump',+this.value)"/>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label">Deposit Frequency</label>
      <div class="calc-mode-row">
        <button class="calc-mode-btn${s.mode==="monthly"?" active":""}" onclick="calcSet(${idx},'mode','monthly')">Monthly</button>
        <button class="calc-mode-btn${s.mode==="annual"?" active":""}" onclick="calcSet(${idx},'mode','annual')">Annual</button>
      </div>
    </div>
    <div class="calc-ip-field">
      <label class="calc-ip-label" id="calc-dep-lbl-${idx}">${s.mode==="monthly"?"Monthly":"Annual"} Deposit Amount</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym left">$</span>
        <input class="calc-ip-input pl" type="number" min="0" value="${s.amount}" oninput="calcSet(${idx},'amount',+this.value)"/>
      </div>
      <div class="calc-ip-hint" id="calc-hint-${idx}">≈ ${$fc(altAmt)} ${altLabel}</div>
    </div>
    <div class="calc-ip-field" style="margin-bottom:0;">
      <label class="calc-ip-label">Annual Rate of Return</label>
      <div class="calc-ip-wrap"><span class="calc-ip-sym right">%</span>
        <input class="calc-ip-input pr" type="number" min="0" max="50" step="0.1" value="${s.rate}" oninput="calcSet(${idx},'rate',+this.value)"/>
      </div>
    </div>
  </div>`;
}

function buildCalcProjection(s1,s2){
  const yrs1=Math.max(0,(+s1.endAge||65)-(+s1.startAge||30));
  const yrs2=Math.max(0,(+s2.endAge||65)-(+s2.startAge||30));
  const maxYrs=Math.max(yrs1,yrs2,1);
  const milestones=new Set([1,5,10,15,20,25,30,35,40,maxYrs]);
  let rows="";
  for(let y=1;y<=maxYrs;y++){
    const v1=y<=yrs1?calcFV(s1,y):null;
    const v2=y<=yrs2?calcFV(s2,y):null;
    const diff=v1&&v2?v2.fv-v1.fv:null;
    const isMile=milestones.has(y);
    rows+=`<tr class="${isMile?"proj-milestone":""}">
      <td>${y}${isMile?` <span style="color:var(--gold);font-size:10px;">●</span>`:""}</td>
      <td>${v1?$fc(v1.totalDep):"—"}</td>
      <td style="color:#60a5fa;">${v1?$fc(v1.fv):"—"}</td>
      <td style="color:var(--green);">${v1&&v1.pctGained>0?"+"+v1.pctGained.toFixed(0)+"%":"—"}</td>
      <td>${v2?$fc(v2.totalDep):"—"}</td>
      <td style="color:var(--gold);">${v2?$fc(v2.fv):"—"}</td>
      <td style="color:var(--green);">${v2&&v2.pctGained>0?"+"+v2.pctGained.toFixed(0)+"%":"—"}</td>
      <td style="color:${diff===null?"var(--dim)":diff>=0?"var(--gold)":"var(--red)"};font-weight:800;">${diff===null?"—":diff>=0?"+"+$fc(diff):"-"+$fc(Math.abs(diff))}</td>
    </tr>`;
  }
  return`<div class="calc-proj-wrap">
    <table class="calc-proj-table">
      <thead>
        <tr>
          <th>Year</th>
          <th>${esc(s1.name)} — Deposits</th>
          <th style="color:#60a5fa;">S1 Value</th>
          <th style="color:var(--green);">S1 % Gain</th>
          <th>${esc(s2.name)} — Deposits</th>
          <th style="color:var(--gold);">S2 Value</th>
          <th style="color:var(--green);">S2 % Gain</th>
          <th>Difference</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="calc-disclaimer">● = milestone years. Values rounded to nearest dollar. Same assumptions as Scenario Planner. Not financial advice.</div>`;
}

function drawCalcChart(){
  const canvas=document.getElementById("calcChartCanvas");
  if(!canvas)return;
  if(_calcChart2){_calcChart2.destroy();_calcChart2=null;}
  const [s1,s2]=_calcS,r1=calcFV(s1),r2=calcFV(s2);
  _calcChart2=new Chart(canvas,{
    type:"bar",
    data:{
      labels:[esc(s1.name),esc(s2.name)],
      datasets:[
        {label:"Total Deposits",data:[r1.totalDep,r2.totalDep],backgroundColor:["rgba(96,165,250,0.75)","rgba(96,165,250,0.75)"],borderColor:["#60a5fa","#60a5fa"],borderWidth:1,borderRadius:4,borderSkipped:"bottom"},
        {label:"Growth",data:[r1.growth,r2.growth],backgroundColor:["rgba(34,197,94,0.7)","rgba(245,158,11,0.8)"],borderColor:["#22c55e","#f59e0b"],borderWidth:1,borderRadius:4,borderSkipped:"bottom"}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:"#94a3b8",font:{size:11,weight:"bold"},boxWidth:12,padding:16}},
        tooltip:{
          callbacks:{
            label:ctx=>{
              const v=ctx.raw;
              return` ${ctx.dataset.label}: $${Math.round(v).toLocaleString()}`;
            }
          }
        }
      },
      scales:{
        x:{stacked:true,ticks:{color:"#94a3b8",font:{size:12,weight:"bold"}},grid:{color:"rgba(255,255,255,0.04)"}},
        y:{stacked:true,ticks:{color:"#64748b",font:{size:11},callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:"rgba(255,255,255,0.05)"}}
      }
    }
  });
}

function updateCalcUI(){
  const [s1,s2]=_calcS,r1=calcFV(s1),r2=calcFV(s2);
  // Update result cards
  const c0=document.getElementById("calc-rc-0"),c1=document.getElementById("calc-rc-1");
  if(c0)c0.innerHTML=buildCalcCard(s1,r1,"#06b6d4",1);
  if(c1)c1.innerHTML=buildCalcCard(s2,r2,"var(--gold)",2);
  // Update diff banner
  const diff=r2.fv-r1.fv,diffPct=r1.fv>0?diff/r1.fv*100:0;
  const db=document.getElementById("calc-diff");
  if(db&&r1.fv>0&&r2.fv>0){
    const winCol=diff>=0?"var(--gold)":"#06b6d4";
    const winName=diff>=0?esc(s2.name):esc(s1.name);
    const mult=(r2.fv/r1.fv).toFixed(1);
    db.innerHTML=`<div class="calc-diff-ico">${diff>=0?"🏆":"📊"}</div>
      <div>
        <div class="calc-diff-main">${winName} creates <span style="color:${winCol};">${$fc(Math.abs(diff))} more wealth</span> over ${Math.max(r1.yrs,r2.yrs)} years</div>
        <div class="calc-diff-sub">
          That's <strong style="color:${winCol};">${Math.abs(diffPct).toFixed(1)}% more total value</strong>
          ${diff>=0?` · Scenario 2 is <strong style="color:var(--gold);">${mult}× larger</strong> than Scenario 1`:""}
          &nbsp;·&nbsp; Same deposits, dramatically different outcomes.
        </div>
      </div>`;
  }
  // Update deposit hints
  [0,1].forEach(i=>{
    const s=_calcS[i];
    const hint=document.getElementById(`calc-hint-${i}`);
    if(hint){const alt=s.mode==="monthly"?s.amount*12:s.amount/12;hint.textContent=`≈ ${$fc(alt)} ${s.mode==="monthly"?"annual":"monthly"}`;}
    const lbl=document.getElementById(`calc-dep-lbl-${i}`);
    if(lbl)lbl.textContent=`${s.mode==="monthly"?"Monthly":"Annual"} Deposit Amount`;
    // Update mode buttons
    document.querySelectorAll(`.calc-mode-btn`).forEach(btn=>{
      // buttons are in pairs per panel; handled by re-render on mode change
    });
  });
  drawCalcChart();
}

window.switchCalcTab=k=>{
  _calcSubTab=k;
  document.getElementById("app").innerHTML=renderCalculator();
  if(k==="planner")setTimeout(drawCalcChart,60);
};

window.calcSet=(idx,field,val)=>{
  _calcS[idx][field]=val;
  // Mode toggle needs full input panel re-render (label + button states change)
  if(field==="mode"){
    document.getElementById("app").innerHTML=renderCalculator();
    setTimeout(drawCalcChart,60);
  } else {
    updateCalcUI();
  }
};

autoFetchPricesOnStartup();
</script>
</body>
</html>
